<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - سجل الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f6;
            --accent-green: #00b050;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }

        /* الهيدر وشريط التنقل */
        .navbar { background-color: var(--nav-navy); display: flex; padding: 6px 20px; position: sticky; top: 0; z-index: 1000; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        .navbar a { color: white; text-decoration: none; padding: 5px 15px; margin-left: 10px; font-weight: 700; font-size: 11px; border-radius: 6px; }
        .navbar a.active { background-color: #003366; }

        .container { padding: 20px; max-width: 1200px; margin: auto; }

        /* منطقة الإجراءات (بحث وإضافة) */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; }
        
        .search-box { flex-grow: 1; position: relative; }
        .search-box input { width: 100%; padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo'; outline: none; }

        .btn-add { background-color: var(--accent-green); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { opacity: 0.9; }

        /* الجدول */
        .content-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: right; }
        th { background-color: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; color: var(--nav-navy); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #fcfcfc; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-completed { background: #e6f7ed; color: #00b050; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html" class="active">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="#">العملاء</a>
        <a href="#">المبيعات</a>
        <a href="#">تذكيرات</a>
    </nav>

    <div class="container">
        <div class="action-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="بحث عن زيارة، عميل، أو مندوب...">
            </div>
            <button class="btn-add" onclick="openVisitModal()">+ إضافة زيارة جديدة</button>
        </div>

        <div class="content-box">
            <table>
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>العميل</th>
                        <th>المندوب</th>
                        <th>نوع الزيارة</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="visitsTableBody">
                    <!-- سيتم جلب البيانات من Firebase هنا -->
                    <tr>
                        <td>2026-05-13</td>
                        <td>شركة الرياض للخدمات</td>
                        <td>حمزة</td>
                        <td>ميدانية</td>
                        <td><span class="status-badge status-completed">تمت</span></td>
                        <td><button style="border:none; background:none; color:blue; cursor:pointer;">تعديل</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // دالة لفتح نافذة إضافة زيارة (سنبرمجها لاحقاً)
        function openVisitModal() {
            alert("هنا سنقوم بفتح نافذة الإضافة المخصصة لـ ASGate");
        }

        // مكان مخصص لأكواد Firebase المستقبلي
        // TODO: Initialize Firebase and Fetch Visits
    </script>
</body>
</html>
