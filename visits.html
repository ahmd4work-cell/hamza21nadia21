<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ASGate - نظام الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #4c1d95; --s: #3b82f6; --bg: #f4f7f9; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 20px; font-size: 13px; }
        .bar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--p); color: white; padding: 10px; font-size: 11px; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
        .in-cell { width: 95%; border: 1px solid #ddd; border-radius: 4px; padding: 4px; font-family: 'Cairo'; }
        .wa-btn { color: #22c55e; text-decoration: none; font-weight: bold; font-size: 11px; display: block; margin-top: 4px; }
        .stats { background: #fff; padding: 10px; border-radius: 8px; margin-left: auto; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="card">
    <div class="bar">
        <button onclick="addRow()" style="background:var(--s); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">+ إضافة زيارة</button>
        <input type="text" id="search" placeholder="بحث سريع..." onkeyup="filter()" style="padding:7px; border-radius:5px; border:1px solid #ccc;">
        <div class="stats">
            إجمالي الزيارات: <span id="count">0</span> | القيمة الكلية: <span id="totalVal">0</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>الشركة</th><th>الموقع</th><th>المسؤول</th><th>الموبايل</th><th>التاريخ</th><th>القيمة</th><th>الحالة</th><th>المالك</th><th>إجراء</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
    const KEY = 'asgate_v31_final';

    function addRow(data = {}) {
        const tr = document.createElement('tr');
        tr.className = 'row-item';
        const waLink = data.mob ? `https://wa.me/${data.mob.startsWith('0') ? '966' + data.mob.substring(1) : '966' + data.mob}` : '#';
        
        tr.innerHTML = `
            <td><input type="text" class="in-cell" value="${data.comp || ''}" onchange="save()"></td>
            <td><input type="text" class="in-cell" value="${data.loc || ''}" onchange="save()"></td>
            <td><input type="text" class="in-cell" value="${data.mgr || ''}" onchange="save()"></td>
            <td>
                <input type="text" class="in-cell" value="${data.mob || ''}" onchange="save()">
                <a href="${waLink}" target="_blank" class="wa-btn" style="${data.mob ? '' : 'display:none'}">🟢 واتساب</a>
            </td>
            <td><input type="date" class="in-cell" value="${data.date || ''}" onchange="save()"></td>
            <td><input type="number" class="in-cell val-field" value="${data.val || 0}" onchange="save()"></td>
            <td>
                <select class="in-cell" onchange="save()">
                    <option value="">--</option>
                    <option value="متابعة" ${data.status=='متابعة'?'selected':''}>متابعة</option>
                    <option value="تأهيل" ${data.status=='تأهيل'?'selected':''}>تأهيل لفرصة</option>
                </select>
            </td>
            <td><input type="text" class="in-cell" value="${data.owner || ''}" onchange="save()"></td>
            <td><button onclick="this.parentElement.parentElement.remove(); save();" style="color:red; border:none; background:none; cursor:pointer;">حذف</button></td>
        `;
        document.getElementById('tbody').prepend(tr);
        save();
    }

    function save() {
        const rows = [];
        document.querySelectorAll('.row-item').forEach(tr => {
            const ins = tr.querySelectorAll('.in-cell');
            rows.push({
                comp: ins[0].value, loc: ins[1].value, mgr: ins[2].value, 
                mob: ins[3].value, date: ins[4].value, val: ins[5].value,
                status: ins[6].value, owner: ins[7].value
            });
            // تحديث رابط الواتساب فوراً
            const wa = tr.querySelector('.wa-btn');
            const phone = ins[3].value;
            if(phone) {
                wa.href = `https://wa.me/${phone.startsWith('0') ? '966' + phone.substring(1) : '966' + phone}`;
                wa.style.display = 'block';
            }
        });
        localStorage.setItem(KEY, JSON.stringify(rows));
        updateStats();
    }

    function updateStats() {
        const rows = JSON.parse(localStorage.getItem(KEY) || '[]');
        let total = 0;
        rows.forEach(r => total += parseFloat(r.val) || 0);
        document.getElementById('count').innerText = rows.length;
        document.getElementById('totalVal').innerText = total.toLocaleString();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.row-item').forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none';
        });
    }

    // تحميل البيانات عند الفتح
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem(KEY) || '[]');
        saved.reverse().forEach(addRow);
    };
</script>
</body>
</html>
