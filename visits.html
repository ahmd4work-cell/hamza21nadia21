<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - سجل الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-purple-dark: #2e1065;
            --header-purple-mid: #8b5cf6;
            --nav-active: #a78bfa;
            --bg-color: #f8fafc;
            --accent-blue: #3b82f6;
            --accent-green-active: #22c55e;
            --accent-red: #ef4444;
            --border-soft: #cbd5e1;
        }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; font-size: 13px; }

        .navbar { 
            background-color: var(--nav-purple-dark); display: flex; align-items: center; padding: 0 20px; 
            margin: 10px; border-radius: 15px; height: 37px; position: sticky; top: 10px; z-index: 1000;
        }
        .navbar a { color: white; text-decoration: none; padding: 0 15px; font-weight: 700; font-size: 12px; }
        .navbar a.active { background-color: var(--nav-active); color: var(--nav-purple-dark); border-radius: 8px; line-height: 26px; height: 26px; }

        .container { padding: 0 10px; }
        .action-bar { display: flex; align-items: center; margin: 15px 0; gap: 15px; padding: 0 10px; }
        .btn-top { border: none; padding: 8px 20px; border-radius: 10px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-add { background-color: var(--accent-blue); }
        .btn-save { background-color: var(--accent-green-active); }

        .table-wrapper { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-soft); margin-bottom: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { background: var(--header-purple-mid); color: white; padding: 12px 5px; font-size: 11px; font-weight: 800; text-align: center; }
        td { border-bottom: 1px solid var(--border-soft); border-left: 1px solid #f1f5f9; text-align: center; height: 45px; padding: 2px; position: relative; }
        
        /* تلميح ذكي يظهر محتوى الخانة */
        .cell-container:hover .tooltip { opacity: 1; visibility: visible; }
        .tooltip {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #334155; color: white; padding: 5px 10px; border-radius: 6px;
            font-size: 11px; white-space: nowrap; opacity: 0; visibility: hidden;
            transition: 0.2s; z-index: 2000; pointer-events: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* تكبير المربع بقدر الكتابة عند الضغط */
        .excel-input { 
            width: 95%; border: none; text-align: center; font-family: 'Cairo'; outline: none; 
            background: transparent; font-size: 11.5px; color: #334155; transition: all 0.2s ease;
        }
        .excel-input:focus { 
            background: #ffffff; 
            min-width: 150%; /* يتمدد للخارج */
            transform: scale(1.1);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            z-index: 1500;
            position: relative;
            padding: 5px;
        }

        .btn-delete { background: none; border: none; color: var(--accent-red); cursor: pointer; font-weight: bold; font-size: 16px; }
        
        /* عرض الأعمدة المطلوب */
        .col-company { width: 12%; } .col-manager { width: 8%; } .col-mobile { width: 8%; } .col-email { width: 8%; }
        .col-record { width: 8%; } .col-current-service { width: 10%; } .col-proposed-service { width: 10%; }
        .col-status { width: 6%; } .col-date { width: 8%; } .col-notes { width: 10%; }
        .col-edit-date { width: 8%; } .col-action { width: 4%; }

        .readonly-style { color:#94a3b8; font-size:10px; cursor: default; }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html" class="active">الزيارات</a>
    <a href="#">الفرص البيعية</a>
    <a href="#">العملاء</a>
    <a href="#">المبيعات</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top btn-add" onclick="insertNewRow()">+ إضافة زيارة جديدة</button>
        <button class="btn-top btn-save" onclick="saveAllData()">حفظ البيانات</button>
    </div>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-company">الشركة</th><th class="col-manager">المسؤول</th><th class="col-mobile">الموبايل</th>
                    <th class="col-email">الايميل</th><th class="col-record">السجل</th><th class="col-current-service">الخدمة الحالية</th>
                    <th class="col-proposed-service">الخدمة المقترحة</th><th class="col-status">الحالة</th><th class="col-date">تاريخ الزيارة</th>
                    <th class="col-notes">ملاحظات</th><th class="col-edit-date">تاريخ التعديل</th><th class="col-action">إجراء</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    function getToday() { return new Date().toISOString().split('T')[0]; }

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_visits_v4');
        if (saved) JSON.parse(saved).forEach(item => renderRow(item));
        else insertNewRow();
    }

    // دالة لتحديث نص التلميح فور الكتابة
    function updateTooltip(input) {
        const tooltip = input.parentElement.querySelector('.tooltip');
        if (tooltip) tooltip.innerText = input.value || "...";
    }

    function renderRow(v = {}) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow();
        
        const createCell = (val, type = "text", readonly = false, isSelect = false) => {
            let cell = row.insertCell();
            cell.className = "cell-container";
            
            if (isSelect) {
                cell.innerHTML = `
                    <select class="excel-input" onchange="updateTooltip(this)">
                        <option value="جديد" ${val==='جديد'?'selected':''}>جديد</option>
                        <option value="مهتم" ${val==='مهتم'?'selected':''}>مهتم</option>
                        <option value="مغلق" ${val==='مغلق'?'selected':''}>مغلق</option>
                    </select>
                    <span class="tooltip">${val || 'جديد'}</span>`;
            } else {
                cell.innerHTML = `
                    <input type="${type}" class="excel-input ${readonly ? 'readonly-style' : ''}" 
                           value="${val || ''}" ${readonly ? 'readonly' : ''} 
                           oninput="updateTooltip(this)" onmouseover="updateTooltip(this)">
                    <span class="tooltip">${val || '...'}</span>`;
            }
        };

        createCell(v.comp); createCell(v.mgr); createCell(v.mob); createCell(v.email, "email");
        createCell(v.record); createCell(v.curServ); createCell(v.propServ);
        createCell(v.status, "text", false, true);
        createCell(v.visitDate || getToday(), "text", true);
        createCell(v.notes);
        createCell(v.editDate || getToday(), "text", true);

        // خلية الحذف
        let actionCell = row.insertCell();
        actionCell.innerHTML = `<button class="btn-delete" onclick="deleteRow(this)">×</button>`;
    }

    function insertNewRow() { renderRow({ status: 'جديد' }); }
    function deleteRow(btn) { if(confirm('حذف؟')) btn.closest('tr').remove(); }

    function saveAllData() {
        const data = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            const f = row.querySelectorAll('input, select');
            data.push({
                comp: f[0].value, mgr: f[1].value, mob: f[2].value, email: f[3].value,
                record: f[4].value, curServ: f[5].value, propServ: f[6].value,
                status: f[7].value, visitDate: f[8].value, notes: f[9].value, editDate: getToday()
            });
        });
        localStorage.setItem('asgate_visits_v4', JSON.stringify(data));
        alert("✅ تم الحفظ");
        location.reload();
    }
</script>
</body>
</html>
