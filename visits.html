<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - سجل الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-purple-dark: #2e1065;
            --header-purple-mid: #8b5cf6;
            --nav-active: #a78bfa;
            --bg-color: #f8fafc;
            --accent-blue: #3b82f6;
            --accent-green-active: #22c55e;
            --accent-red: #ef4444;
            --border-soft: #cbd5e1;
        }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; font-size: 13px; }

        /* Navbar */
        .navbar { 
            background-color: var(--nav-purple-dark); display: flex; align-items: center; padding: 0 20px; 
            margin: 10px; border-radius: 15px; height: 37px; position: sticky; top: 10px; z-index: 1000;
        }
        .navbar a { color: white; text-decoration: none; padding: 0 15px; font-weight: 700; font-size: 12px; }
        .navbar a.active { background-color: var(--nav-active); color: var(--nav-purple-dark); border-radius: 8px; line-height: 26px; height: 26px; }

        .container { padding: 0 10px; }
        .action-bar { display: flex; align-items: center; margin: 15px 0; gap: 15px; padding: 0 10px; }
        .btn-top { border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-add { background-color: var(--accent-blue); }
        .btn-save { background-color: var(--accent-green-active); }

        /* Table Styles */
        .table-wrapper { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-soft); margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--header-purple-mid); color: white; padding: 12px 5px; font-size: 11px; font-weight: 800; text-align: center; }
        td { border-bottom: 1px solid var(--border-soft); text-align: center; height: 45px; padding: 2px; position: relative; }
        
        .excel-input { 
            width: 95%; border: none; text-align: center; font-family: 'Cairo'; outline: none; 
            background: transparent; font-size: 11.5px; transition: all 0.2s ease;
        }
        .excel-input:focus { 
            background: #ffffff; min-width: 140%; transform: scale(1.1);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-radius: 6px; z-index: 50; position: relative;
        }

        .cell-container:hover .tooltip { opacity: 1; visibility: visible; }
        .tooltip {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #334155; color: white; padding: 4px 8px; border-radius: 4px;
            font-size: 10px; opacity: 0; visibility: hidden; z-index: 100; pointer-events: none;
            max-width: 200px; white-space: normal; line-height: 1.4;
        }

        /* المودال - سجل الكتابة */
        .modal {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 8px; width: 500px; height: 350px; 
            display: flex; flex-direction: column; box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .modal-header { font-weight: 800; color: var(--nav-purple-dark); margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px;}
        
        /* منطقة عرض السجل القديم */
        .history-log {
            flex-grow: 1; overflow-y: auto; background: #f8fafc; border: 1px solid var(--border-soft);
            border-radius: 5px; padding: 10px; margin-bottom: 10px; font-size: 11px; color: #64748b;
            white-space: pre-wrap; text-align: right;
        }

        .fixed-date-label {
            background: var(--nav-purple-dark); color: white; padding: 3px 10px; border-radius: 4px;
            font-size: 11px; font-weight: bold; margin-bottom: 5px; display: inline-block;
        }

        .note-area { 
            height: 80px; width: 100%; border: 1px solid var(--accent-blue); border-radius: 5px; 
            padding: 8px; font-family: 'Cairo'; resize: none; outline: none; box-sizing: border-box;
            background-color: #fffdf7; font-size: 12px;
        }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }

        .col-company { width: 12%; } .col-manager { width: 8%; } .col-mobile { width: 8%; } .col-email { width: 8%; }
        .col-record { width: 8%; } .col-current-service { width: 10%; } .col-proposed-service { width: 10%; }
        .col-status { width: 6%; } .col-date { width: 8%; } .col-notes { width: 10%; }
        .col-edit-date { width: 8%; } .col-action { width: 4%; }

        .readonly-style { color:#94a3b8; font-size:10px; }
        .notes-trigger { cursor: pointer; color: var(--accent-blue); font-weight: 700; text-decoration: underline; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html" class="active">الزيارات</a>
    <a href="#">الفرص البيعية</a>
    <a href="#">العملاء</a>
    <a href="#">المبيعات</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top btn-add" onclick="insertNewRow()">+ إضافة زيارة جديدة</button>
        <button class="btn-top btn-save" onclick="saveAllData()">حفظ البيانات</button>
    </div>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-company">الشركة</th><th class="col-manager">المسؤول</th><th class="col-mobile">الموبايل</th>
                    <th class="col-email">الايميل</th><th class="col-record">السجل</th><th class="col-current-service">الخدمة الحالية</th>
                    <th class="col-proposed-service">الخدمة المقترحة</th><th class="col-status">الحالة</th><th class="col-date">تاريخ الزيارة</th>
                    <th class="col-notes">ملاحظات</th><th class="col-edit-date">تاريخ التعديل</th><th class="col-action">إجراء</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="noteModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">📝 سجل ملاحظات الزيارة</div>
        
        <div id="historyLog" class="history-log"></div>
        
        <div id="fixedDateDisplay" class="fixed-date-label"></div>
        <textarea id="modalTextArea" class="note-area" placeholder="اكتب إضافة جديدة للسجل..."></textarea>
        
        <div class="modal-footer">
            <button class="btn-top" style="background:#94a3b8; padding: 5px 12px;" onclick="closeNote()">إلغاء</button>
            <button class="btn-top btn-save" style="padding: 5px 12px;" onclick="saveNote()">إضافة للسجل</button>
        </div>
    </div>
</div>

<script>
    let currentActiveInput = null;

    function getToday() { 
        const d = new Date();
        return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
    }

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_visits_detailed_v6');
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        if (saved) {
            JSON.parse(saved).forEach(item => renderRow(item));
        } else {
            insertNewRow();
        }
    }

    function updateTooltip(el) {
        const tooltip = el.parentElement.querySelector('.tooltip');
        if (tooltip) tooltip.innerText = el.value || "...";
    }

    function renderRow(v = {}) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow();
        
        const createCell = (val, type, readonly, isSelect, isNotes) => {
            let cell = row.insertCell();
            cell.className = "cell-container";
            if (isSelect) {
                cell.innerHTML = `<select class="excel-input" onchange="updateTooltip(this)"><option value="جديد" ${val==='جديد'?'selected':''}>جديد</option><option value="مهتم" ${val==='مهتم'?'selected':''}>مهتم</option><option value="مغلق" ${val==='مغلق'?'selected':''}>مغلق</option></select><span class="tooltip">${val || 'جديد'}</span>`;
            } else if (isNotes) {
                cell.innerHTML = `<input type="text" class="excel-input notes-trigger" value="${val || ''}" readonly onclick="openNote(this)" onmouseover="updateTooltip(this)"><span class="tooltip">${val || 'اضغط لفتح السجل'}</span>`;
            } else {
                cell.innerHTML = `<input type="${type}" class="excel-input ${readonly ? 'readonly-style' : ''}" value="${val || ''}" ${readonly ? 'readonly' : ''} oninput="updateTooltip(this)" onmouseover="updateTooltip(this)"><span class="tooltip">${val || '...'}</span>`;
            }
        };

        createCell(v.comp, "text"); createCell(v.mgr, "text"); createCell(v.mob, "text"); createCell(v.email, "text");
        createCell(v.record, "text"); createCell(v.curServ, "text"); createCell(v.propServ, "text");
        createCell(v.status, "", false, true);
        createCell(v.visitDate || getToday(), "text", true);
        createCell(v.notes, "text", false, false, true);
        createCell(v.editDate || getToday(), "text", true);

        row.insertCell().innerHTML = `<button style="background:none;border:none;color:red;cursor:pointer;font-weight:bold;font-size:18px" onclick="this.closest('tr').remove()">×</button>`;
    }

    function insertNewRow() { 
        renderRow({ status: 'جديد', visitDate: getToday(), editDate: getToday() }); 
    }

    function openNote(inputEl) {
        currentActiveInput = inputEl;
        const modal = document.getElementById('noteModal');
        const historyLog = document.getElementById('historyLog');
        const textArea = document.getElementById('modalTextArea');
        const dateDisplay = document.getElementById('fixedDateDisplay');
        
        dateDisplay.innerText = "إضافة بتاريخ: " + getToday();
        
        // عرض السجل السابق في منطقة العرض فقط
        historyLog.innerText = inputEl.value || "لا توجد ملاحظات سابقة.";
        
        // تفريغ ساحة الكتابة لإضافة ملاحظة جديدة
        textArea.value = "";
        
        modal.style.display = "flex";
        setTimeout(() => textArea.focus(), 50);
    }

    function saveNote() {
        if (currentActiveInput) {
            const textArea = document.getElementById('modalTextArea');
            const newEntry = textArea.value.trim();
            
            if (newEntry !== "") {
                const timestamp = "[" + getToday() + "]";
                const currentHistory = currentActiveInput.value;
                
                // إضافة الملاحظة الجديدة في بداية السجل مع التاريخ
                const updatedHistory = timestamp + "\n" + newEntry + "\n" + "----------------\n" + currentHistory;
                
                currentActiveInput.value = updatedHistory;
                updateTooltip(currentActiveInput);
            }
        }
        closeNote();
    }

    function closeNote() { document.getElementById('noteModal').style.display = "none"; }

    function saveAllData() {
        const data = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            const f = row.querySelectorAll('input, select');
            data.push({
                comp: f[0].value, mgr: f[1].value, mob: f[2].value, email: f[3].value,
                record: f[4].value, curServ: f[5].value, propServ: f[6].value,
                status: f[7].value, visitDate: f[8].value, notes: f[9].value, editDate: getToday()
            });
        });
        localStorage.setItem('asgate_visits_detailed_v6', JSON.stringify(data));
        alert("✅ تم حفظ السجل بنجاح");
    }

    window.onclick = function(e) { if (e.target == document.getElementById('noteModal')) closeNote(); }
</script>
</body>
</html>
