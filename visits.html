<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASGate - الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --nav-navy: #001f3f; --bg-color: #f4f7f9; --accent-blue: #3b82f6; --border-color: #cbd5e1; }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }
        .navbar { background-color: var(--nav-navy); display: flex; padding: 8px 20px; margin: 5px; border-radius: 15px; }
        .navbar a { color: white; text-decoration: none; padding: 6px 15px; font-weight: 700; font-size: 13px; border-radius: 10px; }
        .navbar a:hover { background: rgba(255,255,255,0.1); }
        .navbar a.active { background-color: rgba(255,255,255,0.2); }
        .container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #e2e8f0; padding: 12px; font-size: 12px; }
        td { border-bottom: 1px solid var(--border-color); padding: 10px; text-align: center; }
        .status-select { padding: 5px; border-radius: 5px; font-family: 'Cairo'; }
        .btn-add { background: var(--accent-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-family: 'Cairo'; }
    </style>
</head>
<body onload="loadVisits()">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html" class="active">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
    </nav>
    <div class="container">
        <button class="btn-add" onclick="addNewRow()">+ إضافة زيارة</button>
        <table id="visitsTable">
            <thead>
                <tr>
                    <th>الشركة</th><th>المسؤول</th><th>الموبايل</th><th>الحالة</th><th>التاريخ</th><th>إجراء</th>
                </tr>
            </thead>
            <tbody id="visitsBody"></tbody>
        </table>
    </div>
    <script>
        function loadVisits() {
            const data = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
            const body = document.getElementById('visitsBody');
            body.innerHTML = '';
            data.forEach((v, idx) => {
                const row = body.insertRow();
                row.innerHTML = `
                    <td>${v.comp}</td><td>${v.mgr}</td><td>${v.mob}</td>
                    <td>
                        <select class="status-select" onchange="updateStatus(${idx}, this.value)">
                            <option ${v.status==='زيارة'?'selected':''}>زيارة</option>
                            <option ${v.status==='مهتم'?'selected':''}>مهتم</option>
                        </select>
                    </td>
                    <td>${v.date}</td>
                    <td><button onclick="deleteVisit(${idx})" style="color:red; background:none; border:none; cursor:pointer;">حذف</button></td>
                `;
            });
        }
        function updateStatus(idx, newStatus) {
            let data = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
            if (newStatus === 'مهتم') {
                let opps = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
                opps.push(data[idx]);
                localStorage.setItem('asgate_opportunities_data', JSON.stringify(opps));
                data.splice(idx, 1);
            } else { data[idx].status = newStatus; }
            localStorage.setItem('asgate_visits_data', JSON.stringify(data));
            loadVisits();
        }
        function deleteVisit(idx) { if(confirm('حذف؟')) { let data = JSON.parse(localStorage.getItem('asgate_visits_data')); data.splice(idx, 1); localStorage.setItem('asgate_visits_data', JSON.stringify(data)); loadVisits(); } }
        function addNewRow() { 
            const name = prompt("اسم الشركة:");
            if(name) {
                let data = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
                data.push({comp: name, mgr: '-', mob: '-', status: 'زيارة', date: new Date().toLocaleDateString()});
                localStorage.setItem('asgate_visits_data', JSON.stringify(data));
                loadVisits();
            }
        }
    </script>
</body>
</html>
