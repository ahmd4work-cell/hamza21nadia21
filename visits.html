<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-purple-dark: #2e1065;
            --header-purple-mid: #8b5cf6;
            --nav-active: #a78bfa;
            --bg-color: #f8fafc;
            --accent-blue: #3b82f6;
            --accent-green-active: #22c55e;
            --border-soft: #cbd5e1;
        }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }

        .navbar { 
            background-color: var(--nav-purple-dark); display: flex; align-items: center; padding: 0 20px; 
            margin: 10px; border-radius: 15px; height: 37px; position: sticky; top: 10px; z-index: 1000;
        }
        .navbar a { color: white; text-decoration: none; padding: 0 15px; font-weight: 700; font-size: 12px; }
        .navbar a.active { background-color: var(--nav-active); color: var(--nav-purple-dark); border-radius: 8px; line-height: 26px; height: 26px; }

        .container { padding: 0 20px; }
        .action-bar { display: flex; align-items: center; margin: 15px 0; gap: 15px; }
        .btn-top { border: none; padding: 8px 20px; border-radius: 10px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white; }
        .btn-add { background-color: var(--accent-blue); }
        .btn-save { background-color: var(--accent-green-active); }

        .table-wrapper { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-soft); }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--header-purple-mid); color: white; padding: 12px; font-size: 11px; }
        td { border-bottom: 1px solid var(--border-soft); text-align: center; height: 45px; }
        
        .excel-input { width: 90%; border: none; text-align: center; font-family: 'Cairo'; outline: none; background: transparent; }
        .notes-cell { cursor: pointer; color: var(--accent-blue); text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html" class="active">الزيارات</a>
    <a href="#">الفرص البيعية</a>
    <a href="#">العملاء</a>
    <a href="#">المبيعات</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top btn-add" onclick="insertNewRow()">+ إضافة زيارة</button>
        <button class="btn-top btn-save" onclick="saveAllData()">حفظ التغييرات</button>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>الشركة</th><th>المسؤول</th><th>الموبايل</th><th>الحالة</th><th>التاريخ</th><th>ملاحظات</th><th>حذف</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    function loadSavedData() {
        const saved = localStorage.getItem('asgate_visits_data');
        if (saved) JSON.parse(saved).forEach(item => renderRow(item));
    }

    function renderRow(v) {
        const row = document.getElementById('tableBody').insertRow();
        row.innerHTML = `
            <td><input type="text" class="excel-input" value="${v.comp || ''}"></td>
            <td><input type="text" class="excel-input" value="${v.mgr || ''}"></td>
            <td><input type="text" class="excel-input" value="${v.mob || ''}"></td>
            <td><select class="excel-input"><option ${v.status==='مهتم'?'selected':''}>مهتم</option></select></td>
            <td><input type="date" class="excel-input" value="${v.date || ''}"></td>
            <td class="notes-cell" onclick="alert('خاصية الملاحظات مفعلة')">ملاحظات</td>
            <td><button onclick="this.closest('tr').remove()">X</button></td>
        `;
    }

    function insertNewRow() { renderRow({date: new Date().toISOString().split('T')[0]}); }

    function saveAllData() {
        const data = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            const ins = row.querySelectorAll('input');
            data.push({ comp: ins[0].value, mgr: ins[1].value, mob: ins[2].value, date: ins[3].value });
        });
        localStorage.setItem('asgate_visits_data', JSON.stringify(data));
        alert("تم الحفظ");
    }
</script>
</body>
</html>
