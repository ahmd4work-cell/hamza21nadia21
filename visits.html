<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - إدارة الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f9;
            --accent-green-active: #22c55e;
            --accent-green-dim: #d1fae5;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1; }

        .navbar { 
            background-color: var(--nav-navy); 
            display: flex; padding: 8px 20px; margin: 5px; 
            border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar a { color: white; text-decoration: none; padding: 6px 15px; font-weight: 700; font-size: 13px; }
        .navbar a.active { background-color: rgba(255,255,255,0.1); border-radius: 10px; }

        .container { padding: 5px 10px; max-width: 100%; }
        .action-bar { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; padding: 10px 0; }
        
        /* أزرار التحكم العلوية */
        .btn-top { border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s; color: white; }
        .btn-add { background-color: var(--accent-blue); }
        .btn-save-all { background-color: var(--accent-green-dim); color: #065f46; opacity: 0.6; pointer-events: none; }
        .btn-save-all.active { background-color: var(--accent-green-active); color: white; opacity: 1; pointer-events: auto; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3); }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 1px solid var(--border-color); }
        th { background-color: #e2e8f0; padding: 8px 2px; color: var(--nav-navy); font-size: 11px; font-weight: 800; border: 1px solid var(--border-color); }
        td { padding: 0; border: 1px solid var(--border-color); text-align: center; height: 38px; font-size: 11px; }

        .excel-input {
            width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo';
            font-size: 11px; text-align: center; outline: none; box-sizing: border-box; background: transparent;
        }
        .excel-input:focus { background-color: #fffdec; box-shadow: inset 0 0 0 1px var(--accent-blue); }

        .btn-delete { border: none; background-color: #fee2e2; color: var(--accent-red); padding: 4px 10px; border-radius: 4px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 10px; }
        .btn-delete:hover { background-color: var(--accent-red); color: white; }

        .whatsapp-link { text-decoration: none; color: #128c7e; font-weight: bold; font-size: 10px; display: block; margin-top: -2px; }
        .updated-at { font-size: 10px; color: #475569; font-weight: bold; }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html" class="active">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html">العملاء</a>
    <a href="sales.html">المبيعات</a>
    <a href="reminders.html">تذكير</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top btn-add" title="إضافة زيارة جديدة للجدول" onclick="insertNewRow()">+ إضافة زيارة</button>
        <button id="saveAllBtn" class="btn-top btn-save-all" title="حفظ كافة التغييرات التي أجريتها" onclick="saveAllData()">حفظ التغييرات</button>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 14%;">الشركة</th>
                <th>المسؤول</th>
                <th style="width: 12%;">الموبايل</th>
                <th>السجل</th>
                <th>الخدمة الحالية</th>
                <th>الخدمة المقترحة</th>
                <th style="width: 75px;">الحالة</th>
                <th style="width: 95px;">تاريخ الزيارة</th>
                <th style="width: 100px;">تاريخ التعديل</th>
                <th style="width: 70px;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let isDirty = false;
    const statusOrder = { "فقدان": 1, "20%": 2, "50%": 3, "مهتم": 4 };

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_visits');
        if (saved) {
            let visits = JSON.parse(saved);
            sortAndRender(visits);
        }
    }

    function sortAndRender(visits) {
        visits.sort((a, b) => {
            let rankA = statusOrder[a.status] || 0;
            let rankB = statusOrder[b.status] || 0;
            if (rankA !== rankB) return rankA - rankB;

            let dateA = a.updated === '-' ? 0 : new Date(a.updated.split('/').reverse().join('-')).getTime();
            let dateB = b.updated === '-' ? 0 : new Date(b.updated.split('/').reverse().join('-')).getTime();
            return dateA - dateB;
        });

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        visits.forEach(v => renderRow(v));
        toggleSaveBtn(false);
    }

    function renderRow(v, isNew = false) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(isNew ? 0 : -1);
        row.setAttribute('data-created', v.created || v.date);

        row.innerHTML = `
            <td><input type="text" class="excel-input" value="${v.comp}" oninput="markAsChanged(this)" title="اسم الشركة"></td>
            <td><input type="text" class="excel-input" value="${v.mgr}" oninput="markAsChanged(this)" title="اسم المسؤول"></td>
            <td>
                <input type="text" class="excel-input" value="${v.mob}" oninput="updateWhatsApp(this); markAsChanged(this)" title="الجوال">
                <a href="https://wa.me/${v.mob}" target="_blank" class="whatsapp-link" style="${v.mob ? '' : 'display:none'}">واتساب ↗</a>
            </td>
            <td><input type="text" class="excel-input" value="${v.cr}" oninput="markAsChanged(this)" title="السجل التجاري"></td>
            <td><input type="text" class="excel-input" value="${v.curr}" oninput="markAsChanged(this)" title="الخدمة الحالية"></td>
            <td><input type="text" class="excel-input" value="${v.prop}" oninput="markAsChanged(this)" title="الخدمة المقترحة"></td>
            <td>
                <select class="excel-input" onchange="markAsChanged(this)" title="الحالة">
                    <option ${v.status === 'فقدان' ? 'selected' : ''}>فقدان</option>
                    <option ${v.status === '20%' ? 'selected' : ''}>20%</option>
                    <option ${v.status === '50%' ? 'selected' : ''}>50%</option>
                    <option ${v.status === 'مهتم' ? 'selected' : ''}>مهتم</option>
                </select>
            </td>
            <td><input type="date" class="excel-input" value="${v.date}" oninput="markAsChanged(this)" title="تاريخ الزيارة"></td>
            <td class="updated-at" title="آخر تعديل">${v.updated}</td>
            <td><button class="btn-delete" onclick="deleteRow(this)" title="حذف">حذف</button></td>
        `;
    }

    function insertNewRow() {
        const todayStr = new Date().toISOString().split('T')[0];
        renderRow({ comp:'', mgr:'', mob:'', cr:'', curr:'', prop:'', status:'فقدان', date: todayStr, updated: '-', created: todayStr }, true);
        toggleSaveBtn(true);
    }

    function markAsChanged(el) {
        toggleSaveBtn(true);
        const row = el.closest('tr');
        const createdDate = row.getAttribute('data-created');
        const today = new Date().toISOString().split('T')[0];
        if (today !== createdDate) {
            row.setAttribute('data-pending-update', new Date().toLocaleDateString('en-GB'));
        }
    }

    function toggleSaveBtn(active) {
        isDirty = active;
        const btn = document.getElementById('saveAllBtn');
        if(active) btn.classList.add('active');
        else btn.classList.remove('active');
    }

    function saveAllData() {
        const rows = document.querySelectorAll('#tableBody tr');
        const allVisits = [];
        
        rows.forEach(row => {
            const ins = row.querySelectorAll('.excel-input');
            const pendingDate = row.getAttribute('data-pending-update');
            let updatedAt = row.querySelector('.updated-at').innerText;
            
            if (pendingDate) {
                updatedAt = pendingDate;
            }

            allVisits.push({
                comp: ins[0].value, mgr: ins[1].value, mob: ins[2].value,
                cr: ins[3].value, curr: ins[4].value, prop: ins[5].value,
                status: ins[6].value, date: ins[7].value,
                updated: updatedAt,
                created: row.getAttribute('data-created')
            });
        });

        localStorage.setItem('asgate_visits', JSON.stringify(allVisits));
        loadSavedData(); // إعادة الترتيب بعد الحفظ
    }

    function deleteRow(btn) {
        if(confirm("هل أنت متأكد من الحذف؟")) {
            btn.closest('tr').remove();
            saveAllData();
        }
    }

    function updateWhatsApp(input) {
        const link = input.parentElement.querySelector('.whatsapp-link');
        link.href = `https://wa.me/${input.value.trim()}`;
        link.style.display = input.value.trim() ? 'block' : 'none';
    }

    window.onbeforeunload = function() {
        if (isDirty) return "لديك تغييرات غير محفوظة!";
    };
</script>
</body>
</html>
