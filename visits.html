<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - إدارة الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f9;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1; }

        .navbar { background-color: var(--nav-navy); display: flex; padding: 4px 15px; border-bottom: 2px solid #00152b; }
        .navbar a { color: white; text-decoration: none; padding: 3px 10px; font-weight: 700; font-size: 12px; }

        .container { padding: 5px; max-width: 100%; }

        .action-bar { display: flex; align-items: center; margin-bottom: 5px; gap: 8px; padding: 0 5px; }
        .btn-add { background-color: var(--accent-blue); color: white; border: none; padding: 4px 12px; border-radius: 4px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 11px; }
        
        .search-container { display: flex; align-items: center; background: white; border: 1px solid var(--border-color); border-radius: 4px; padding: 0 5px; width: 150px; }
        .search-input { border: none; padding: 2px; font-family: 'Cairo'; outline: none; width: 100%; font-size: 11px; }

        /* الجدول - إلغاء الفراغات تماماً */
        .table-card { background: white; border: 1px solid var(--border-color); border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; border-spacing: 0; }
        
        th { 
            background-color: #e2e8f0; 
            padding: 4px 2px; 
            color: var(--nav-navy); 
            font-size: 10.5px; 
            font-weight: 800; 
            border: 1px solid var(--border-color); /* حدود رفيعة جداً لتمييز الأعمدة دون فراغات */
        }
        
        td { 
            padding: 3px 2px; 
            border: 1px solid #edf2f7; 
            text-align: center; 
            font-size: 11px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            font-weight: bold;
            color: #1e293b;
        }

        tr:hover { background-color: #f1f5f9; }

        /* حقول الإدخال المدمجة */
        .row-input { 
            width: 98%; 
            padding: 2px; 
            border: 1px solid var(--accent-blue); 
            border-radius: 2px; 
            font-family: 'Cairo'; 
            font-size: 10.5px; 
            text-align: center; 
            outline: none;
            background-color: #fff;
        }
        
        .status-pill { padding: 1px 6px; border-radius: 8px; font-size: 9.5px; font-weight: bold; }
        .status-50 { background: #dcfce7; color: #15803d; }

        .btn-action { 
            border: none; 
            padding: 1px 5px; 
            border-radius: 3px; 
            font-size: 9.5px; 
            font-family: 'Cairo'; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 0; 
            color: white; 
        }
        .bg-save { background-color: var(--accent-green); margin-left: 2px; }
        .bg-edit { background-color: var(--accent-blue); }
        .bg-transfer { background-color: #f59e0b; margin-right: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="action-bar">
        <button class="btn-add" onclick="insertNewRow()">+ إضافة زيارة</button>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="بحث...">
        </div>
    </div>

    <div class="table-card">
        <table id="visitsTable">
            <thead>
                <tr>
                    <th style="width: 13%;">الشركة</th>
                    <th>المسؤول</th>
                    <th>الموبايل</th>
                    <th>السجل</th>
                    <th>الخدمة الحالية</th>
                    <th>الخدمة المقترحة</th>
                    <th style="width: 70px;">الحالة</th>
                    <th style="width: 85px;">التاريخ</th>
                    <th style="width: 110px;">إجراء</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- الصفوف ستظهر هنا ملتصقة وبدون فراغات -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let isEditing = false;

    // تنبيه الخروج إذا لم يتم الحفظ
    window.onbeforeunload = function() {
        if (isEditing) return "لم يتم حفظ التغييرات!";
    };

    function insertNewRow() {
        if (isEditing) return alert("احفظ التعديل الحالي أولاً");
        
        isEditing = true;
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(0);
        row.setAttribute('data-new', 'true');

        row.innerHTML = `
            <td><input type="text" class="row-input"></td>
            <td><input type="text" class="row-input"></td>
            <td><input type="text" class="row-input"></td>
            <td><input type="text" class="row-input"></td>
            <td><input type="text" class="row-input"></td>
            <td><input type="text" class="row-input"></td>
            <td>
                <select class="row-input">
                    <option>50%</option><option>20%</option><option>مهتم</option><option>فقدان</option>
                </select>
            </td>
            <td><input type="date" class="row-input" value="${new Date().toISOString().split('T')[0]}"></td>
            <td>
                <button class="btn-action bg-save" onclick="saveRow(this)">حفظ</button>
                <button class="btn-action bg-edit" style="opacity:0.3" disabled>تعديل</button>
            </td>
        `;
    }

    function saveRow(btn) {
        const row = btn.closest('tr');
        const inputs = row.querySelectorAll('.row-input');
        const v = Array.from(inputs).map(i => i.value);
        
        isEditing = false;
        row.innerHTML = `
            <td>${v[0]}</td>
            <td>${v[1]}</td>
            <td>${v[2]}</td>
            <td>${v[3]}</td>
            <td>${v[4]}</td>
            <td>${v[5]}</td>
            <td><span class="status-pill status-50">${v[6]}</span></td>
            <td>${v[7]}</td>
            <td>
                <button class="btn-action bg-edit" onclick="editRow(this)">تعديل</button>
                <button class="btn-action bg-transfer" onclick="this.closest('tr').remove()">نقل</button>
            </td>
        `;
    }
</script>
</body>
</html>
