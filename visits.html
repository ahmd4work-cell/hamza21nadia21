<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - إدارة الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f8fafc;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1.1; }

        .navbar { background-color: var(--nav-navy); display: flex; padding: 5px 20px; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; }
        .navbar a { color: white; text-decoration: none; padding: 4px 12px; font-weight: 700; font-size: 13px; }

        .container { padding: 10px 15px; max-width: 100%; }

        .action-bar { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
        .btn-add { background-color: var(--accent-blue); color: white; border: none; padding: 5px 15px; border-radius: 6px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 12px; }
        
        .search-container { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 6px; padding: 0 8px; width: 180px; }
        .search-input { border: none; padding: 4px; font-family: 'Cairo'; outline: none; width: 100%; font-size: 11px; }

        .table-card { background: white; border-radius: 8px; border: 1px solid #e2e8f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #f1f5f9; padding: 6px 3px; color: var(--nav-navy); font-size: 11px; font-weight: 800; border-bottom: 1px solid #e2e8f0; }
        td { padding: 4px 3px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; font-weight: bold; }

        /* حقول الإدخال داخل الجدول */
        .row-input { width: 92%; padding: 3px; border: 1px solid #3b82f6; border-radius: 3px; font-family: 'Cairo'; font-size: 11px; text-align: center; outline: none; }
        
        .status-pill { padding: 1px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .status-50 { background: #dcfce7; color: #15803d; }
        .status-lost { background: #fee2e2; color: #b91c1c; }

        .btn-action { border: none; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; margin: 0 1px; color: white; }
        .bg-save { background-color: var(--accent-green); }
        .bg-edit { background-color: var(--accent-blue); }
        .bg-transfer { background-color: #f59e0b; }
        
        /* Tooltip */
        td:hover::after { content: attr(data-tooltip); position: absolute; z-index: 100; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 3px 8px; border-radius: 4px; font-size: 10px; white-space: normal; width: max-content; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#">الزيارات</a>
    <a href="#">الفرص البيعية</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-add" onclick="insertNewRow()">+ إضافة زيارة</button>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="بحث...">
        </div>
    </div>

    <div class="table-card">
        <table id="visitsTable">
            <thead>
                <tr>
                    <th style="width: 12%;">الشركة</th>
                    <th>المسؤول</th>
                    <th>الموبايل</th>
                    <th>السجل</th>
                    <th>الخدمة الحالية</th>
                    <th>الخدمة المقترحة</th>
                    <th style="width: 80px;">الحالة</th>
                    <th style="width: 90px;">التاريخ</th>
                    <th style="width: 130px;">إجراء</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let isEditing = false; // لمتابعة حالة التعديل

    // منع الخروج من الصفحة إذا كان هناك تعديل غير محفوظ
    window.addEventListener('beforeunload', function (e) {
        if (isEditing) {
            e.preventDefault();
            e.returnValue = 'لديك تغييرات غير محفوظة، هل أنت متأكد من المغادرة؟';
        }
    });

    function insertNewRow() {
        if (isEditing) {
            alert("يرجى حفظ الصف الحالي أولاً");
            return;
        }
        
        isEditing = true;
        const tbody = document.getElementById('tableBody');
        const today = new Date().toISOString().split('T')[0];
        const row = tbody.insertRow(0);
        row.setAttribute('data-new', 'true');

        row.innerHTML = `
            <td><input type="text" class="row-input" placeholder="الشركة"></td>
            <td><input type="text" class="row-input" placeholder="المسؤول"></td>
            <td><input type="text" class="row-input" placeholder="05xxxx"></td>
            <td><input type="text" class="row-input" placeholder="السجل"></td>
            <td><input type="text" class="row-input" placeholder="الحالية"></td>
            <td><input type="text" class="row-input" placeholder="المقترحة"></td>
            <td>
                <select class="row-input">
                    <option value="50%">50%</option>
                    <option value="20%">20%</option>
                    <option value="مهتم">مهتم</option>
                    <option value="فقدان">فقدان</option>
                </select>
            </td>
            <td><input type="date" class="row-input" value="${today}"></td>
            <td>
                <button class="btn-action bg-save" onclick="saveRow(this)">حفظ</button>
                <button class="btn-action bg-edit" style="opacity:0.5" disabled>تعديل</button>
                <button class="btn-action bg-transfer" style="opacity:0.5" disabled>نقل</button>
            </td>
        `;
    }

    function saveRow(btn) {
        const row = btn.closest('tr');
        const inputs = row.querySelectorAll('.row-input');
        const data = Array.from(inputs).map(i => i.value);
        
        // تحويل المدخلات إلى نصوص عرض
        const phone = data[2];
        const cleanPhone = phone.startsWith('0') ? '966' + phone.substring(1) : phone;
        const status = data[6];
        const statusClass = (status === '50%') ? 'status-50' : (status === 'فقدان') ? 'status-lost' : '';

        row.innerHTML = `
            <td data-tooltip="${data[0]}">${data[0]}</td>
            <td data-tooltip="${data[1]}">${data[1]}</td>
            <td><a href="https://wa.me/${cleanPhone}" target="_blank" style="color:var(--accent-green); text-decoration:none;">${phone}</a></td>
            <td data-tooltip="${data[3]}">${data[3]}</td>
            <td data-tooltip="${data[4]}">${data[4]}</td>
            <td data-tooltip="${data[5]}">${data[5]}</td>
            <td><span class="status-pill ${statusClass}">${status}</span></td>
            <td>${data[7]}</td>
            <td>
                <button class="btn-action bg-save" style="display:none" onclick="saveRow(this)">حفظ</button>
                <button class="btn-action bg-edit" onclick="editExistingRow(this)">تعديل</button>
                <button class="btn-action bg-transfer" onclick="confirmTransfer(this)">نقل</button>
            </td>
        `;
        
        isEditing = false;
        row.removeAttribute('data-new');
        sortRows();
    }

    function editExistingRow(btn) {
        if (isEditing) {
            alert("يرجى حفظ التعديلات الحالية أولاً");
            return;
        }
        isEditing = true;
        const row = btn.closest('tr');
        // منطق تحويل الصف لخلايا قابلة للتعديل...
        alert("الصف الآن جاهز للتعديل"); 
    }

    function confirmTransfer(btn) {
        if (confirm("هل ترغب بنقل الزيارة إلى الفرص البيعية؟")) {
            btn.closest('tr').remove();
        }
    }

    function sortRows() {
        const tbody = document.getElementById('tableBody');
        const rows = Array.from(tbody.querySelectorAll('tr:not([data-new="true"])'));
        const priority = { "50%": 4, "20%": 3, "مهتم": 2, "فقدان": 1 };

        rows.sort((a, b) => {
            const sA = a.querySelector('.status-pill')?.innerText || "";
            const sB = b.querySelector('.status-pill')?.innerText || "";
            return (priority[sB] || 0) - (priority[sA] || 0);
        });
        rows.forEach(row => tbody.appendChild(row));
    }
</script>
</body>
</html>
