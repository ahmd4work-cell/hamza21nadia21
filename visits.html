<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f9;
            --accent-green-active: #22c55e;
            --accent-green-dim: #d1fae5;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1; }

        .navbar { 
            background-color: var(--nav-navy); 
            display: flex; 
            padding: 8px 20px; 
            margin: 5px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar a { color: white; text-decoration: none; padding: 6px 15px; font-weight: 700; font-size: 13px; border-radius: 10px; }
        .navbar a.active { background-color: rgba(255,255,255,0.1); }

        .container { padding: 5px 10px; max-width: 100%; }
        .action-bar { display: flex; align-items: center; margin-bottom: 25px; gap: 10px; padding: 10px 0; }
        
        .btn-top { border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s; color: white; }
        .btn-add { background-color: var(--accent-blue); }
        .btn-save-all { background-color: var(--accent-green-dim); color: #065f46; opacity: 0.6; pointer-events: none; }
        .btn-save-all.active { background-color: var(--accent-green-active); color: white; opacity: 1; pointer-events: auto; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 1px solid var(--border-color); }
        th { background-color: #e2e8f0; padding: 8px 2px; color: var(--nav-navy); font-size: 11px; font-weight: 800; border: 1px solid var(--border-color); }
        td { padding: 0; border: 1px solid var(--border-color); text-align: center; height: 38px; font-size: 11px; }

        .excel-input { width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo'; font-size: 11px; text-align: center; outline: none; background: transparent; }
        .btn-delete { border: none; background-color: #fee2e2; color: var(--accent-red); padding: 4px 10px; border-radius: 4px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 10px; }
        .updated-at { font-size: 10px; color: #475569; font-weight: bold; }

        /* التنبيه المخصص */
        .custom-confirm {
            position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 1000; display: none; text-align: center; border: 2px solid var(--nav-navy);
        }
        .confirm-btns { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn-yes { background: var(--accent-green-active); color: white; border: none; padding: 8px 25px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
        .btn-no { background: var(--accent-red); color: white; border: none; padding: 8px 25px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
    </style>
</head>
<body onload="loadSavedData()">

<div id="confirmBox" class="custom-confirm">
    <p id="confirmMsg" style="font-weight: bold;"></p>
    <div class="confirm-btns">
        <button class="btn-yes" id="confirmBtn">نعم</button>
        <button class="btn-no" onclick="closeConfirm()">لا</button>
    </div>
</div>

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html" class="active">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html">العملاء</a>
    <a href="sales.html">المبيعات</a>
    <a href="reminders.html">تذكير</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top btn-add" onclick="insertNewRow()">+ إضافة زيارة</button>
        <button id="saveAllBtn" class="btn-top btn-save-all" onclick="saveAllData()">حفظ التغييرات</button>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 14%;">الشركة</th>
                <th>المسؤول</th>
                <th style="width: 12%;">الموبايل</th>
                <th>السجل</th>
                <th>الخدمة الحالية</th>
                <th>الخدمة المقترحة</th>
                <th style="width: 80px;">الحالة</th>
                <th style="width: 100px;">تاريخ الزيارة</th>
                <th style="width: 100px;">تاريخ التعديل</th>
                <th style="width: 70px;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let isDirty = false;

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_visits_data');
        if (saved) {
            let data = JSON.parse(saved);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(item => renderRow(item));
        }
        toggleSaveBtn(false);
    }

    function renderRow(v, isNew = false) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(isNew ? 0 : -1);
        row.setAttribute('data-created', v.created || v.date);

        row.innerHTML = `
            <td><input type="text" class="excel-input" value="${v.comp}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.mgr}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.mob}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.cr}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.curr}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.prop}" oninput="markAsChanged(this)"></td>
            <td>
                <select class="excel-input" onchange="checkStatus(this)">
                    <option value="">-</option>
                    <option ${v.status === 'مهتم' ? 'selected' : ''}>مهتم</option>
                    <option ${v.status === 'غير مهتم' ? 'selected' : ''}>غير مهتم</option>
                    <option ${v.status === 'مؤجل' ? 'selected' : ''}>مؤجل</option>
                </select>
            </td>
            <td><input type="date" class="excel-input" value="${v.date}" oninput="markAsChanged(this)"></td>
            <td class="updated-at">${v.updated}</td>
            <td><button class="btn-delete" onclick="deleteRow(this)">حذف</button></td>
        `;
    }

    function checkStatus(el) {
        markAsChanged(el);
        if (el.value === 'مهتم') {
            showConfirm("هل تريد نقل الزيارة إلى الفرص المتوقعة؟", () => transferToOpps(el.closest('tr')));
        }
    }

    function showConfirm(msg, action) {
        document.getElementById('confirmMsg').innerText = msg;
        document.getElementById('confirmBox').style.display = 'block';
        document.getElementById('confirmBtn').onclick = () => { action(); closeConfirm(); };
    }

    function closeConfirm() { document.getElementById('confirmBox').style.display = 'none'; }

    function transferToOpps(row) {
        const ins = row.querySelectorAll('.excel-input');
        const rowData = {
            comp: ins[0].value, mgr: ins[1].value, mob: ins[2].value,
            cr: ins[3].value, curr: ins[4].value, prop: ins[5].value,
            status: 'مهتم', date: ins[7].value,
            updated: new Date().toLocaleDateString('en-GB'),
            created: row.getAttribute('data-created')
        };
        
        let oppsData = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
        oppsData.push(rowData);
        localStorage.setItem('asgate_opportunities_data', JSON.stringify(oppsData));
        
        row.remove();
        saveAllData();
    }

    function insertNewRow() {
        const todayStr = new Date().toISOString().split('T')[0];
        renderRow({ comp:'', mgr:'', mob:'', cr:'', curr:'', prop:'', status:'', date: todayStr, updated: '-', created: todayStr }, true);
        toggleSaveBtn(true);
    }

    function markAsChanged(el) {
        toggleSaveBtn(true);
        const row = el.closest('tr');
        const createdDate = row.getAttribute('data-created');
        const today = new Date().toISOString().split('T')[0];
        if (today !== createdDate) {
            row.setAttribute('data-pending-update', new Date().toLocaleDateString('en-GB'));
        }
    }

    function toggleSaveBtn(active) {
        isDirty = active;
        const btn = document.getElementById('saveAllBtn');
        if(active) btn.classList.add('active'); else btn.classList.remove('active');
    }

    function saveAllData() {
        const rows = document.querySelectorAll('#tableBody tr');
        const allData = [];
        rows.forEach(row => {
            const ins = row.querySelectorAll('.excel-input');
            let updatedAt = row.querySelector('.updated-at').innerText;
            if (row.getAttribute('data-pending-update')) updatedAt = row.getAttribute('data-pending-update');
            allData.push({
                comp: ins[0].value, mgr: ins[1].value, mob: ins[2].value,
                cr: ins[3].value, curr: ins[4].value, prop: ins[5].value,
                status: ins[6].value, date: ins[7].value, updated: updatedAt,
                created: row.getAttribute('data-created')
            });
        });
        localStorage.setItem('asgate_visits_data', JSON.stringify(allData));
        loadSavedData();
    }

    function deleteRow(btn) { if(confirm("هل أنت متأكد من حذف الزيارة؟")) { btn.closest('tr').remove(); saveAllData(); } }
</script>
</body>
</html>
