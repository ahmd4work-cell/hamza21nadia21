<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - إدارة الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f9;
            --accent-green-dim: #d1fae5;
            --accent-green-active: #22c55e;
            --accent-blue: #3b82f6;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1; }

        /* شريط العناوين الكحلي بحواف دائرية */
        .navbar { 
            background-color: var(--nav-navy); 
            display: flex; 
            padding: 8px 20px; 
            margin: 5px; /* مسافة بسيطة عن الحواف */
            border-radius: 15px; /* حواف دائرية كما طلبت */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar a { 
            color: white; 
            text-decoration: none; 
            padding: 6px 15px; 
            font-weight: 700; 
            font-size: 13px; 
            transition: 0.3s;
        }
        .navbar a:hover, .navbar a.active { 
            background-color: rgba(255,255,255,0.1); 
            border-radius: 10px;
        }

        .container { padding: 5px 10px; max-width: 100%; }
        .action-bar { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; padding-top: 5px; }
        .btn-add { background-color: var(--accent-blue); color: white; border: none; padding: 5px 15px; border-radius: 6px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* الجدول بنمط الإكسل */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 1px solid var(--border-color); }
        th { background-color: #e2e8f0; padding: 6px 2px; color: var(--nav-navy); font-size: 10.5px; font-weight: 800; border: 1px solid var(--border-color); }
        td { padding: 0; border: 1px solid var(--border-color); text-align: center; height: 32px; }

        .excel-input {
            width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo';
            font-size: 11px; text-align: center; outline: none; box-sizing: border-box; background: transparent;
        }
        .excel-input:focus { background-color: #fffdec; box-shadow: inset 0 0 0 1px var(--accent-blue); }

        .btn-save { 
            border: none; padding: 4px 12px; border-radius: 4px; font-size: 10px; font-family: 'Cairo'; 
            font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
            background-color: var(--accent-green-dim);
            pointer-events: none;
        }
        .btn-save.active { background-color: var(--accent-green-active); pointer-events: auto; }
    </style>
</head>
<body onload="loadSavedData()">

<!-- شريط الصفحات المحدث -->
<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html" class="active">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html">العملاء</a>
    <a href="sales.html">المبيعات</a>
    <a href="reminders.html">تذكير</a> <!-- صفحة تذكير أصبحت الأخيرة -->
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-add" onclick="insertNewRow()">+ إضافة زيارة</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 15%;">الشركة</th>
                <th>المسؤول</th>
                <th>الموبايل</th>
                <th>السجل</th>
                <th>الخدمة الحالية</th>
                <th>الخدمة المقترحة</th>
                <th style="width: 80px;">الحالة</th>
                <th style="width: 95px;">التاريخ</th>
                <th style="width: 85px;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let isDirty = false;

    window.addEventListener('beforeunload', (e) => {
        if (isDirty) { e.preventDefault(); e.returnValue = ''; }
    });

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_visits');
        if (saved) {
            const visits = JSON.parse(saved);
            visits.forEach(v => renderRow(v));
        }
    }

    function insertNewRow() {
        renderRow({ comp:'', mgr:'', mob:'', cr:'', curr:'', prop:'', status:'50%', date: new Date().toISOString().split('T')[0] }, true);
    }

    function renderRow(v, isNew = false) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(isNew ? 0 : -1);
        row.innerHTML = `
            <td><input type="text" class="excel-input" value="${v.comp}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.mgr}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.mob}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.cr}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.curr}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.prop}" oninput="markAsChanged(this)"></td>
            <td>
                <select class="excel-input" onchange="markAsChanged(this)">
                    <option ${v.status === '50%' ? 'selected' : ''}>50%</option>
                    <option ${v.status === '20%' ? 'selected' : ''}>20%</option>
                    <option ${v.status === 'مهتم' ? 'selected' : ''}>مهتم</option>
                    <option ${v.status === 'فقدان' ? 'selected' : ''}>فقدان</option>
                </select>
            </td>
            <td><input type="date" class="excel-input" value="${v.date}" oninput="markAsChanged(this)"></td>
            <td><button class="btn-save ${isNew ? 'active' : ''}" onclick="saveAllData(this)">حفظ</button></td>
        `;
        if(isNew) isDirty = true;
    }

    function markAsChanged(el) {
        isDirty = true;
        el.closest('tr').querySelector('.btn-save').classList.add('active');
    }

    function saveAllData(btn) {
        const rows = document.querySelectorAll('#tableBody tr');
        const allVisits = [];
        rows.forEach(row => {
            const ins = row.querySelectorAll('.excel-input');
            allVisits.push({
                comp: ins[0].value, mgr: ins[1].value, mob: ins[2].value,
                cr: ins[3].value, curr: ins[4].value, prop: ins[5].value,
                status: ins[6].value, date: ins[7].value
            });
        });
        localStorage.setItem('asgate_visits', JSON.stringify(allVisits));
        isDirty = false;
        btn.classList.remove('active');
    }
</script>
</body>
</html>
