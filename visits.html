<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - إدارة الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f9;
            --accent-green-dim: #d1fae5;
            --accent-green-active: #22c55e;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1; }

        .navbar { 
            background-color: var(--nav-navy); 
            display: flex; 
            padding: 8px 20px; 
            margin: 5px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar a { color: white; text-decoration: none; padding: 6px 15px; font-weight: 700; font-size: 13px; }
        .navbar a.active { background-color: rgba(255,255,255,0.1); border-radius: 10px; }

        .container { padding: 5px 10px; max-width: 100%; }
        .action-bar { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
        .btn-add { background-color: var(--accent-blue); color: white; border: none; padding: 5px 15px; border-radius: 6px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 11px; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 1px solid var(--border-color); }
        th { background-color: #e2e8f0; padding: 6px 2px; color: var(--nav-navy); font-size: 10.5px; font-weight: 800; border: 1px solid var(--border-color); }
        td { padding: 0; border: 1px solid var(--border-color); text-align: center; height: 35px; font-size: 11px; position: relative; }

        .excel-input {
            width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo';
            font-size: 11px; text-align: center; outline: none; box-sizing: border-box; background: transparent;
        }
        .excel-input:focus { background-color: #fffdec; box-shadow: inset 0 0 0 1px var(--accent-blue); }

        /* الأزرار والإجراءات */
        .actions-cell { display: flex; gap: 4px; justify-content: center; align-items: center; height: 100%; }
        
        .btn-action { 
            border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-family: 'Cairo'; 
            font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
        }
        
        .btn-save { background-color: var(--accent-green-dim); pointer-events: none; }
        .btn-save.active { background-color: var(--accent-green-active); pointer-events: auto; }
        .btn-delete { background-color: #fca5a5; }
        .btn-delete:hover { background-color: var(--accent-red); }

        /* رابط الواتساب */
        .whatsapp-link {
            text-decoration: none; color: #128c7e; font-weight: bold; font-size: 10px; display: block; margin-top: -2px;
        }

        .updated-at { font-size: 10px; color: #475569; font-weight: bold; }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html" class="active">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html">العملاء</a>
    <a href="sales.html">المبيعات</a>
    <a href="reminders.html">تذكير</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-add" title="إضافة سطر جديد للزيارات" onclick="insertNewRow()">+ إضافة زيارة</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 14%;">الشركة</th>
                <th>المسؤول</th>
                <th style="width: 12%;">الموبايل</th>
                <th>السجل</th>
                <th>الخدمة الحالية</th>
                <th>الخدمة المقترحة</th>
                <th style="width: 70px;">الحالة</th>
                <th style="width: 90px;">تاريخ الزيارة</th>
                <th style="width: 100px;">تاريخ التعديل</th>
                <th style="width: 110px;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let isDirty = false;

    window.addEventListener('beforeunload', (e) => {
        if (isDirty) { e.preventDefault(); e.returnValue = ''; }
    });

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_visits');
        if (saved) {
            const visits = JSON.parse(saved);
            visits.forEach(v => renderRow(v));
        }
    }

    function insertNewRow() {
        const todayStr = new Date().toISOString().split('T')[0];
        renderRow({ 
            comp:'', mgr:'', mob:'', cr:'', curr:'', prop:'', status:'50%', 
            date: todayStr, updated: '-', created: todayStr 
        }, true);
    }

    function renderRow(v, isNew = false) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(isNew ? 0 : -1);
        row.setAttribute('data-created', v.created || v.date);

        row.innerHTML = `
            <td><input type="text" class="excel-input" value="${v.comp}" oninput="markAsChanged(this)" title="اسم الشركة المستهدفة"></td>
            <td><input type="text" class="excel-input" value="${v.mgr}" oninput="markAsChanged(this)" title="اسم الشخص المسؤول"></td>
            <td>
                <input type="text" class="excel-input" value="${v.mob}" oninput="updateWhatsApp(this); markAsChanged(this)" title="رقم الجوال (سيظهر رابط واتساب عند الإدخال)">
                <a href="https://wa.me/${v.mob}" target="_blank" class="whatsapp-link" style="${v.mob ? '' : 'display:none'}">واتساب ↗</a>
            </td>
            <td><input type="text" class="excel-input" value="${v.cr}" oninput="markAsChanged(this)" title="رقم السجل التجاري"></td>
            <td><input type="text" class="excel-input" value="${v.curr}" oninput="markAsChanged(this)" title="الخدمة الحالية المستخدمة"></td>
            <td><input type="text" class="excel-input" value="${v.prop}" oninput="markAsChanged(this)" title="الخدمة التي سنعرضها من ASGate"></td>
            <td>
                <select class="excel-input" onchange="markAsChanged(this)" title="احتمالية إتمام الصفقة">
                    <option ${v.status === '50%' ? 'selected' : ''}>50%</option>
                    <option ${v.status === '20%' ? 'selected' : ''}>20%</option>
                    <option ${v.status === 'مهتم' ? 'selected' : ''}>مهتم</option>
                    <option ${v.status === 'فقدان' ? 'selected' : ''}>فقدان</option>
                </select>
            </td>
            <td><input type="date" class="excel-input" value="${v.date}" oninput="markAsChanged(this)" title="تاريخ إجراء الزيارة"></td>
            <td class="updated-at" title="آخر تاريخ تم فيه تعديل البيانات">${v.updated}</td>
            <td class="actions-cell">
                <button class="btn-action btn-save ${isNew ? 'active' : ''}" onclick="saveAllData(this)" title="حفظ التعديلات الحالية">حفظ</button>
                <button class="btn-action btn-delete" onclick="deleteRow(this)" title="حذف هذه الزيارة نهائياً">حذف</button>
            </td>
        `;
        if(isNew) isDirty = true;
    }

    function updateWhatsApp(input) {
        const link = input.parentElement.querySelector('.whatsapp-link');
        const val = input.value.trim();
        if(val) {
            link.href = `https://wa.me/${val}`;
            link.style.display = 'block';
        } else {
            link.style.display = 'none';
        }
    }

    function deleteRow(btn) {
        if(confirm("هل أنت متأكد من حذف هذه الزيارة؟")) {
            btn.closest('tr').remove();
            saveAllData(null); // تحديث التخزين بعد الحذف
        }
    }

    function markAsChanged(el) {
        isDirty = true;
        const row = el.closest('tr');
        row.querySelector('.btn-save').classList.add('active');
        const createdDate = row.getAttribute('data-created');
        const today = new Date().toISOString().split('T')[0];
        const todayDisplay = new Date().toLocaleDateString('en-GB');
        if (today !== createdDate) {
            row.setAttribute('data-pending-update', todayDisplay);
        }
    }

    function saveAllData(btn) {
        if(btn) {
            const currentRow = btn.closest('tr');
            const pendingDate = currentRow.getAttribute('data-pending-update');
            if (pendingDate) currentRow.querySelector('.updated-at').innerText = pendingDate;
            btn.classList.remove('active');
        }

        const rows = document.querySelectorAll('#tableBody tr');
        const allVisits = [];
        rows.forEach(row => {
            const ins = row.querySelectorAll('.excel-input');
            allVisits.push({
                comp: ins[0].value, mgr: ins[1].value, mob: ins[2].value,
                cr: ins[3].value, curr: ins[4].value, prop: ins[5].value,
                status: ins[6].value, date: ins[7].value,
                updated: row.querySelector('.updated-at').innerText,
                created: row.getAttribute('data-created')
            });
        });
        localStorage.setItem('asgate_visits', JSON.stringify(allVisits));
        isDirty = false;
    }
</script>
</body>
</html>
