<script>
function saveNote() {
    if (currentActiveInput) {

        const newText = document.getElementById('modalTextArea').value.trim();

        if (newText !== "") {

            const todayHeader = getFullDate();
            let currentVal = currentActiveInput.value.trim();

            // تقسيم الملاحظات الحالية
            let lines = currentVal.split("\n");

            // أول سطر موجود
            let firstLine = lines[0] || "";

            // إذا كان تاريخ اليوم موجود بالفعل
            if (firstLine === todayHeader) {

                // أضف النص مباشرة تحت آخر ملاحظة لنفس اليوم
                lines.splice(1, 0, newText);

                currentActiveInput.value = lines.join("\n");

            } else {

                // يوم جديد → أضف عنوان التاريخ ثم النص
                currentActiveInput.value =
                    todayHeader +
                    "\n" +
                    newText +
                    (currentVal ? "\n\n" + currentVal : "");
            }

            updateTooltip(currentActiveInput);
        }
    }

    closeNote();
}
</script>
