<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f; --bg-color: #f4f7f9; --accent-green-active: #22c55e;
            --accent-green-dim: #d1fae5; --accent-blue: #3b82f6; --accent-red: #ef4444; 
            --border-color: #cbd5e1; --sticker-yellow: #fff9c4;
        }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }
        .navbar { background-color: var(--nav-navy); display: flex; padding: 8px 20px; margin: 5px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .navbar a { color: white; text-decoration: none; padding: 6px 15px; font-weight: 700; font-size: 13px; border-radius: 10px; }
        .navbar a.active { background-color: rgba(255,255,255,0.1); }
        
        .container { padding: 5px 10px; }
        .action-bar { display: flex; align-items: center; margin-bottom: 25px; gap: 10px; padding: 10px 0; }
        .btn-top { border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 13px; color: white; transition: 0.3s; }
        .btn-add { background-color: var(--accent-blue); }
        .btn-save-all { background-color: var(--accent-green-dim); color: #065f46; opacity: 0.6; pointer-events: none; }
        .btn-save-all.active { background-color: var(--accent-green-active); color: white; opacity: 1; pointer-events: auto; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 1px solid var(--border-color); }
        th { background-color: #e2e8f0; padding: 8px 2px; color: var(--nav-navy); font-size: 10px; font-weight: 800; border: 1px solid var(--border-color); }
        td { border: 1px solid var(--border-color); text-align: center; height: 38px; font-size: 11px; }
        .excel-input { width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo'; font-size: 11px; text-align: center; outline: none; background: transparent; }
        
        .notes-cell { cursor: pointer; color: #3b82f6; text-decoration: underline; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }

        /* ستايل الاستيكر الجديد */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2000; }
        .sticker-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 9cm; height: 17cm; background-color: var(--sticker-yellow); border-radius: 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column;
            border-top: 25px solid #fff59d; 
        }
        .sticker-history { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 12px; border-bottom: 1px dashed #decb00; text-align: right; }
        .sticker-editor { padding: 15px; height: 120px; text-align: right; }
        .date-chip { display: inline-block; background: #fbc02d; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 10px; margin-bottom: 8px; }
        .sticker-textarea { width: 100%; border: none; background: transparent; font-family: 'Cairo'; font-size: 13px; resize: none; outline: none; height: 80px; text-align: right; }
        .sticker-save-btn { width: 100%; border: none; padding: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white; font-size: 12px; background-color: #81c784; }
        .sticker-save-btn.active { background-color: #22c55e; }

        .custom-confirm { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; text-align: center; border: 2px solid var(--nav-navy); z-index: 3000; min-width: 250px; }
    </style>
</head>
<body onload="loadSavedData()">

<div id="notesOverlay" class="modal-overlay" onclick="handleOutsideClick(event)">
    <div class="sticker-container" onclick="event.stopPropagation()">
        <div id="historyArea" class="sticker-history"></div>
        <div class="sticker-editor">
            <div id="currentDateChip" class="date-chip"></div>
            <textarea id="stickerInput" class="sticker-textarea" placeholder="اكتب تحديثاً جديداً..." oninput="updateStickerBtn()"></textarea>
        </div>
        <button id="saveStickerBtn" class="sticker-save-btn" onclick="confirmAndSaveNote()">حفظ التحديث</button>
    </div>
</div>

<div id="confirmBox" class="custom-confirm">
    <p id="confirmMsg" style="font-weight: bold;"></p>
    <button class="btn-top" style="background:#22c55e; margin:5px" id="confirmBtn">نعم</button>
    <button class="btn-top" style="background:#ef4444; margin:5px" onclick="closeConfirm()">لا</button>
</div>

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html" class="active">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top btn-add" onclick="insertNewRow()">+ إضافة زيارة</button>
        <button id="saveAllBtn" class="btn-top btn-save-all" onclick="saveAllData()">حفظ التغييرات</button>
    </div>
    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 14%;">الشركة</th>
                <th style="width: 9%;">المسؤول</th>
                <th style="width: 9%;">الموبايل</th>
                <th style="width: 9%;">السجل</th>
                <th style="width: 12%;">الخدمة الحالية</th>
                <th style="width: 12%;">الخدمة المقترحة</th>
                <th style="width: 13%;">الملاحظات</th>
                <th style="width: 8%;">الحالة</th>
                <th style="width: 90px;">تاريخ الزيارة</th>
                <th style="width: 90px;">تاريخ التعديل</th>
                <th style="width: 50px;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let isDirty = false;
    let activeCell = null;
    let isStickerChanged = false;

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_visits_data');
        if (saved) {
            let data = JSON.parse(saved);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(item => renderRow(item));
        }
        toggleSaveBtn(false);
    }

    function renderRow(v, isNew = false) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(isNew ? 0 : -1);
        row.setAttribute('data-created', v.created || v.date);
        row.innerHTML = `
            <td><input type="text" class="excel-input" value="${v.comp || ''}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.mgr || ''}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.mob || ''}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.cr || ''}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.curr || ''}" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" value="${v.prop || ''}" oninput="markAsChanged(this)"></td>
            <td class="notes-cell" data-notes='${v.notes || "[]"}' onclick="openSticker(this)">${v.notes && JSON.parse(v.notes).length > 0 ? 'عرض الملاحظات...' : 'إضافة ملاحظة'}</td>
            <td>
                <select class="excel-input" onchange="checkStatus(this)">
                    <option value="" ${!v.status ? 'selected' : ''}>-</option>
                    <option ${v.status === 'مهتم' ? 'selected' : ''}>مهتم</option>
                    <option ${v.status === '50%' ? 'selected' : ''}>50%</option>
                    <option ${v.status === '20%' ? 'selected' : ''}>20%</option>
                    <option ${v.status === 'فقدان' ? 'selected' : ''}>فقدان</option>
                </select>
            </td>
            <td><input type="date" class="excel-input" value="${v.date}" oninput="markAsChanged(this)"></td>
            <td class="updated-at">${v.updated || '-'}</td>
            <td><button style="border:none; background:#fee2e2; color:red; cursor:pointer; font-size:10px; border-radius:4px; padding:4px;" onclick="deleteRow(this)">حذف</button></td>
        `;
    }

    function openSticker(cell) {
        activeCell = cell; isStickerChanged = false;
        const notes = JSON.parse(cell.getAttribute('data-notes') || "[]");
        let historyHtml = "";
        notes.forEach((n, idx) => {
            historyHtml += `<div style="margin-bottom:10px;"><strong>${n.date}</strong><br>${n.text}</div>`;
            if(idx < notes.length - 1) historyHtml += '<hr style="border:0; border-top:1px solid #decb00">';
        });
        document.getElementById('historyArea').innerHTML = historyHtml;
        const now = new Date(); const days = ['الأحد', 'الأثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        document.getElementById('currentDateChip').innerText = `${days[now.getDay()]} ${now.toLocaleDateString('en-GB')}`;
        document.getElementById('stickerInput').value = '';
        document.getElementById('saveStickerBtn').classList.remove('active');
        document.getElementById('notesOverlay').style.display = 'block';
    }

    function updateStickerBtn() {
        isStickerChanged = document.getElementById('stickerInput').value.trim() !== "";
        document.getElementById('saveStickerBtn').classList.toggle('active', isStickerChanged);
    }

    function handleOutsideClick(e) {
        if (isStickerChanged) showConfirm("هل تريد حفظ التغييرات في الملاحظات؟", confirmAndSaveNote);
        else document.getElementById('notesOverlay').style.display = 'none';
    }

    function confirmAndSaveNote() {
        const text = document.getElementById('stickerInput').value.trim();
        if (text) {
            let notes = JSON.parse(activeCell.getAttribute('data-notes') || "[]");
            const todayStr = document.getElementById('currentDateChip').innerText;
            if (notes.length > 0 && notes[notes.length - 1].date === todayStr) {
                notes[notes.length - 1].text += `<br>• ${text}`;
            } else {
                notes.push({ date: todayStr, text: text });
            }
            activeCell.setAttribute('data-notes', JSON.stringify(notes));
            activeCell.innerText = 'عرض الملاحظات...';
            markAsChanged(activeCell);
        }
        isStickerChanged = false; document.getElementById('notesOverlay').style.display = 'none'; closeConfirm();
    }

    function checkStatus(el) {
        markAsChanged(el);
        if (el.value === 'مهتم') showConfirm("هل تريد نقل الزيارة إلى الفرص المتوقعة؟", () => transferToOpps(el.closest('tr')));
    }

    function transferToOpps(row) {
        const ins = row.querySelectorAll('.excel-input');
        const rowData = {
            comp: ins[0].value, mgr: ins[1].value, mob: ins[2].value, cr: ins[3].value, curr: ins[4].value, prop: ins[5].value,
            notes: row.querySelector('.notes-cell').getAttribute('data-notes'), status: 'مهتم', 
            date: ins[6].value, updated: '-', created: row.getAttribute('data-created')
        };
        let oppsData = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
        oppsData.push(rowData); localStorage.setItem('asgate_opportunities_data', JSON.stringify(oppsData));
        row.remove(); saveAllData();
    }

    function markAsChanged(el) { toggleSaveBtn(true); const row = el.closest('tr'); if (row.getAttribute('data-created') !== new Date().toISOString().split('T')[0]) row.setAttribute('data-pending-update', new Date().toLocaleDateString('en-GB')); }
    function toggleSaveBtn(active) { isDirty = active; document.getElementById('saveAllBtn').classList.toggle('active', active); }
    function saveAllData() {
        const allData = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            const ins = row.querySelectorAll('.excel-input');
            let upd = row.querySelector('.updated-at').innerText;
            if (row.getAttribute('data-pending-update')) upd = row.getAttribute('data-pending-update');
            allData.push({ comp: ins[0].value, mgr: ins[1].value, mob: ins[2].value, cr: ins[3].value, curr: ins[4].value, prop: ins[5].value, notes: row.querySelector('.notes-cell').getAttribute('data-notes'), status: ins[6].value, date: ins[7].value, updated: upd, created: row.getAttribute('data-created') });
        });
        localStorage.setItem('asgate_visits_data', JSON.stringify(allData)); loadSavedData();
    }
    function insertNewRow() { renderRow({ date: new Date().toISOString().split('T')[0], updated: '-', created: new Date().toISOString().split('T')[0] }, true); toggleSaveBtn(true); }
    function deleteRow(btn) { if(confirm("حذف؟")) { btn.closest('tr').remove(); saveAllData(); } }
    function showConfirm(msg, action) { document.getElementById('confirmMsg').innerText = msg; document.getElementById('confirmBox').style.display = 'block'; document.getElementById('confirmBtn').onclick = () => { action(); closeConfirm(); }; }
    function closeConfirm() { document.getElementById('confirmBox').style.display = 'none'; }
</script>
</body>
</html>
