<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - إدارة الزيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f9;
            --accent-green-dim: #a7f3d0; /* أخضر خافت جداً */
            --accent-green-active: #22c55e; /* أخضر فاتح نشط */
            --accent-blue: #3b82f6;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1; }

        /* شريط الإجراءات */
        .container { padding: 5px; max-width: 100%; }
        .action-bar { display: flex; align-items: center; margin-bottom: 5px; gap: 8px; }
        .btn-add { background-color: var(--accent-blue); color: white; border: none; padding: 4px 12px; border-radius: 4px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* الجدول بنمط الإكسل */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; border-spacing: 0; background: white; border: 1px solid var(--border-color); }
        th { background-color: #e2e8f0; padding: 4px 2px; color: var(--nav-navy); font-size: 10.5px; font-weight: 800; border: 1px solid var(--border-color); }
        td { padding: 0; border: 1px solid var(--border-color); text-align: center; height: 28px; }

        /* مدخلات الإكسل */
        .excel-input {
            width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo';
            font-size: 11px; text-align: center; outline: none; box-sizing: border-box; background: transparent;
        }
        .excel-input:focus { background-color: #fffdec; box-shadow: inset 0 0 0 1px var(--accent-blue); }

        /* أزرار الإجراءات */
        .btn-save { 
            border: none; padding: 2px 10px; border-radius: 3px; font-size: 10px; font-family: 'Cairo'; 
            font-weight: bold; cursor: pointer; color: white; transition: 0.3s;
            background-color: var(--accent-green-dim); /* الافتراضي خافت */
            pointer-events: none; /* غير قابل للضغط في الحالة الخافتة */
        }
        .btn-save.active { 
            background-color: var(--accent-green-active); 
            pointer-events: auto; /* يصبح قابل للضغط */
            box-shadow: 0 2px 4px rgba(34, 197, 94, 0.3);
        }

        .status-pill { padding: 1px 6px; border-radius: 8px; font-size: 9.5px; font-weight: bold; background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="action-bar">
        <button class="btn-add" onclick="insertNewRow()">+ إضافة زيارة</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 15%;">الشركة</th>
                <th>المسؤول</th>
                <th>الموبايل</th>
                <th>السجل</th>
                <th>الخدمة الحالية</th>
                <th>الخدمة المقترحة</th>
                <th style="width: 80px;">الحالة</th>
                <th style="width: 90px;">التاريخ</th>
                <th style="width: 80px;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- الصفوف تضاف هنا -->
        </tbody>
    </table>
</div>

<script>
    let isDirty = false; // لمتابعة وجود تغييرات غير محفوظة

    // تنبيه المتصفح عند الخروج
    window.addEventListener('beforeunload', (e) => {
        if (isDirty) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    function insertNewRow() {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(0);
        
        row.innerHTML = `
            <td><input type="text" class="excel-input" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" oninput="markAsChanged(this)"></td>
            <td><input type="text" class="excel-input" oninput="markAsChanged(this)"></td>
            <td>
                <select class="excel-input" onchange="markAsChanged(this)">
                    <option>50%</option><option>20%</option><option>مهتم</option><option>فقدان</option>
                </select>
            </td>
            <td><input type="date" class="excel-input" value="${new Date().toISOString().split('T')[0]}" oninput="markAsChanged(this)"></td>
            <td>
                <button class="btn-save" onclick="saveData(this)">حفظ</button>
            </td>
        `;
    }

    // وظيفة تحويل الزر للأخضر الفاتح عند أي تغيير
    function markAsChanged(element) {
        isDirty = true;
        const row = element.closest('tr');
        const saveBtn = row.querySelector('.btn-save');
        saveBtn.classList.add('active'); // تحويل الزر للون الأخضر الفاتح والنشط
    }

    function saveData(btn) {
        // هنا يتم استدعاء Firebase مستقبلاً لحفظ البيانات
        isDirty = false;
        btn.classList.remove('active'); // يعود للون الخافت بعد الحفظ
        alert("تم حفظ التغييرات بنجاح");
    }
</script>
</body>
</html>
