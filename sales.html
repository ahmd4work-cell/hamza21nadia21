<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-shiny-navy: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            --header-shiny-purple: linear-gradient(180deg, #4c1d95 0%, #2e1065 100%);
            --bg-color: #f4f7f9;
            --accent-blue: #3b82f6;
            --border-soft: #cbd5e1;
            --text-dark: #1e293b;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        
        .table-header { display: grid; grid-template-columns: 100px 1fr 120px 150px 100px 100px; padding: 12px; background: #e2e8f0; font-weight: bold; border-radius: 8px; margin-bottom: 5px; }
        .table-row { display: grid; grid-template-columns: 100px 1fr 120px 150px 100px 100px; padding: 10px; border-bottom: 1px solid #ddd; align-items: center; background: white; }
        
        /* تصميم الحالات بحواف دائرية */
        .status-badge { padding: 4px 12px; border-radius: 15px; font-size: 11px; color: white; text-align: center; display: inline-block; }
        .status-complete { background-color: #22c55e; } /* أخضر */
        .status-pending { background-color: #eab308; }  /* أصفر */
        .status-lost { background-color: #ef4444; }     /* أحمر */
        
        .btn-bulk-trigger { cursor: pointer; padding: 5px 10px; border: none; background: var(--accent-blue); color: white; border-radius: 4px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <table id="salesTable" style="width: 100%;">
        <thead>
            <tr class="table-header">
                <th>التاريخ</th>
                <th>اسم العميل</th>
                <th>الحالة</th>
                <th>تاريخ التعديل</th>
                <th>المبلغ</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="salesBody">
            </tbody>
    </table>
</div>

<script>
    // دالة عرض الصفوف
    function renderTableRow(item) {
        const body = document.getElementById('salesBody');
        const row = document.createElement('tr');
        row.className = 'table-row';
        
        // منطق تحديد لون الحالة
        let statusClass = '';
        if (item.status === 'مكتمل') statusClass = 'status-complete';
        else if (item.status === 'معلق') statusClass = 'status-pending';
        else if (item.status === 'فقدان') statusClass = 'status-lost';
        else statusClass = 'status-pending'; 

        row.innerHTML = `
            <td>${item.date}</td>
            <td>${item.customerName}</td>
            <td><span class="status-badge ${statusClass}">${item.status || 'معلق'}</span></td>
            <td>${item.lastModifiedDate || '---'}</td> 
            <td>${item.amount}</td>
            <td><button class="btn-bulk-trigger">إجراء</button></td>
        `;
        body.appendChild(row);
    }
</script>

</body>
</html>
