<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - المبيعات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* تم الحفاظ على نفس تصميم المتغيرات (CSS Variables) لتوحيد الواجهة */
        :root {
            --nav-shiny-navy: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            --header-shiny-purple: linear-gradient(180deg, #4c1d95 0%, #2e1065 100%);
            --nav-bg: #0f172a;
            --nav-active: #a78bfa;
            --bg-color: #f8fafc;
            --white: #ffffff;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --border-soft: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        /* (ملاحظة: تم الإبقاء على نفس تنسيقات الـ CSS الأساسية لضمان تطابق الشكل) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-color); font-family: 'Cairo', sans-serif; font-size: 12px; }
        .dashboard-container { display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        /* Navbar */
        .navbar { background: var(--nav-shiny-navy); display: flex; align-items: center; padding: 0 20px; margin: 10px 10px 5px 10px; border-radius: 10px; height: 40px; flex-shrink: 0; }
        .navbar a { color: white; text-decoration: none; padding: 0 15px; font-weight: 700; font-size: 11.5px; height: 28px; line-height: 28px; display: inline-block; transition: 0.3s; opacity: 0.85; }
        .navbar a.active { background-color: var(--nav-active); color: #0f172a; border-radius: 6px; opacity: 1; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 0 15px 10px 15px; min-height: 0; gap: 8px; }
        .action-bar { display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-top: 5px; }
        
        /* Buttons & Search */
        .btn-top { border: none; padding: 0 18px; border-radius: 8px; font-family: 'Cairo'; font-weight: 800; cursor: pointer; color: white; height: 38px; display: flex; align-items: center; gap: 6px; }
        .btn-add { background-color: var(--accent-blue); }
        .search-input { width: 200px; height: 38px; padding: 0 10px; border-radius: 8px; border: 1px solid var(--border-soft); font-family: 'Cairo'; }
        
        /* Table Styles */
        .table-wrapper { background: white; border-radius: 10px; overflow-y: auto; border: 1px solid var(--border-soft); flex: 1; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--header-shiny-purple); color: white; padding: 10px; font-size: 11px; text-align: center; position: sticky; top: 0; z-index: 50; }
        td { border-bottom: 1px solid #f1f5f9; text-align: center; height: 38px; }
        
        .excel-input { width: 90%; border: 1px solid transparent; text-align: center; font-family: 'Cairo'; background: transparent; }
        .excel-input:focus { background: #fff; border-color: var(--accent-blue); outline: none; }
        
        .status-select { font-weight: 700; }
    </style>
</head>
<body onload="loadSavedData()">

<div class="dashboard-container">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
        <a href="sales.html" class="active">المبيعات</a>
    </nav>

    <div class="main-content">
        <div class="action-bar">
            <button class="btn-top btn-add" onclick="insertNewRow()"><i class="fas fa-plus"></i> إضافة بيع جديد</button>
            <input type="text" id="searchInput" class="search-input" placeholder="بحث في المبيعات..." onkeyup="filterTable()">
        </div>
        
        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th style="width: 5%">م</th>
                        <th style="width: 15%">العميل</th>
                        <th style="width: 15%">المنتج/الخدمة</th>
                        <th style="width: 10%">الكمية</th>
                        <th style="width: 10%">السعر</th>
                        <th style="width: 10%">الإجمالي</th>
                        <th style="width: 10%">تاريخ البيع</th>
                        <th style="width: 10%">الحالة</th>
                        <th style="width: 15%">ملاحظات</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'asgate_sales_final_v31';

    function loadSavedData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            document.getElementById('tableBody').innerHTML = '';
            JSON.parse(saved).forEach(v => renderRow(v));
        }
    }

    function saveAllDataSilently() {
        const data = [];
        document.querySelectorAll('.main-row').forEach(row => {
            const inputs = row.querySelectorAll('input, select');
            data.push({
                client: inputs[1].value,
                prod: inputs[2].value,
                qty: inputs[3].value,
                price: inputs[4].value,
                total: inputs[5].value,
                date: inputs[6].value,
                status: inputs[7].value,
                notes: inputs[8].value
            });
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function insertNewRow() {
        renderRow({});
    }

    function renderRow(v = {}) {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.className = 'main-row';
        row.innerHTML = `
            <td><input type="checkbox" class="select-check"></td>
            <td><input type="text" class="excel-input" value="${v.client || ''}" onblur="saveAllDataSilently()"></td>
            <td><input type="text" class="excel-input" value="${v.prod || ''}" onblur="saveAllDataSilently()"></td>
            <td><input type="number" class="excel-input" value="${v.qty || 1}" oninput="calcTotal(this)" onblur="saveAllDataSilently()"></td>
            <td><input type="number" class="excel-input" value="${v.price || 0}" oninput="calcTotal(this)" onblur="saveAllDataSilently()"></td>
            <td><input type="text" class="excel-input total-val" value="${v.total || 0}" readonly></td>
            <td><input type="date" class="excel-input" value="${v.date || new Date().toISOString().split('T')[0]}" onblur="saveAllDataSilently()"></td>
            <td>
                <select class="excel-input status-select" onchange="saveAllDataSilently()">
                    <option value="مكتمل" ${v.status === 'مكتمل' ? 'selected' : ''}>مكتمل</option>
                    <option value="معلق" ${v.status === 'معلق' ? 'selected' : ''}>معلق</option>
                </select>
            </td>
            <td><input type="text" class="excel-input" value="${v.notes || ''}" onblur="saveAllDataSilently()"></td>
        `;
        tbody.appendChild(row);
    }

    function calcTotal(el) {
        const row = el.closest('tr');
        const qty = parseFloat(row.querySelector('input[type="number"]:nth-of-type(1)').value) || 0;
        const price = parseFloat(row.querySelector('input[type="number"]:nth-of-type(2)').value) || 0;
        row.querySelector('.total-val').value = qty * price;
        saveAllDataSilently();
    }

    function filterTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.main-row').forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(q) ? 'table-row' : 'none';
        });
    }
</script>

</body>
</html>
