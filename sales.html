<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المبيعات | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --nav-purple: #2e1065; 
            --nav-active: #a78bfa; 
            --bg: #f4f7f9; 
            --white: #ffffff;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
            --accent-yellow: #eab308;
            --border: #e2e8f0;
        }
        
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; }

        /* شريط التنقل بعد التعديل */
        .navbar { 
            background-color: var(--nav-purple); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            margin: 10px; 
            border-radius: 15px; 
            height: 37px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 10px;
            z-index: 1000;
            box-sizing: border-box;
        }

        .navbar a { 
            color: white; 
            text-decoration: none; 
            padding: 0 15px; 
            font-weight: 700; 
            font-size: 12px; 
            border-radius: 8px; 
            transition: 0.3s; 
            line-height: 26px; 
            height: 26px; 
            display: inline-block;
            font-family: 'Cairo', sans-serif;
        }

        .navbar a.active { 
            background-color: var(--nav-active); 
            color: white; 
            border-radius: 8px;
        }

        .navbar a:hover:not(.active) { 
            background-color: rgba(255,255,255,0.1); 
        }

        .container { padding: 5px 15px; max-width: 100%; margin: auto; }

        /* كروت الإحصائيات */
        .stats-grid { 
            display: flex; 
            justify-content: space-between; 
            gap: 12px; 
            margin-top: 10px;
            margin-bottom: 15px; 
        }
        .stat-card { 
            flex: 1; 
            background: var(--white); 
            padding: 12px 18px; 
            border-radius: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-right: 4px solid var(--accent-green);
            display: flex;
            flex-direction: column;
        }
        .stat-label { font-size: 11px; color: #64748b; font-weight: bold; margin-bottom: 2px; }
        .stat-value { font-size: 18px; color: var(--nav-purple); font-weight: 800; }

        /* منطقة التحكم */
        .actions-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px;
            gap: 15px;
        }
