<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASGate - الفرص البيعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-dark-purple: #4c1d95; /* لون بنفسجي داكن للشريط */
            --active-light-purple: #a78bfa; /* لون بنفسجي فاتح للرابط النشط */
            --bg-color: #f4f7f9;
            --accent-blue: #3b82f6;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }

        /* شريط التنقل الموحد - ارتفاع 37 بكسل */
        .navbar { 
            background-color: var(--nav-dark-purple); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            margin: 10px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 10px;
            z-index: 1000;
            height: 37px; 
            box-sizing: border-box;
        }

        .navbar a { 
            color: white; 
            text-decoration: none; 
            padding: 4px 15px; 
            margin-left: 5px; 
            font-weight: 700; 
            font-size: 11px; 
            border-radius: 10px; 
            transition: 0.3s; 
            line-height: 1;
        }

        /* تمييز الفرص البيعية بمربع بنفسجي فاتح */
        .navbar a.active { 
            background-color: var(--active-light-purple); 
            color: white; 
            border-radius: 8px;
        }
        
        .navbar a:hover:not(.active) { background-color: rgba(255,255,255,0.1); }

        .container { padding: 5px 10px; }
        .action-bar { display: flex; align-items: center; margin-top: 15px; margin-bottom: 20px; gap: 10px; padding: 10px 0; }
        
        .btn-top { border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 13px; color: white; transition: 0.3s; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 1px solid var(--border-color); }
        th { background-color: #f5f3ff; padding: 8px 2px; color: var(--nav-dark-purple); font-size: 10px; font-weight: 800; border: 1px solid var(--border-color); }
        td { border: 1px solid var(--border-color); text-align: center; height: 38px; font-size: 11px; }

        .excel-input { width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo'; font-size: 11px; text-align: center; outline: none; background: transparent; }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html" class="active">الفرص البيعية</a>
    <a href="customers.html">العملاء</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top" style="background:var(--accent-blue)" onclick="insertNewRow()">+ إضافة فرصة جديدة</button>
        <button id="saveAllBtn" class="btn-top" style="background:#ddd; color:#666; cursor:not-allowed;" onclick="saveAllData()">حفظ التغييرات</button>
    </div>
    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 20%;">اسم الشركة</th>
                <th style="width: 15%;">النشاط</th>
                <th style="width: 15%;">المبلغ المتوقع</th>
                <th style="width: 15%;">المرحلة</th>
                <th style="width: 25%;">ملاحظات</th>
                <th style="width: 10%;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let isDirty = false;

    function markAsChanged() {
        isDirty = true;
        const btn = document.getElementById('saveAllBtn');
        btn.style.background = "#22c55e";
        btn.style.color = "white";
        btn.style.cursor = "pointer";
    }

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_opps_data');
        if (saved) {
            const data = JSON.parse(saved);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(item => renderRow(item));
        }
    }

    function renderRow(v) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(-1);
        row.innerHTML = `
            <td><input type="text" class="excel-input" value="${v.comp || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.activity || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.amount || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.stage || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.notes || ''}" oninput="markAsChanged()"></td>
            <td><button style="border:none; background:#fee2e2; color:red; cursor:pointer; font-size:10px; border-radius:4px; padding:4px;" onclick="deleteRow(this)">حذف</button></td>
        `;
    }

    function insertNewRow() {
        renderRow({});
        markAsChanged();
    }

    function deleteRow(btn) {
        if(confirm("هل تريد حذف هذه الفرصة؟")) {
            btn.closest('tr').remove();
            saveAllData();
        }
    }

    function saveAllData() {
        const allData = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            const ins = row.querySelectorAll('.excel-input');
            allData.push({ 
                comp: ins[0].value, 
                activity: ins[1].value, 
                amount: ins[2].value, 
                stage: ins[3].value, 
                notes: ins[4].value 
            });
        });
        localStorage.setItem('asgate_opps_data', JSON.stringify(allData));
        location.reload();
    }
</script>
</body>
</html>
