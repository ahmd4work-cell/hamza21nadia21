<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASGate - الفرص البيعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --nav-navy: #001f3f; --bg-color: #fffbeb; --accent-gold: #f59e0b; }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }
        .navbar { background-color: var(--nav-navy); display: flex; padding: 8px 20px; margin: 5px; border-radius: 15px; }
        .navbar a { color: white; text-decoration: none; padding: 6px 15px; font-weight: 700; font-size: 13px; border-radius: 10px; }
        .navbar a.active { background-color: var(--accent-gold); }
        .container { padding: 20px; }
        .opp-card { background: white; border-right: 5px solid var(--accent-gold); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body onload="loadOpps()">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html" class="active">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
    </nav>
    <div class="container">
        <h2>قائمة العملاء المهتمين (الفرص)</h2>
        <div id="oppsList"></div>
    </div>
    <script>
        function loadOpps() {
            const data = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
            const list = document.getElementById('oppsList');
            list.innerHTML = data.length === 0 ? '<p>لا توجد فرص حالية.</p>' : '';
            data.forEach((o, idx) => {
                list.innerHTML += `
                    <div class="opp-card">
                        <div><strong>${o.comp}</strong><br><small>${o.mgr} | ${o.mob}</small></div>
                        <button onclick="deleteOpp(${idx})" style="color:red; background:none; border:none; cursor:pointer;">إغلاق الفرصة</button>
                    </div>
                `;
            });
        }
        function deleteOpp(idx) { if(confirm('إغلاق الفرصة؟')) { let data = JSON.parse(localStorage.getItem('asgate_opportunities_data')); data.splice(idx, 1); localStorage.setItem('asgate_opportunities_data', JSON.stringify(data)); loadOpps(); } }
    </script>
</body>
</html>
