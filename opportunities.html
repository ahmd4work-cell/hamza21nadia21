<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASGate - الفرص البيعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --nav-navy: #001f3f; --accent-gold: #f59e0b; }
        body { background-color: #f8fafc; font-family: 'Cairo', sans-serif; margin: 0; }
        .navbar { background-color: var(--nav-navy); display: flex; padding: 10px 20px; margin: 5px; border-radius: 15px; }
        .navbar a { color: white; text-decoration: none; padding: 8px 15px; font-weight: 700; font-size: 13px; border-radius: 10px; }
        .navbar a.active { background-color: var(--accent-gold); }
        .container { padding: 20px; }
        .opp-table { width: 100%; border-collapse: collapse; background: white; }
        .opp-table th { background: var(--nav-navy); color: white; padding: 12px; }
        .opp-table td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
    </style>
</head>
<body onload="loadOpps()">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html" class="active">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
    </nav>
    <div class="container">
        <h2 style="color:var(--nav-navy)">الفرص البيعية النشطة</h2>
        <table class="opp-table">
            <thead><tr><th>الشركة</th><th>المسؤول</th><th>الموبايل</th><th>الحالة</th><th>إجراء</th></tr></thead>
            <tbody id="oppsBody"></tbody>
        </table>
    </div>
    <script>
        function loadOpps() {
            const data = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
            const body = document.getElementById('oppsBody');
            body.innerHTML = data.length === 0 ? '<tr><td colspan="5">لا توجد فرص حالية</td></tr>' : '';
            data.forEach((o, idx) => {
                body.innerHTML += `<tr><td>${o.comp}</td><td>${o.mgr}</td><td>${o.mob}</td><td style="color:green;font-weight:bold">مهتم</td><td><button onclick="del(${idx})">إغلاق</button></td></tr>`;
            });
        }
        function del(idx) {
            let data = JSON.parse(localStorage.getItem('asgate_opportunities_data'));
            data.splice(idx, 1);
            localStorage.setItem('asgate_opportunities_data', JSON.stringify(data));
            loadOpps();
        }
    </script>
</body>
</html>
