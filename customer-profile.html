<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملف العميل | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --nav-navy: #001f3f; --accent-blue: #3b82f6; --white: #ffffff; }
        body { background-color: #f0f4f8; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .navbar { background-color: var(--nav-navy); display: flex; padding: 10px 20px; margin: -20px -20px 20px -20px; border-radius: 0; }
        .navbar a { color: white; text-decoration: none; padding: 8px 15px; font-weight: 700; font-size: 13px; }
        
        .header-card { background: var(--white); border-radius: 15px; padding: 25px; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tabs-bar { display: flex; background: var(--nav-navy); border-radius: 10px; padding: 5px; gap: 5px; margin: 20px 0; }
        .tab-btn { flex: 1; border: none; background: transparent; color: white; padding: 12px; cursor: pointer; font-family: 'Cairo'; border-radius: 8px; }
        .tab-btn.active { background: var(--accent-blue); }
        
        .content-area { background: var(--white); border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; background: #f8fafc; padding: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; width: 450px; margin: 50px auto; padding: 25px; border-radius: 15px; }
    </style>
</head>
<body onload="loadProfile()">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
    </nav>

    <div class="header-card">
        <div><h1 id="p-name">-</h1><p id="p-cr">-</p></div>
        <div id="p-contacts" style="background:#f8fafc; padding:15px; border-radius:10px;"></div>
    </div>

    <div class="tabs-bar">
        <button class="tab-btn active">سجل النشاط</button>
        <button class="tab-btn" style="background:#22c55e" onclick="openModal()">+ تسجيل زيارة/فرصة</button>
    </div>

    <div class="content-area">
        <table>
            <thead><tr><th>التاريخ</th><th>الخدمة</th><th>الحالة</th><th>الملاحظات</th></tr></thead>
            <tbody id="h-body"></tbody>
        </table>
    </div>

    <div id="vModal" class="modal">
        <div class="modal-content">
            <h3>تسجيل نشاط جديد</h3>
            <input type="date" id="v-date" style="width:100%; margin-bottom:10px;">
            <select id="v-status" style="width:100%; margin-bottom:10px; padding:10px;">
                <option value="زيارة عادية">زيارة عادية</option>
                <option value="مهتم">مهتم (تحويل للفرص)</option>
            </select>
            <textarea id="v-notes" placeholder="الملاحظات" style="width:100%; height:80px; margin-bottom:10px;"></textarea>
            <button onclick="save()" style="width:100%; background:#22c55e; color:white; border:none; padding:10px;">حفظ</button>
            <button onclick="document.getElementById('vModal').style.display='none'" style="width:100%; margin-top:5px;">إلغاء</button>
        </div>
    </div>

    <script>
        const name = new URLSearchParams(window.location.search).get('name');
        let currentCust = null;

        function loadProfile() {
            const custs = JSON.parse(localStorage.getItem('asgate_customers_data') || '[]');
            currentCust = custs.find(c => c.comp === name);
            if(currentCust) {
                document.getElementById('p-name').innerText = currentCust.comp;
                document.getElementById('p-cr').innerText = "سجل: " + currentCust.cr;
                document.getElementById('p-contacts').innerHTML = `المسؤول: ${currentCust.mgr} <br> الموبايل: ${currentCust.mob}`;
                loadHistory();
            }
        }

        function loadHistory() {
            const v = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
            const o = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
            const history = [...v, ...o].filter(i => i.comp === name);
            const body = document.getElementById('h-body');
            body.innerHTML = '';
            history.forEach(h => {
                body.innerHTML += `<tr><td>${h.date}</td><td>${h.prop || '-'}</td><td>${h.status}</td><td>${h.notes}</td></tr>`;
            });
        }

        function openModal() { document.getElementById('v-date').value = new Date().toISOString().split('T')[0]; document.getElementById('vModal').style.display='block'; }

        function save() {
            const status = document.getElementById('v-status').value;
            const entry = {
                comp: name, mgr: currentCust.mgr, mob: currentCust.mob,
                status: status, date: document.getElementById('v-date').value,
                notes: document.getElementById('v-notes').value, prop: 'تحديث من ملف العميل'
            };
            
            if(status === 'مهتم') {
                let data = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
                data.push(entry); localStorage.setItem('asgate_opportunities_data', JSON.stringify(data));
            } else {
                let data = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
                data.push(entry); localStorage.setItem('asgate_visits_data', JSON.stringify(data));
            }
            alert("تم الحفظ بنجاح");
            location.reload();
        }
    </script>
</body>
</html>
