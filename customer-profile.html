<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملف العميل | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --nav-purple: #2e1065; 
            --nav-active: #a78bfa; 
            --bg: #f4f7f9; 
            --white: #ffffff;
            --order-green: #22c55e;
            --visit-yellow: #eab308;
        }
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; }
        
        .navbar { background-color: var(--nav-purple); display: flex; align-items: center; padding: 0 20px; margin: 10px; border-radius: 15px; height: 37px; }
        .navbar a { color: white; text-decoration: none; padding: 0 15px; font-weight: 700; font-size: 11px; }

        .container { padding: 10px 15px; max-width: 1200px; margin: auto; }

        /* المربع الموحد */
        .unified-card { 
            background: var(--white); border-radius: 15px; padding: 12px 20px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px;
            border-right: 5px solid var(--nav-purple);
        }
        .data-column h3 { font-size: 13px; color: var(--nav-purple); margin: 0 0 8px 0; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; }
        .info-row { display: flex; margin-bottom: 4px; font-size: 12px; }
        .info-row label { width: 90px; color: #94a3b8; font-weight: bold; }
        .info-row span { font-weight: 700; color: #1e293b; }

        /* شريط الأدوات المدمج في سطر واحد */
        .control-strip { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 12px;
            background: transparent;
        }

        /* تصغير أزرار الإضافة */
        .add-btn {
            border: none; border-radius: 8px; padding: 0 15px; 
            color: white; font-family: 'Cairo'; font-weight: bold; font-size: 11px; 
            cursor: pointer; height: 36px; display: flex; align-items: center; gap: 5px;
            white-space: nowrap; transition: 0.2s;
        }
        .btn-green { background-color: var(--order-green); }
        .btn-yellow { background-color: var(--visit-yellow); }
        .add-btn:hover { opacity: 0.9; transform: scale(0.98); }

        /* شريط التبديل البنفسجي بجانب الأزرار */
        .tabs-wrapper { 
            display: flex; background: var(--nav-purple); padding: 3px; 
            border-radius: 10px; gap: 2px; flex-grow: 1; height: 30px; align-items: center;
        }
        .tab-btn { 
            flex: 1; border: none; background: transparent; color: rgba(255,255,255,0.7); 
            height: 28px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; 
            font-size: 11px; border-radius: 7px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--nav-active); color: white; }

        /* منطقة المحتوى */
        .content-area { 
            background: white; border-radius: 15px; padding: 15px; 
            min-height: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }
        .content-area.mode-visit { border-color: var(--visit-yellow); background-color: #fffdf5; }
        .content-area.mode-order { border-color: var(--order-green); background-color: #f6fff9; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: right; color: #64748b; padding: 8px; border-bottom: 2px solid #eee; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body onload="loadClientData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html">العملاء</a>
</nav>

<div class="container">
    <div class="unified-card">
        <div class="data-column">
            <h3>🏢 بيانات المنشأة</h3>
            <div class="info-row"><label>الشركة:</label><span id="c-name">-</span></div>
            <div class="info-row"><label>السجل:</label><span id="c-cr">-</span></div>
            <div class="info-row"><label>العنوان:</label><span id="c-addr">-</span></div>
        </div>
        <div class="data-column" style="border-right: 1px solid #f1f5f9; padding-right: 25px;">
            <h3>👤 المسؤول المباشر</h3>
            <div class="info-row"><label>الاسم:</label><span id="m-name">-</span></div>
            <div class="info-row"><label>الموبايل:</label><span id="m-mob">-</span></div>
            <div class="info-row"><label>تاريخ الإضافة:</label><span>16/05/2026</span></div>
        </div>
    </div>

    <div class="control-strip">
        <button class="add-btn btn-green" onclick="alert('إضافة طلب')">🛒 طلب جديد</button>
        <button class="add-btn btn-yellow" onclick="alert('إضافة زيارة')">🚗 زيارة جديدة</button>
        
        <div class="tabs-wrapper">
            <button class="tab-btn active" id="btn-v" onclick="openTab('v-history')">سجل الزيارات</button>
            <button class="tab-btn" id="btn-o" onclick="openTab('o-history')">سجل الطلبات</button>
            <button class="tab-btn" onclick="openTab('attachments')">المرفقات</button>
        </div>
    </div>

    <div class="content-area mode-visit" id="display-frame">
        <h4 id="frame-title" style="margin:0 0 10px 0; font-size:13px;">📅 سجل الزيارات</h4>
        <div id="table-content"></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const clientName = urlParams.get('name');

    function loadClientData() {
        if(!clientName) return;
        const data = JSON.parse(localStorage.getItem('asgate_customers_data') || '[]');
        const client = data.find(c => c.comp === clientName);

        if(client) {
            document.getElementById('c-name').innerText = client.comp;
            document.getElementById('c-cr').innerText = client.cr || 'غير مسجل';
            document.getElementById('c-addr').innerText = client.address || 'غير محدد';
            document.getElementById('m-name').innerText = client.mgr || '-';
            document.getElementById('m-mob').innerText = client.mob || '-';
            openTab('v-history');
        }
    }

    function openTab(tab) {
        const frame = document.getElementById('display-frame');
        const title = document.getElementById('frame-title');
        const content = document.getElementById('table-content');
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        if(tab === 'v-history') {
            document.getElementById('btn-v').classList.add('active');
            frame.className = "content-area mode-visit";
            title.innerText = "📅 سجل الزيارات";
            const visits = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]').filter(v => v.comp === clientName);
            content.innerHTML = visits.length > 0 ? `
                <table>
                    <thead><tr><th>التاريخ</th><th>النوع</th><th>الملاحظات</th></tr></thead>
                    <tbody>${visits.map(v => `<tr><td>${v.date}</td><td>${v.type || 'ميدانية'}</td><td>${v.notes || '-'}</td></tr>`).join('')}</tbody>
                </table>` : `<p style="text-align:center; color:#94a3b8; font-size:11px;">لا توجد زيارات.</p>`;
        } else if(tab === 'o-history') {
            document.getElementById('btn-o').classList.add('active');
            frame.className = "content-area mode-order";
            title.innerText = "🛒 سجل الطلبات";
            content.innerHTML = `<p style="text-align:center; color:#94a3b8; font-size:11px; margin-top:30px;">لا توجد طلبات مسجلة.</p>`;
        } else {
            frame.className = "content-area";
            title.innerText = "📁 المرفقات";
            content.innerHTML = `<p style="text-align:center; color:#94a3b8; font-size:11px; margin-top:30px;">لا توجد ملفات.</p>`;
        }
    }
</script>

</body>
</html>
