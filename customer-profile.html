<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملف العميل | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --nav-navy: #001f3f; --bg-color: #f0f4f8; --accent-blue: #3b82f6; --white: #ffffff; }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        
        /* كرت بيانات العميل العلوي */
        .header-card { background: var(--white); border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        .main-info h1 { margin: 0; color: var(--nav-navy); font-size: 24px; }
        .badge { background: #e0e7ff; color: #4338ca; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 10px; }
        
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .contact-item { font-size: 13px; color: #475569; }
        .contact-item strong { color: var(--nav-navy); display: block; }

        /* الشريط العرضي (Tabs) */
        .tabs-bar { display: flex; background: var(--nav-navy); border-radius: 10px; padding: 5px; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; background: transparent; color: white; padding: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-blue); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

        /* محتوى التبويبات */
        .content-area { background: var(--white); border-radius: 15px; padding: 25px; min-height: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        
        .placeholder-msg { text-align: center; color: #94a3b8; padding-top: 50px; }
        .btn-add { background: var(--accent-blue); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: right; border-bottom: 2px solid #f1f5f9; padding: 10px; color: #64748b; font-size: 13px; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    </style>
</head>
<body>

<button onclick="window.location.href='customers.html'" style="margin-bottom:15px; cursor:pointer; background:none; border:none; color:var(--accent-blue); font-weight:bold;">← العودة لقائمة العملاء</button>

<div class="header-card">
    <div class="main-info">
        <h1 id="prof-company-name">اسم الشركة</h1>
        <span class="badge">عميل معتمد</span>
        <div style="margin-top:20px;">
            <p class="contact-item"><strong>السجل التجاري:</strong> <span id="prof-cr">-</span></p>
            <p class="contact-item"><strong>العنوان:</strong> <span id="prof-address">-</span></p>
        </div>
    </div>
    <div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0; font-size:16px;">بيانات التواصل المسجلة</h3>
            <button class="btn-add" style="margin:0; font-size:11px;" onclick="alert('تفعيل إضافة مسؤول جديد قريباً')">+ إضافة مسؤول</button>
        </div>
        <div class="contact-grid" id="prof-contacts">
            </div>
    </div>
</div>

<div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('visits', this)">سجل الزيارات</button>
    <button class="tab-btn" onclick="showTab('orders', this)">سجل الطلبات</button>
    <button class="tab-btn" onclick="showTab('files', this)">مرفقات العميل</button>
    <button class="tab-btn" style="background:#22c55e;" onclick="openCreate('visit')">أنشئ زيارة +</button>
    <button class="tab-btn" style="background:#f59e0b;" onclick="openCreate('order')">أنشئ طلب +</button>
</div>

<div class="content-area">
    <div id="tab-visits">
        <h3>آخر الزيارات الميدانية</h3>
        <table>
            <thead><tr><th>التاريخ</th><th>المسؤول</th><th>النتيجة</th><th>الملاحظات</th></tr></thead>
            <tbody id="visits-log-body">
                <tr><td colspan="4" class="placeholder-msg">لا توجد زيارات مسجلة لهذا العميل بعد.</td></tr>
            </tbody>
        </table>
    </div>
    
    <div id="tab-orders" class="hidden">
        <h3>سجل الطلبات والفواتير</h3>
        <p class="placeholder-msg">سيتم عرض قائمة الطلبات هنا فور إنشائها.</p>
    </div>

    <div id="tab-files" class="hidden">
        <h3>المستندات والمرفقات</h3>
        <div style="border: 2px dashed #cbd5e1; padding: 40px; text-align:center; border-radius:10px;">
            <p style="color:#64748b;">اسحب وأفلت السجل التجاري أو العقود هنا</p>
            <input type="file" id="fileUpper" style="display:none;">
            <button class="btn-add" onclick="document.getElementById('fileUpper').click()">اختر ملفاً</button>
        </div>
    </div>
</div>

<script>
    // 1. جلب اسم العميل من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const clientName = urlParams.get('name');

    function loadProfile() {
        if (!clientName) return;

        // البحث عن بيانات العميل في الذاكرة
        const allCustomers = JSON.parse(localStorage.getItem('asgate_customers_data') || '[]');
        const customer = allCustomers.find(c => c.comp === clientName);

        if (customer) {
            document.getElementById('prof-company-name').innerText = customer.comp;
            document.getElementById('prof-cr').innerText = customer.cr || 'غير مسجل';
            document.getElementById('prof-address').innerText = customer.address || 'غير محدد';
            
            // إضافة المسؤول الأساسي في الشبكة
            const contactGrid = document.getElementById('prof-contacts');
            contactGrid.innerHTML = `
                <div class="contact-item"><strong>المسؤول الرئيسي</strong>${customer.mgr}</div>
                <div class="contact-item"><strong>رقم الموبايل</strong>${customer.mob}</div>
                <div class="contact-item"><strong>إيميل المراسلات</strong>${customer.comp.replace(/\s+/g, '').toLowerCase()}@info.com</div>
            `;
            
            // جلب الزيارات الخاصة بهذا العميل فقط من صفحة الزيارات
            loadClientVisits(customer.comp);
        }
    }

    function loadClientVisits(name) {
        const allVisits = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
        const clientVisits = allVisits.filter(v => v.comp === name);
        
        if (clientVisits.length > 0) {
            const body = document.getElementById('visits-log-body');
            body.innerHTML = '';
            clientVisits.forEach(v => {
                body.innerHTML += `<tr><td>${v.date}</td><td>${v.mgr}</td><td>${v.status}</td><td>${v.notes}</td></tr>`;
            });
        }
    }

    function showTab(tabId, btn) {
        // إخفاء كل التبويبات
        document.getElementById('tab-visits').classList.add('hidden');
        document.getElementById('tab-orders').classList.add('hidden');
        document.getElementById('tab-files').classList.add('hidden');
        
        // إزالة حالة النشاط من الأزرار
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // إظهار التبويب المختار
        document.getElementById('tab-' + tabId).classList.remove('hidden');
        btn.classList.add('active');
    }

    function openCreate(type) {
        alert("سيتم فتح نموذج إنشاء " + (type === 'visit' ? 'زيارة' : 'طلب') + " للعميل: " + clientName);
    }

    window.onload = loadProfile;
</script>
</body>
</html>
