<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملف العميل | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --nav-purple: #2e1065; 
            --nav-active: #a78bfa;
            --accent-blue: #3b82f6; 
            --white: #ffffff; 
            --bg-color: #f4f7f9;
        }
        
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }

        /* شريط التنقل الموحد - 37 بكسل */
        .navbar { 
            background-color: var(--nav-purple); 
            display: flex; 
            align-items: center;
            padding: 0 20px; 
            margin: 10px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 10px;
            z-index: 1000;
            height: 37px;
        }
        
        .navbar a { 
            color: white; 
            text-decoration: none; 
            padding: 0 15px; 
            margin-left: 5px; 
            font-weight: 700; 
            font-size: 12px; 
            border-radius: 8px; 
            transition: 0.3s; 
            line-height: 26px;
            height: 26px;
            display: inline-block;
        }
        
        .navbar a:hover { background-color: rgba(255,255,255,0.1); }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        
        .header-card { background: var(--white); border-radius: 15px; padding: 25px; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tabs-bar { display: flex; background: var(--nav-purple); border-radius: 10px; padding: 5px; gap: 5px; margin: 20px 0; }
        .tab-btn { flex: 1; border: none; background: transparent; color: white; padding: 10px; cursor: pointer; font-family: 'Cairo'; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--nav-active); }
        
        .content-area { background: var(--white); border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; background: #f8fafc; padding: 12px; border-bottom: 2px solid #e2e8f0; font-size: 13px; color: var(--nav-purple); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
        .modal-content { background: white; width: 400px; margin: 100px auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn-save { background: #22c55e; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body onload="loadProfile()">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
    </nav>

    <div class="container">
        <div class="header-card">
            <div>
                <h1 id="p-name" style="margin:0; color:var(--nav-purple);">-</h1>
                <p id="p-cr" style="color:#64748b; font-weight:bold;">-</p>
            </div>
            <div id="p-contacts" style="background:#f8fafc; padding:15px; border-radius:10px; border-right: 4px solid var(--nav-active);">
                جاري التحميل...
            </div>
        </div>

        <div class="tabs-bar">
            <button class="tab-btn active">سجل النشاط (الزيارات والفرص)</button>
            <button class="tab-btn" style="background:#22c55e" onclick="openModal()">+ تسجيل نشاط جديد</button>
        </div>

        <div class="content-area">
            <table>
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>الخدمة/المقترح</th>
                        <th>الحالة</th>
                        <th>الملاحظات</th>
                    </tr>
                </thead>
                <tbody id="h-body"></tbody>
            </table>
        </div>
    </div>

    <div id="vModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--nav-purple)">تسجيل نشاط جديد</h3>
            <label style="font-size:12px; font-weight:bold">تاريخ النشاط</label>
            <input type="date" id="v-date">
            
            <label style="font-size:12px; font-weight:bold">نوع النشاط</label>
            <select id="v-status">
                <option value="زيارة عادية">زيارة عادية</option>
                <option value="مهتم">مهتم (نقل للفرص)</option>
                <option value="50%">فرصة 50%</option>
            </select>
            
            <label style="font-size:12px; font-weight:bold">الملاحظات</label>
            <textarea id="v-notes" placeholder="اكتب تفاصيل الزيارة هنا..."></textarea>
            
            <button class="btn-save" onclick="save()">حفظ النشاط</button>
            <button onclick="document.getElementById('vModal').style.display='none'" style="width:100%; border:none; background:none; padding:10px; cursor:pointer; font-family:'Cairo'; color:#ef4444;">إلغاء</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const customerName = urlParams.get('name');
        let currentCust = null;

        function parseNotes(notesData) {
            try {
                const parsed = JSON.parse(notesData);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    return parsed[parsed.length - 1].text.replace(/<br>/g, " ");
                }
                return notesData;
            } catch (e) {
                return notesData || "-";
            }
        }

        function loadProfile() {
            if (!customerName) {
                alert("لم يتم اختيار عميل");
                window.location.href = 'customers.html';
                return;
            }

            const custs = JSON.parse(localStorage.getItem('asgate_customers_data') || '[]');
            currentCust = custs.find(c => c.comp === customerName);

            if(currentCust) {
                document.getElementById('p-name').innerText = currentCust.comp;
                document.getElementById('p-cr').innerText = "سجل تجاري: " + (currentCust.cr || "غير مسجل");
                document.getElementById('p-contacts').innerHTML = `
                    <strong>المسؤول:</strong> ${currentCust.mgr || 'غير محدد'} <br>
                    <strong>الموبايل:</strong> ${currentCust.mob || 'غير محدد'}
                `;
                loadHistory();
            } else {
                alert("العميل غير موجود في قاعدة البيانات");
            }
        }

        function loadHistory() {
            const visits = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
            const opps = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
            
            // دمج السجلات وتصفيتها للعميل الحالي فقط
            const history = [...visits, ...opps]
                .filter(i => i.comp === customerName)
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            const body = document.getElementById('h-body');
            body.innerHTML = '';

            if(history.length === 0) {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد سجل نشاط سابق لهذا العميل</td></tr>';
                return;
            }

            history.forEach(h => {
                body.innerHTML += `
                    <tr>
                        <td style="font-weight:bold;">${h.date}</td>
                        <td>${h.prop || h.curr || 'نشاط عام'}</td>
                        <td><span style="background:#e0e7ff; padding:2px 8px; border-radius:5px; font-size:11px;">${h.status}</span></td>
                        <td style="color:#475569;">${parseNotes(h.notes)}</td>
                    </tr>`;
            });
        }

        function openModal() { 
            document.getElementById('v-date').value = new Date().toISOString().split('T')[0]; 
            document.getElementById('vModal').style.display='block'; 
        }

        function save() {
            const status = document.getElementById('v-status').value;
            const noteText = document.getElementById('v-notes').value.trim();
            
            if(!noteText) { alert("يرجى كتابة الملاحظات"); return; }

            const entry = {
                comp: customerName,
                mgr: currentCust.mgr,
                mob: currentCust.mob,
                status: status,
                date: document.getElementById('v-date').value,
                notes: JSON.stringify([{date: new Date().toLocaleDateString('en-GB'), text: noteText}]),
                prop: 'تحديث من ملف العميل',
                updated: new Date().toLocaleDateString('en-GB')
            };
            
            if(status === 'مهتم' || status === '50%') {
                let data = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
                data.push(entry);
                localStorage.setItem('asgate_opportunities_data', JSON.stringify(data));
            } else {
                let data = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
                data.push(entry);
                localStorage.setItem('asgate_visits_data', JSON.stringify(data));
            }

            alert("تم تسجيل النشاط بنجاح");
            document.getElementById('vModal').style.display='none';
            loadHistory();
        }
    </script>
</body>
</html>
