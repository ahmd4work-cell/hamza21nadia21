<script>
    function loadClientData() {
        if(!clientName) return;
        const data = JSON.parse(localStorage.getItem('asgate_customers_data') || '[]');
        const client = data.find(c => c.comp === clientName);

        if(client) {
            // تحديث اسم العميل في المسار (Breadcrumbs)
            document.getElementById('breadcrumb-client-name').innerText = client.comp;
            
            // تحديث عنوان تبويب المتصفح لعدم التشتت
            document.title = `${client.comp} | ملف العميل`;

            document.getElementById('c-name').innerText = client.comp;
            // ... باقي الكود ...
        }
    }
</script>
