<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملف العميل | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --nav-navy: #001f3f; 
            --bg-color: #f0f4f8; 
            --accent-blue: #3b82f6; 
            --accent-green: #22c55e; 
            --white: #ffffff; 
        }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        
        /* القائمة العلوية الموحدة */
        .navbar { background-color: var(--nav-navy); display: flex; padding: 8px 20px; margin: -15px -15px 20px -15px; border-radius: 0 0 15px 15px; }
        .navbar a { color: white; text-decoration: none; padding: 6px 15px; font-weight: 700; font-size: 13px; border-radius: 10px; }
        .navbar a:hover { background: rgba(255,255,255,0.1); }

        /* كرت بيانات العميل */
        .header-card { background: var(--white); border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; border-top: 5px solid var(--accent-blue); }
        .main-info h1 { margin: 0; color: var(--nav-navy); font-size: 22px; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .contact-item { font-size: 13px; color: #475569; }
        .contact-item strong { color: var(--nav-navy); display: block; margin-bottom: 3px; }

        /* شريط التبويبات */
        .tabs-bar { display: flex; background: var(--nav-navy); border-radius: 10px; padding: 5px; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; background: transparent; color: white; padding: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; border-radius: 8px; transition: 0.3s; font-size: 13px; }
        .tab-btn.active { background: var(--accent-blue); }

        /* محتوى التبويبات */
        .content-area { background: var(--white); border-radius: 15px; padding: 25px; min-height: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: right; background: #f8fafc; padding: 12px; color: #64748b; font-size: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* نافذة الإضافة (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; width: 450px; margin: 50px auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; color: var(--nav-navy); }
        .form-control { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; text-align: right; outline: none; }
        .btn-save-visit { width: 100%; background: var(--accent-green); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; font-size: 15px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
    </nav>

    <button onclick="window.location.href='customers.html'" style="margin-bottom:15px; cursor:pointer; background:none; border:none; color:var(--accent-blue); font-weight:bold; font-family:'Cairo';">← العودة لقائمة العملاء</button>

    <div class="header-card">
        <div class="main-info">
            <h1 id="prof-company-name">جاري تحميل البيانات...</h1>
            <div style="margin-top:20px;">
                <p class="contact-item"><strong>السجل التجاري:</strong> <span id="prof-cr">-</span></p>
                <p class="contact-item"><strong>العنوان:</strong> <span id="prof-address">-</span></p>
            </div>
        </div>
        <div>
            <h3 style="margin:0 0 10px 0; font-size:16px; color: var(--nav-navy);">بيانات التواصل</h3>
            <div class="contact-grid" id="prof-contacts">
                </div>
        </div>
    </div>

    <div class="tabs-bar">
        <button class="tab-btn active" onclick="showTab('visits', this)">سجل الزيارات والفرص</button>
        <button class="tab-btn" onclick="showTab('orders', this)">سجل الطلبات</button>
        <button class="tab-btn" onclick="showTab('files', this)">المرفقات</button>
        <button class="tab-btn" style="background:var(--accent-green);" onclick="openVisitModal()">إنشاء زيارة +</button>
        <button class="tab-btn" style="background:#f59e0b;">إنشاء طلب +</button>
    </div>

    <div class="content-area">
        <div id="tab-visits">
            <h3 style="color: var(--nav-navy);">الأرشيف الزمني للعميل</h3>
            <table>
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>الخدمة الحالية</th>
                        <th>الخدمة المقترحة</th>
                        <th>الحالة</th>
                        <th>الملاحظات</th>
                    </tr>
                </thead>
                <tbody id="visits-log-body"></tbody>
            </table>
        </div>
        
        <div id="tab-orders" class="hidden">
            <p style="text-align:center; padding:50px; color:#94a3b8;">لا توجد طلبات مسجلة حالياً.</p>
        </div>

        <div id="tab-files" class="hidden">
            <p style="text-align:center; padding:50px; color:#94a3b8;">سيتم تفعيل نظام المرفقات قريباً.</p>
        </div>
    </div>

    <div id="visitModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:var(--nav-navy); text-align: center;">سجل جديد للعميل</h2>
            <div class="form-group">
                <label>تاريخ الزيارة</label>
                <input type="date" id="v-date" class="form-control">
            </div>
            <div class="form-group">
                <label>الخدمة المستخدمة حالياً</label>
                <input type="text" id="v-curr" class="form-control" placeholder="مثال: نظام محاسبي قديم">
            </div>
            <div class="form-group">
                <label>الخدمة المقترحة من ASGate</label>
                <input type="text" id="v-prop" class="form-control" placeholder="مثال: نظام CRM المتطور">
            </div>
            <div class="form-group">
                <label>تحديد الحالة (مهم جداً)</label>
                <select id="v-status" class="form-control">
                    <option value="مهتم">مهتم (إرسال لقائمة الفرص)</option>
                    <option value="زيارة عادية">زيارة عادية</option>
                    <option value="50%">نسبة إغلاق 50%</option>
                    <option value="20%">نسبة إغلاق 20%</option>
                    <option value="فقدان">فقدان العميل</option>
                </select>
            </div>
            <div class="form-group">
                <label>الملاحظات والتفاصيل</label>
                <textarea id="v-notes" class="form-control" style="height:80px;"></textarea>
            </div>
            <button class="btn-save-visit" onclick="saveNewVisit()">حفظ وتوزيع البيانات</button>
            <button onclick="closeVisitModal()" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer; font-family:'Cairo';">إلغاء</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const clientName = urlParams.get('name');
        let currentCustomer = null;

        function loadProfile() {
            const allCustomers = JSON.parse(localStorage.getItem('asgate_customers_data') || '[]');
            currentCustomer = allCustomers.find(c => c.comp === clientName);

            if (currentCustomer) {
                document.getElementById('prof-company-name').innerText = currentCustomer.comp;
                document.getElementById('prof-cr').innerText = currentCustomer.cr || '-';
                document.getElementById('prof-address').innerText = currentCustomer.address || '-';
                
                document.getElementById('prof-contacts').innerHTML = `
                    <div class="contact-item"><strong>المسؤول الرئيسي</strong>${currentCustomer.mgr}</div>
                    <div class="contact-item"><strong>رقم الجوال</strong>${currentCustomer.mob}</div>
                `;
                loadClientHistory();
            } else {
                document.getElementById('prof-company-name').innerText = "العميل غير موجود";
            }
        }

        function loadClientHistory() {
            const allVisits = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
            const allOpps = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
            
            // دمج كل شيء يخص هذا العميل من الزيارات والفرص
            const fullHistory = [...allVisits, ...allOpps].filter(item => item.comp === clientName);
            const body = document.getElementById('visits-log-body');
            
            if (fullHistory.length === 0) {
                body.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا يوجد سجل زيارات سابق لهذا العميل.</td></tr>';
                return;
            }

            // ترتيب زمني من الأحدث
            fullHistory.sort((a, b) => new Date(b.date) - new Date(a.date));

            body.innerHTML = '';
            fullHistory.forEach(v => {
                let noteText = "";
                try {
                    const parsed = JSON.parse(v.notes);
                    noteText = parsed[parsed.length-1].text;
                } catch(e) { noteText = v.notes || "-"; }

                body.innerHTML += `
                    <tr>
                        <td>${v.date}</td>
                        <td>${v.curr || '-'}</td>
                        <td>${v.prop || '-'}</td>
                        <td><span style="color:${v.status === 'مهتم' ? '#22c55e' : '#3b82f6'}; font-weight:bold;">${v.status}</span></td>
                        <td style="color:#64748b; font-style:italic;">${noteText}</td>
                    </tr>
                `;
            });
        }

        function saveNewVisit() {
            const entryStatus = document.getElementById('v-status').value;
            const entryData = {
                comp: clientName,
                mgr: currentCustomer.mgr,
                mob: currentCustomer.mob,
                cr: currentCustomer.cr,
                curr: document.getElementById('v-curr').value,
                prop: document.getElementById('v-prop').value,
                status: entryStatus,
                date: document.getElementById('v-date').value,
                notes: JSON.stringify([{ date: "إدخال من ملف العميل", text: document.getElementById('v-notes').value }]),
                updated: '-',
                created: new Date().toISOString().split('T')[0]
            };

            if (entryStatus === "مهتم") {
                // حفظ في الفرص البيعية
                let allOpps = JSON.parse(localStorage.getItem('asgate_opportunities_data') || '[]');
                allOpps.push(entryData);
                localStorage.setItem('asgate_opportunities_data', JSON.stringify(allOpps));
                alert("تم بنجاح: العميل الآن في قائمة الفرص البيعية");
            } else {
                // حفظ في الزيارات العادية
                let allVisits = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
                allVisits.push(entryData);
                localStorage.setItem('asgate_visits_data', JSON.stringify(allVisits));
                alert("تم بنجاح: الزيارة مسجلة في السجل العام");
            }

            loadClientHistory(); // تحديث الجدول فوراً
            closeVisitModal();
            // تفريغ الحقول
            document.getElementById('v-curr').value = '';
            document.getElementById('v-prop').value = '';
            document.getElementById('v-notes').value = '';
        }

        function openVisitModal() {
            document.getElementById('v-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('visitModal').style.display = 'block';
        }

        function closeVisitModal() {
            document.getElementById('visitModal').style.display = 'none';
        }

        function showTab(tabId, btn) {
            document.getElementById('tab-visits').classList.add('hidden');
            document.getElementById('tab-orders').classList.add('hidden');
            document.getElementById('tab-files').classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            btn.classList.add('active');
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
