<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملف العميل | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --nav-navy: #001f3f; --bg-color: #f0f4f8; --accent-blue: #3b82f6; --accent-green: #22c55e; --white: #ffffff; }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        
        /* كرت البيانات العلوي */
        .header-card { background: var(--white); border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        .main-info h1 { margin: 0; color: var(--nav-navy); font-size: 24px; }
        .badge { background: #e0e7ff; color: #4338ca; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 10px; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .contact-item { font-size: 13px; color: #475569; }
        .contact-item strong { color: var(--nav-navy); display: block; }

        /* الشريط العرضي */
        .tabs-bar { display: flex; background: var(--nav-navy); border-radius: 10px; padding: 5px; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; background: transparent; color: white; padding: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-blue); }

        /* محتوى التبويبات */
        .content-area { background: var(--white); border-radius: 15px; padding: 25px; min-height: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: right; background: #f8fafc; padding: 12px; color: #64748b; font-size: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* نافذة إنشاء زيارة جديدة */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; width: 500px; margin: 50px auto; padding: 25px; border-radius: 15px; position: relative; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn-save-visit { width: 100%; background: var(--accent-green); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; margin-top: 10px; }
    </style>
</head>
<body>

<button onclick="window.location.href='customers.html'" style="margin-bottom:15px; cursor:pointer; background:none; border:none; color:var(--accent-blue); font-weight:bold;">← العودة لقائمة العملاء</button>

<div class="header-card">
    <div class="main-info">
        <h1 id="prof-company-name">جاري التحميل...</h1>
        <span class="badge" id="client-status">عميل نشط</span>
        <div style="margin-top:20px;">
            <p class="contact-item"><strong>السجل التجاري:</strong> <span id="prof-cr">-</span></p>
            <p class="contact-item"><strong>العنوان:</strong> <span id="prof-address">-</span></p>
        </div>
    </div>
    <div>
        <h3 style="margin:0 0 10px 0; font-size:16px;">بيانات التواصل</h3>
        <div class="contact-grid" id="prof-contacts"></div>
    </div>
</div>

<div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('visits', this)">سجل الزيارات</button>
    <button class="tab-btn" onclick="showTab('orders', this)">سجل الطلبات</button>
    <button class="tab-btn" onclick="showTab('files', this)">مرفقات العميل</button>
    <button class="tab-btn" style="background:var(--accent-green);" onclick="openVisitModal()">إنشاء زيارة +</button>
    <button class="tab-btn" style="background:#f59e0b;">إنشاء طلب +</button>
</div>

<div class="content-area">
    <div id="tab-visits">
        <h3>الأرشيف الزمني للزيارات</h3>
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>الخدمة الحالية</th>
                    <th>الخدمة المقترحة</th>
                    <th>الحالة</th>
                    <th>الملاحظات</th>
                </tr>
            </thead>
            <tbody id="visits-log-body"></tbody>
        </table>
    </div>
    
    <div id="tab-orders" class="hidden">
        <h3>سجل الطلبات</h3>
        <p style="text-align:center; color:#94a3b8; padding:40px;">لا توجد طلبات مسجلة حالياً.</p>
    </div>

    <div id="tab-files" class="hidden">
        <h3>المرفقات</h3>
        <p style="text-align:center; color:#94a3b8; padding:40px;">اسحب المستندات هنا (قريباً).</p>
    </div>
</div>

<div id="visitModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color:var(--nav-navy);">سجل زيارة جديدة</h2>
        <div class="form-group">
            <label>التاريخ</label>
            <input type="date" id="v-date" class="form-control">
        </div>
        <div class="form-group">
            <label>الخدمة الحالية</label>
            <input type="text" id="v-curr" class="form-control" placeholder="ماذا يستخدم العميل الآن؟">
        </div>
        <div class="form-group">
            <label>الخدمة المقترحة</label>
            <input type="text" id="v-prop" class="form-control" placeholder="ماذا عرضت عليه؟">
        </div>
        <div class="form-group">
            <label>الحالة</label>
            <select id="v-status" class="form-control">
                <option>مهتم</option>
                <option>50%</option>
                <option>20%</option>
                <option>فقدان</option>
            </select>
        </div>
        <div class="form-group">
            <label>الملاحظات</label>
            <textarea id="v-notes" class="form-control" style="height:80px;"></textarea>
        </div>
        <button class="btn-save-visit" onclick="saveNewVisit()">حفظ الزيارة في السجل العام</button>
        <button onclick="closeVisitModal()" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const clientName = urlParams.get('name');
    let currentCustomer = null;

    function loadProfile() {
        const allCustomers = JSON.parse(localStorage.getItem('asgate_customers_data') || '[]');
        currentCustomer = allCustomers.find(c => c.comp === clientName);

        if (currentCustomer) {
            document.getElementById('prof-company-name').innerText = currentCustomer.comp;
            document.getElementById('prof-cr').innerText = currentCustomer.cr || '-';
            document.getElementById('prof-address').innerText = currentCustomer.address || '-';
            
            document.getElementById('prof-contacts').innerHTML = `
                <div class="contact-item"><strong>المسؤول</strong>${currentCustomer.mgr}</div>
                <div class="contact-item"><strong>الموبايل</strong>${currentCustomer.mob}</div>
            `;
            loadClientVisits();
        }
    }

    function loadClientVisits() {
        const allVisits = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
        // فلترة الزيارات لتظهر فقط زيارات هذا العميل
        const clientVisits = allVisits.filter(v => v.comp === clientName);
        const body = document.getElementById('visits-log-body');
        
        if (clientVisits.length === 0) {
            body.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد زيارات سابقة.</td></tr>';
            return;
        }

        body.innerHTML = '';
        clientVisits.reverse().forEach(v => {
            // معالجة الملاحظات إذا كانت مخزنة كـ JSON (نظام الاستيكر) أو نص عادي
            let noteText = "";
            try {
                const parsed = JSON.parse(v.notes);
                noteText = parsed[parsed.length-1].text;
            } catch(e) { noteText = v.notes || "-"; }

            body.innerHTML += `
                <tr>
                    <td>${v.date}</td>
                    <td>${v.curr || '-'}</td>
                    <td>${v.prop || '-'}</td>
                    <td><span style="color:var(--accent-blue)">${v.status}</span></td>
                    <td style="color:#64748b; font-style:italic;">${noteText}</td>
                </tr>
            `;
        });
    }

    function openVisitModal() {
        document.getElementById('v-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('visitModal').style.display = 'block';
    }

    function closeVisitModal() {
        document.getElementById('visitModal').style.display = 'none';
    }

    function saveNewVisit() {
        const newVisit = {
            comp: clientName,
            mgr: currentCustomer.mgr,
            mob: currentCustomer.mob,
            cr: currentCustomer.cr,
            curr: document.getElementById('v-curr').value,
            prop: document.getElementById('v-prop').value,
            status: document.getElementById('v-status').value,
            date: document.getElementById('v-date').value,
            notes: JSON.stringify([{ date: "زيارة ملف العميل", text: document.getElementById('v-notes').value }]),
            updated: '-',
            created: new Date().toISOString().split('T')[0]
        };

        // 1. الحفظ في سجل الزيارات العام (visits.html ستقرأ منه)
        let allVisits = JSON.parse(localStorage.getItem('asgate_visits_data') || '[]');
        allVisits.push(newVisit);
        localStorage.setItem('asgate_visits_data', JSON.stringify(allVisits));

        // 2. تحديث الواجهة فوراً
        loadClientVisits();
        closeVisitModal();
        alert("تم تسجيل الزيارة بنجاح في ملف العميل وفي سجل الزيارات العام.");
    }

    function showTab(tabId, btn) {
        document.getElementById('tab-visits').classList.add('hidden');
        document.getElementById('tab-orders').classList.add('hidden');
        document.getElementById('tab-files').classList.add('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.remove('hidden');
        btn.classList.add('active');
    }

    window.onload = loadProfile;
</script>
</body>
</html>
