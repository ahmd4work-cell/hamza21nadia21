<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f9;
            --accent-blue: #3b82f6;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1.6; }

        /* شريط التنقل الموحد بدقة */
        .navbar { 
            background-color: var(--nav-navy); 
            display: flex; 
            padding: 8px 20px; 
            margin: 10px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 10px;
            z-index: 1000;
        }
        .navbar a { color: white; text-decoration: none; padding: 6px 15px; margin-left: 5px; font-weight: 700; font-size: 11px; border-radius: 10px; transition: 0.3s; }
        .navbar a.active { background-color: rgba(255,255,255,0.1); }
        .navbar a:hover { background-color: rgba(255,255,255,0.05); }

        .container { padding: 40px 20px; text-align: center; }
        .welcome-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; border: 1px solid var(--border-color); }
        h1 { color: var(--nav-navy); margin-bottom: 10px; font-weight: 800; }
        p { color: #64748b; font-size: 18px; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="active">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html">العملاء</a>
</nav>

<div class="container">
    <div class="welcome-card">
        <h1>مرحباً بك في ASGate</h1>
        <p>نظام إدارة علاقات العملاء والزيارات الميدانية</p>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 30px 0;">
        <div style="font-size: 14px; color: #94a3b8;">ابدأ بالتنقل عبر الروابط العلوية لإدارة أعمالك</div>
    </div>
</div>

</body>
</html>
