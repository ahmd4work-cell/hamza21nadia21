<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - لوحة التحكم المحدثة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --nav-purple: #2e1065;
            --nav-active: #a78bfa;
            --bg-color: #f4f7f9;
            --border-color: #e2e8f0;
            --white: #ffffff;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- شريط التنقل العلوي --- */
        .navbar { 
            background-color: var(--nav-purple); 
            display: flex; align-items: center; padding: 0 20px; 
            margin: 10px; border-radius: 12px; height: 37px; 
            position: sticky; top: 10px; z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar a { 
            color: white; text-decoration: none; padding: 0 15px; 
            font-weight: 700; font-size: 12px; border-radius: 6px; 
            height: 26px; line-height: 26px; display: inline-block;
        }
        .navbar a.active { background-color: var(--nav-active); color: var(--nav-purple); }

        .container { padding: 0 15px 15px 15px; max-width: 100%; margin: auto; }

        /* --- الهيكل الجديد: الإحصائيات والفلترة في صف واحد --- */
        .top-dashboard-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: flex-end; /* لتوحيد القاعدة السفلية */
        }

        /* كروت الإحصائيات - عرض النصف ومحاذاة يمين */
        .stats-mini-grid {
            display: flex;
            gap: 10px;
            flex: 1; /* تأخذ مساحة أقل */
        }
        .small-card-mini {
            flex: 1;
            padding: 8px 15px;
            border-radius: 10px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50px; /* تقليل الارتفاع */
            max-width: 150px; /* تقليل العرض */
        }
        .small-card-mini .label { font-size: 10px; opacity: 0.9; font-weight: bold; }
        .small-card-mini .value { font-size: 15px; font-weight: 800; }

        /* شريط الفلترة الأفقي */
        .horizontal-filter-box {
            flex: 3; /* تأخذ المساحة الأكبر بجانب الكروت */
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .filter-item { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .filter-item label { font-size: 10px; font-weight: 800; color: var(--nav-purple); }
        .filter-input { 
            width: 100%; padding: 6px; font-family: 'Cairo'; 
            font-size: 11px; border: 1px solid #e2e8f0; border-radius: 6px; 
            background: #f8fafc;
        }

        /* تخطيط الرسوم البيانية والجداول */
        .dashboard-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .content-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        
        h3 { font-size: 12px; margin: 0 0 15px 0; color: var(--nav-purple); font-weight: 800; border-right: 3px solid var(--nav-active); padding-right: 8px; }

        .yearly-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .yearly-table th { background: var(--nav-purple); color: white; padding: 10px; text-align: center; }
        .yearly-table td { padding: 8px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: bold; }

        .chart-container { height: 180px; position: relative; }

        @media (max-width: 1000px) {
            .top-dashboard-row { flex-direction: column; align-items: stretch; }
            .horizontal-filter-box { flex-wrap: wrap; }
            .dashboard-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="active">الرئيسية</a>
        <a href="#">الزيارات</a>
        <a href="#">الفرص البيعية</a>
        <a href="#">العملاء</a>
        <a href="#">المبيعات</a>
    </nav>

    <div class="container">
        
        <div class="top-dashboard-row">
            
            <div class="stats-mini-grid">
                <div class="small-card-mini" style="background: #1e293b;">
                    <div class="label">إجمالي الهدف</div>
                    <div class="value">180,000</div>
                </div>
                <div class="small-card-mini" style="background: #22c55e;">
                    <div class="label">المحقق</div>
                    <div class="value">14,210</div>
                </div>
                <div class="small-card-mini" style="background: #f59e0b;">
                    <div class="label">المعلق</div>
                    <div class="value">790</div>
                </div>
            </div>

            <div class="horizontal-filter-box">
                <div class="filter-item">
                    <label>البحث</label>
                    <input type="text" class="filter-input" placeholder="اسم العميل...">
                </div>
                <div class="filter-item">
                    <label>مدير المبيعات</label>
                    <select class="filter-input"><option>الكل</option></select>
                </div>
                <div class="filter-item">
                    <label>المشرف</label>
                    <select class="filter-input"><option>الكل</option></select>
                </div>
                <div class="filter-item">
                    <label>مندوب المبيعات</label>
                    <select class="filter-input"><option>الكل</option></select>
                </div>
                <div class="filter-item">
                    <label>النوع</label>
                    <select class="filter-input">
                        <option>الكل</option>
                        <option>محقق</option>
                        <option>معلق</option>
                    </select>
                </div>
                <button style="background: var(--nav-purple); color: white; border: none; padding: 7px 15px; border-radius: 6px; font-family: 'Cairo'; font-size: 11px; cursor: pointer; font-weight: bold;">تصفية</button>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="charts-stack">
                <div class="content-box" style="margin-bottom: 20px;">
                    <h3>📈 الأداء الشهري</h3>
                    <div class="chart-container"><canvas id="performanceChart"></canvas></div>
                </div>
                <div class="content-box">
                    <h3>📊 توزيع الإنجاز</h3>
                    <div class="chart-container"><canvas id="pieChart"></canvas></div>
                </div>
            </div>

            <div class="table-area">
                <div class="content-box">
                    <h3>📅 سجل الأهداف السنوي</h3>
                    <table class="yearly-table">
                        <thead>
                            <tr>
                                <th>الشهر</th>
                                <th>الهدف</th>
                                <th>مكتمل</th>
                                <th>%</th>
                                <th>معلق</th>
                            </tr>
                        </thead>
                        <tbody id="yearlyDataBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const months = ["يناير", "فبراير", "مارس", "ابريل", "مايو", "يونيو"];
        const tbody = document.getElementById('yearlyDataBody');
        months.forEach(m => { 
            tbody.innerHTML += `<tr>
                <td>${m}</td>
                <td>30,000</td>
                <td>${m === "يناير" ? '14,210' : '-'}</td>
                <td>${m === "يناير" ? '47%' : '-'}</td>
                <td>${m === "يناير" ? '790' : '-'}</td>
            </tr>`; 
        });

        // Charts
        const commonOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
        
        new Chart(document.getElementById('performanceChart'), {
            type: 'bar',
            data: {
                labels: ['1','2','3','4','5','6'],
                datasets: [
                    { label: 'الهدف', data: Array(6).fill(30000), backgroundColor: '#e2e8f0', borderRadius: 4 },
                    { label: 'المحقق', data: [14210,0,0,0,0,0], backgroundColor: '#22c55e', borderRadius: 4 }
                ]
            },
            options: commonOptions
        });

        new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: {
                labels: ['مكتمل', 'معلق'],
                datasets: [{ data: [95, 5], backgroundColor: ['#22c55e', '#f59e0b'], borderWidth: 0 }]
            },
            options: { ...commonOptions, cutout: '70%', plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    </script>
</body>
</html>
