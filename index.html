<!-- TOP SECTION -->

<div class="top-layout">

    <!-- RIGHT SIDE -->

    <div class="top-right-section">

        <!-- MINI STATS -->

        <div class="mini-stats-grid">

            <div class="mini-card dark-card">

                <div class="mini-title">
                    إجمالي الهدف
                </div>

                <div class="mini-number">
                    180,000
                </div>

            </div>

            <div class="mini-card green-card">

                <div class="mini-title">
                    المحقق
                </div>

                <div class="mini-number">
                    14,210
                </div>

            </div>

            <div class="mini-card yellow-card">

                <div class="mini-title">
                    المعلق
                </div>

                <div class="mini-number">
                    790
                </div>

            </div>

        </div>

    </div>

    <!-- CENTER STATS -->

    <div class="middle-stats-grid">

        <div class="info-card">

            <div class="info-title">
                عدد الزيارات
            </div>

            <div class="info-number">
                125
            </div>

        </div>

        <div class="info-card">

            <div class="info-title">
                إجمالي الناجح
            </div>

            <div class="info-number">
                88
            </div>

        </div>

        <div class="info-card">

            <div class="info-title">
                إجمالي الفرصة البيعية
            </div>

            <div class="info-number">
                47
            </div>

        </div>

    </div>

    <!-- FILTER -->

    <div class="search-filter-box compact-filter">

        <h3>
            🔍 الفلترة
        </h3>

        <div class="filter-group">

            <label>
                بحث سريع
            </label>

            <input type="text"
                class="filter-input"
                placeholder="ابحث...">

        </div>

        <div class="filter-group">

            <label>
                مدير المبيعات
            </label>

            <select class="filter-input">

                <option>الكل</option>

                <option>المدير العام</option>

                <option>مدير المنطقة</option>

            </select>

        </div>

        <div class="filter-group">

            <label>
                مشرف المبيعات
            </label>

            <select class="filter-input">

                <option>الكل</option>

                <option>مشرف 1</option>

                <option>مشرف 2</option>

            </select>

        </div>

        <div class="filter-group">

            <label>
                الحالة
            </label>

            <select class="filter-input">

                <option>الكل</option>

                <option>مكتمل</option>

                <option>معلق</option>

            </select>

        </div>

        <button class="filter-btn">

            تطبيق

        </button>

    </div>

</div>
