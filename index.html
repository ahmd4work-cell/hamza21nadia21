<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-purple-dark: #2e1065;
            --header-purple-mid: #8b5cf6;
            --nav-active: #a78bfa;
            --bg-color: #f8fafc;
            --border-soft: #cbd5e1;
            --accent-blue: #3b82f6;
        }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }

        /* Navbar الموحد */
        .navbar { 
            background-color: var(--nav-purple-dark); display: flex; align-items: center; padding: 0 20px; 
            margin: 10px; border-radius: 15px; height: 37px; position: sticky; top: 10px; z-index: 1000;
        }
        .navbar a { color: white; text-decoration: none; padding: 0 15px; font-weight: 700; font-size: 12px; transition: 0.3s; }
        .navbar a:hover { color: var(--nav-active); }
        .navbar a.active { background-color: var(--nav-active); color: var(--nav-purple-dark); border-radius: 8px; line-height: 26px; height: 26px; }

        /* شريط معلومات الموظف */
        .employee-info-bar {
            margin: 10px 20px; height: 35px; background-color: white;
            border: 1px solid var(--border-soft); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .info-content { display: flex; gap: 35px; align-items: center; }
        .info-item { font-size: 11px; color: var(--nav-purple-dark); font-weight: 700; }
        .info-item span { color: #64748b; font-weight: 400; margin-right: 5px; }

        /* محتوى الصفحة الرئيسية */
        .main-container { padding: 40px 20px; text-align: center; }
        .welcome-card {
            background: white; max-width: 800px; margin: 0 auto; padding: 40px;
            border-radius: 20px; border: 1px solid var(--border-soft);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 { color: var(--nav-purple-dark); font-weight: 800; margin-bottom: 10px; }
        p { color: #64748b; font-size: 16px; margin-bottom: 30px; }

        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        .stat-card {
            background: #f1f5f9; padding: 20px; border-radius: 15px;
            text-decoration: none; color: inherit; transition: 0.3s;
            border: 1px solid transparent;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--nav-active); background: white; }
        .stat-value { display: block; font-size: 24px; font-weight: 800; color: var(--header-purple-mid); }
        .stat-label { font-size: 13px; font-weight: 700; color: var(--nav-purple-dark); }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="active">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html">العملاء</a>
    <a href="sales.html">المبيعات</a>
</nav>

<div class="employee-info-bar">
    <div class="info-content">
        <div class="info-item">الموظف: <span>محمد المنصور</span></div>
        <div class="info-item">القسم: <span>الإدارة</span></div>
        <div class="info-item">المشروع: <span>ASGate CRM</span></div>
    </div>
</div>

<div class="main-container">
    <div class="welcome-card">
        <h1>مرحباً بك في نظام ASGate</h1>
        <p>نظام إدارة علاقات العملاء وتطوير الأعمال الذكي</p>
        
        <div class="dashboard-grid">
            <a href="opportunities.html" class="stat-card">
                <span class="stat-value" id="oppCount">0</span>
                <span class="stat-label">الفرص النشطة</span>
            </a>
            <a href="visits.html" class="stat-card">
                <span class="stat-value" id="visitCount">0</span>
                <span class="stat-label">زيارات اليوم</span>
            </a>
            <div class="stat-card">
                <span class="stat-value">١٠٠٪</span>
                <span class="stat-label">كفاءة النظام</span>
            </div>
        </div>
    </div>
</div>

<script>
    // تحديث الأرقام بناءً على البيانات المخزنة
    function updateStats() {
        const opps = JSON.parse(localStorage.getItem('asgate_opportunities_v21') || '[]');
        const visits = JSON.parse(localStorage.getItem('asgate_visits_data_v21') || '[]'); // مفتاح الزيارات كما هو في الكود الخاص بك
        
        document.getElementById('oppCount').innerText = opps.length;
        document.getElementById('visitCount').innerText = visits.length;
    }

    window.onload = updateStats;
</script>
</body>
</html>
