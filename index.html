<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-light: #f4f7f6;
            --accent-blue: #003366;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* شريط التنقل الموحد - ثابت في كل الصفحات */
        .navbar { 
            background-color: var(--nav-navy); 
            display: flex; 
            padding: 8px 20px; 
            border-bottom-left-radius: 12px; 
            border-bottom-right-radius: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar a { 
            color: white; 
            text-decoration: none; 
            padding: 6px 15px; 
            font-weight: 700; 
            font-size: 11px; 
            border-radius: 6px; 
            margin-left: 5px; 
        }
        .active-link { background: var(--accent-blue) !important; }

        /* محتوى الصفحة */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        h1 { color: var(--nav-navy); margin-bottom: 10px; }
        p { color: #666; font-size: 16px; margin-bottom: 30px; }

        .quick-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn-main {
            background-color: var(--nav-navy);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-main:hover { background-color: var(--accent-blue); transform: translateY(-2px); }

        /* شريط المهام السفلي */
        .bottom-taskbar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #eee; 
            padding: 8px; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            border-top: 1px solid #ccc; 
            font-size: 11px; 
            font-weight: bold; 
            color: #555; 
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="active-link">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="#">العملاء</a>
        <a href="#">المبيعات</a>
        <a href="#">تذكيرات</a>
    </nav>

    <div class="hero-section">
        <div class="welcome-card">
            <h1>ASGate System</h1>
            <p>نظام إدارة علاقات العملاء والموارد البشرية</p>
            <div class="quick-actions">
                <a href="visits.html" class="btn-main">سجل الزيارات اليومية</a>
                <a href="opportunities.html" class="btn-main">متابعة الفرص البيعية</a>
            </div>
        </div>
    </div>

    <div class="bottom-taskbar">
        <span>المستخدم: حمزة</span> | <span>الحالة: متصل</span> | <span>نظام ASGate v1.0</span>
    </div>

</body>
</html>
