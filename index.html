<div class="content-box" style="margin-top: 15px; height: 180px; padding: 10px;">
    <h3 style="margin-bottom: 5px;">👥 أداء المناديب (الهدف vs المعلق)</h3>
    <div style="height: 150px; width: 100%;">
        <canvas id="delegatesChart"></canvas>
    </div>
</div>

<script>
    // كود الرسم البياني الجديد للمناديب
    const ctxDelegates = document.getElementById('delegatesChart').getContext('2d');
    
    // أسماء المناديب (أمثلة)
    const delegateNames = ["أحمد", "سارة", "خالد", "ليلى", "عمر", "نورة", "فهد", "ريم"];
    
    new Chart(ctxDelegates, {
        type: 'bar',
        data: {
            labels: delegateNames,
            datasets: [
                {
                    label: 'الهدف',
                    data: [15000, 12000, 18000, 14000, 16000, 13000, 17000, 15500],
                    backgroundColor: '#22c55e', // أخضر
                    barPercentage: 0.9,        // عرض العمود
                    categoryPercentage: 0.5    // تقليل المساحة بين المجموعات
                },
                {
                    label: 'المعلق',
                    data: [2000, 1500, 3000, 1000, 2500, 800, 2200, 1200],
                    backgroundColor: '#facc15', // أصفر
                    barPercentage: 0.9,
                    categoryPercentage: 0.5
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false // إخفاء المفتاح لتوفير مساحة في الـ 150 بيكسل
                },
                tooltip: {
                    bodyFont: { family: 'Cairo' }
                }
            },
            scales: {
                x: {
                    stacked: false, // أعمدة بجانب بعضها
                    grid: { display: false },
                    ticks: {
                        font: { family: 'Cairo', size: 10, weight: 300 }
                    }
                },
                y: {
                    beginAtZero: true,
                    grid: { color: '#e2e8f0' },
                    ticks: {
                        font: { size: 9 },
                        display: false // إخفاء أرقام المحور الرأسي لزيادة المساحة للرسم
                    }
                }
            },
            // هذا الجزء يزيل الفواصل بين الأعمدة داخل نفس المجموعة
            layout: {
                padding: 0
            }
        }
    });
</script>
