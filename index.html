<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASGate - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --nav-navy: #001f3f; --bg-color: #f4f7f9; --accent-blue: #3b82f6; }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }
        .navbar { background-color: var(--nav-navy); display: flex; padding: 10px 20px; margin: 5px; border-radius: 15px; }
        .navbar a { color: white; text-decoration: none; padding: 8px 15px; font-weight: 700; font-size: 14px; border-radius: 10px; }
        .navbar a.active { background-color: rgba(255,255,255,0.1); }
        .hero { text-align: center; padding: 60px 20px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; text-decoration: none; color: inherit; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .card h3 { color: var(--nav-navy); margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="active">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
    </nav>
    <div class="hero">
        <h1>مرحباً بك في ASGate</h1>
        <p>نظام إدارة علاقات العملاء والزيارات الميدانية</p>
    </div>
    <div class="cards-grid">
        <a href="visits.html" class="card"><h3>سجل الزيارات</h3><p>إدارة المواعيد والزيارات اليومية</p></a>
        <a href="opportunities.html" class="card"><h3>الفرص البيعية</h3><p>متابعة العملاء المهتمين والصفقات</p></a>
        <a href="customers.html" class="card"><h3>قاعدة العملاء</h3><p>إدارة بيانات العملاء والملفات الشخصية</p></a>
    </div>
</body>
</html>
