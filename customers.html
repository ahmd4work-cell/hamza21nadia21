<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASGate - العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-bg: #2e1065;
            --nav-active: #a78bfa;
            --bg-color: #f4f7f9;
            --border-color: #cbd5e1;
            --sticker-yellow: #fff9c4;
            --accent-green-active: #22c55e;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }

        .navbar { 
            background-color: var(--nav-bg); display: flex; align-items: center; 
            padding: 0 20px; margin: 10px; border-radius: 15px; height: 37px;
            position: sticky; top: 10px; z-index: 1000; box-sizing: border-box;
        }
        .navbar a { 
            color: white; text-decoration: none; padding: 0 15px; font-weight: 700; 
            font-size: 12px; border-radius: 8px; transition: 0.3s; line-height: 26px; height: 26px; display: inline-block;
        }
        .navbar a.active { background-color: var(--nav-active); }

        .container { padding: 5px 10px; }
        .action-bar { display: flex; align-items: center; margin-top: 15px; margin-bottom: 20px; gap: 10px; }
        
        .btn-top { border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 13px; color: white; }
        .btn-save-all { background-color: #d1fae5; color: #065f46; opacity: 0.6; pointer-events: none; }
        .btn-save-all.active { background-color: var(--accent-green-active); color: white; opacity: 1; pointer-events: auto; }

        table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border-color); }
        th { background-color: #f5f3ff; padding: 8px; color: var(--nav-bg); font-size: 11px; font-weight: 800; border: 1px solid var(--border-color); }
        td { border: 1px solid var(--border-color); text-align: center; height: 38px; font-size: 11px; }

        /* خلية الشركة الذكية */
        .company-cell { cursor: text; position: relative; }
        .company-link { 
            color: var(--nav-bg); 
            text-decoration: underline; 
            font-weight: 700; 
            padding: 2px 5px;
            display: inline-block; /* ليكون الرابط على قدر النص فقط */
        }
        .company-link:hover { color: #3b82f6; background: #eff6ff; border-radius: 4px; }

        .excel-input { 
            width: 95%; height: 80%; border: 1px solid #3b82f6; border-radius: 4px;
            padding: 0 5px; font-family: 'Cairo'; font-size: 11px; text-align: center; 
            outline: none; background: white; display: none; margin: auto;
        }

        .notes-cell { cursor: pointer; color: #475569; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 8px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2000; }
        .sticker-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 7cm; background-color: var(--sticker-yellow); border-radius: 2px; }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html" class="active">العملاء</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top" style="background:#3b82f6" onclick="insertNewRow()">+ إضافة عميل جديد</button>
        <button id="saveAllBtn" class="btn-top btn-save-all" onclick="saveAllData()">حفظ التغييرات</button>
    </div>
    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 20%;">الشركة (النص رابط / الخلية تعديل)</th>
                <th style="width: 15%;">العنوان</th>
                <th style="width: 10%;">المسؤول</th>
                <th style="width: 10%;">الموبايل</th>
                <th style="width: 10%;">السجل</th>
                <th style="width: 25%;">ملاحظات</th>
                <th style="width: 10%;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="notesOverlay" class="modal-overlay" onclick="this.style.display='none'">
    <div class="sticker-container" onclick="event.stopPropagation()">
        <div id="historyArea" style="padding:15px; font-size:11px; max-height:250px; overflow-y:auto;"></div>
        <div style="padding:15px; background:#fff59d">
            <textarea id="stickerInput" style="width:100%; height:50px; border:none; background:transparent; font-family:'Cairo'; outline:none;" placeholder="تحديث جديد..."></textarea>
            <button onclick="confirmAndSaveNote()" style="width:100%; background:#22c55e; color:white; border:none; padding:8px; cursor:pointer; font-family:'Cairo'; font-weight:bold;">حفظ</button>
        </div>
    </div>
</div>

<script>
    let isDirty = false;
    let activeCell = null;

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_customers_data');
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (saved) {
            JSON.parse(saved).forEach(item => renderRow(item));
        }
        toggleSaveBtn(false);
    }

    function renderRow(v, isNew = false) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(isNew ? 0 : -1);
        
        // خلية الشركة الذكية
        const compCell = row.insertCell(0);
        compCell.className = "company-cell";
        // النقر على الخلية يبدأ التعديل، لكن النقر على الرابط يفتح الصفحة
        compCell.onclick = function(e) {
            if (e.target.tagName !== 'A') startEdit(this);
        };

        compCell.innerHTML = `
            <a href="customer-profile.html?name=${encodeURIComponent(v.comp || '')}" class="company-link">
                ${v.comp || 'اسم الشركة...'}
            </a>
            <input type="text" class="excel-input" value="${v.comp || ''}" 
                   onblur="finalizeEdit(this)" 
                   oninput="markAsChanged()">
        `;

        row.innerHTML += `
            <td><input type="text" class="excel-input-standard" value="${v.address || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input-standard" value="${v.mgr || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input-standard" value="${v.mob || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input-standard" value="${v.cr || ''}" oninput="markAsChanged()"></td>
            <td class="notes-cell" data-notes='${v.notes || "[]"}' onclick="openSticker(this)">${getDisplayNote(v.notes || "[]")}</td>
            <td><button style="border:none; background:#fee2e2; color:red; cursor:pointer; padding:3px 8px; border-radius:4px;" onclick="deleteRow(this)">حذف</button></td>
        `;

        // تنسيق المدخلات الأخرى لتشبه الإكسيل
        row.querySelectorAll('.excel-input-standard').forEach(input => {
            input.style.width = "100%";
            input.style.height = "100%";
            input.style.border = "none";
            input.style.textAlign = "center";
            input.style.fontFamily = "Cairo";
            input.style.fontSize = "11px";
            input.style.background = "transparent";
            input.style.outline = "none";
        });
    }

    function startEdit(td) {
        const link = td.querySelector('.company-link');
        const input = td.querySelector('.excel-input');
        link.style.display = 'none';
        input.style.display = 'block';
        input.focus();
    }

    function finalizeEdit(input) {
        const td = input.parentElement;
        const link = td.querySelector('.company-link');
        link.innerText = input.value || 'اسم الشركة...';
        link.href = "customer-profile.html?name=" + encodeURIComponent(input.value);
        link.style.display = 'inline-block';
        input.style.display = 'none';
    }

    function getDisplayNote(json) {
        try {
            const arr = JSON.parse(json);
            return arr.length > 0 ? arr[arr.length-1].text.substring(0,30) + '...' : 'إضافة ملاحظة...';
        } catch(e) { return 'إضافة ملاحظة...'; }
    }

    function markAsChanged() { toggleSaveBtn(true); }
    function toggleSaveBtn(active) { isDirty = active; document.getElementById('saveAllBtn').classList.toggle('active', active); }

    function openSticker(cell) {
        activeCell = cell;
        const notes = JSON.parse(cell.getAttribute('data-notes') || "[]");
        document.getElementById('historyArea').innerHTML = notes.map(n => `<b>${n.date}</b>: ${n.text}<hr>`).join('');
        document.getElementById('notesOverlay').style.display = 'block';
    }

    function confirmAndSaveNote() {
        const text = document.getElementById('stickerInput').value.trim();
        if(text) {
            let notes = JSON.parse(activeCell.getAttribute('data-notes') || "[]");
            notes.push({ date: new Date().toLocaleDateString('en-GB'), text: text });
            activeCell.setAttribute('data-notes', JSON.stringify(notes));
            activeCell.innerText = getDisplayNote(JSON.stringify(notes));
            markAsChanged();
        }
        document.getElementById('notesOverlay').style.display = 'none';
    }

    function saveAllData() {
        const allData = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            // جلب قيمة الشركة من الإدخال المخفي أو الرابط
            const compVal = row.cells[0].querySelector('.excel-input').value;
            const otherInputs = row.querySelectorAll('input.excel-input-standard');
            allData.push({
                comp: compVal, 
                address: otherInputs[0].value, 
                mgr: otherInputs[1].value,
                mob: otherInputs[2].value, 
                cr: otherInputs[3].value,
                notes: row.querySelector('.notes-cell').getAttribute('data-notes')
            });
        });
        localStorage.setItem('asgate_customers_data', JSON.stringify(allData));
        alert("تم حفظ البيانات بنجاح");
        toggleSaveBtn(false);
    }

    function insertNewRow() { renderRow({}, true); markAsChanged(); }
    function deleteRow(btn) { if(confirm("حذف العميل؟")) { btn.closest('tr').remove(); saveAllData(); } }
</script>
</body>
</html>
