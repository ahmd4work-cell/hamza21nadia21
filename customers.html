<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASGate - العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-ultra-purple: #2e1065; /* اللون البنفسجي الداكن جداً الموحد */
            --active-light-purple: #a78bfa; /* اللون البنفسجي الفاتح للرابط النشط */
            --bg-color: #f4f7f9;
            --accent-blue: #3b82f6;
            --border-color: #cbd5e1;
            --sticker-yellow: #fff9c4;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }

        /* شريط التنقل الموحد - الارتفاع 37 بكسل */
        .navbar { 
            background-color: var(--nav-ultra-purple); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            margin: 10px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 10px;
            z-index: 1000;
            height: 37px; 
            box-sizing: border-box;
        }

        .navbar a { 
            color: white; 
            text-decoration: none; 
            padding: 4px 15px; 
            margin-left: 5px; 
            font-weight: 700; 
            font-size: 11px; 
            border-radius: 10px; 
            transition: 0.3s; 
            line-height: 1;
        }

        /* تمييز كلمة العملاء بمربع بنفسجي فاتح */
        .navbar a.active { 
            background-color: var(--active-light-purple); 
            color: white; 
            border-radius: 8px;
        }
        
        .navbar a:hover:not(.active) { background-color: rgba(255,255,255,0.1); }

        .container { padding: 5px 10px; }
        .action-bar { display: flex; align-items: center; margin-top: 15px; margin-bottom: 20px; gap: 10px; padding: 10px 0; }
        .btn-top { border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 13px; color: white; transition: 0.3s; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 1px solid var(--border-color); }
        th { background-color: #f5f3ff; padding: 8px 2px; color: var(--nav-ultra-purple); font-size: 10px; font-weight: 800; border: 1px solid var(--border-color); }
        td { border: 1px solid var(--border-color); text-align: center; height: 38px; font-size: 11px; }

        .excel-input { width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo'; font-size: 11px; text-align: center; outline: none; background: transparent; }
        .notes-cell { cursor: pointer; color: #475569; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 8px; text-align: right; font-style: italic; }

        /* نظام الملاحظات (الاستيكر) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2000; }
        .sticker-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 7cm; height: 12cm; background-color: var(--sticker-yellow); border-radius: 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column;
            border-top: 20px solid #fff59d;
        }
        .sticker-history { flex-grow: 1; overflow-y: auto; padding: 12px; font-size: 11px; border-bottom: 1px dashed #decb00; text-align: right; }
        .sticker-editor { padding: 12px; height: 100px; text-align: right; }
        .date-chip { display: inline-block; background: #fbc02d; color: #000; padding: 1px 7px; border-radius: 10px; font-weight: bold; font-size: 9px; margin-bottom: 5px; }
        .sticker-textarea { width: 100%; border: none; background: transparent; font-family: 'Cairo'; font-size: 11px; resize: none; outline: none; height: 60px; text-align: right; }
        .sticker-save-btn { width: 100%; border: none; padding: 7px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white; font-size: 11px; background-color: #81c784; }
        .sticker-save-btn.active { background-color: #22c55e; }

        .custom-confirm { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; text-align: center; border: 2px solid var(--nav-ultra-purple); z-index: 3000; min-width: 250px; }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html" class="active">العملاء</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top" style="background:var(--accent-blue)" onclick="insertNewRow()">+ إضافة عميل جديد</button>
        <button id="saveAllBtn" class="btn-top" style="background:#d1fae5; color:#065f46; opacity:0.6; pointer-events:none;" onclick="saveAllData()">حفظ التغييرات</button>
    </div>
    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 15%;">الشركة</th>
                <th style="width: 15%;">العنوان</th>
                <th style="width: 10%;">المسؤول</th>
                <th style="width: 10%;">الموبايل</th>
                <th style="width: 10%;">السجل</th>
                <th style="width: 12%;">مندوب المبيعات</th>
                <th style="width: 18%;">ملاحظات</th>
                <th style="width: 10%;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="notesOverlay" class="modal-overlay" onclick="handleOutsideClick(event)">
    <div class="sticker-container" onclick="event.stopPropagation()">
        <div id="historyArea" class="sticker-history"></div>
        <div class="sticker-editor">
            <div id="currentDateChip" class="date-chip"></div>
            <textarea id="stickerInput" class="sticker-textarea" placeholder="تحديث جديد..." oninput="updateStickerBtn()"></textarea>
        </div>
        <button id="saveStickerBtn" class="sticker-save-btn" onclick="confirmAndSaveNote()">حفظ التحديث</button>
    </div>
</div>

<div id="confirmBox" class="custom-confirm">
    <p id="confirmMsg" style="font-weight: bold;"></p>
    <button class="btn-top" style="background:#22c55e; margin:5px" id="confirmBtn">نعم</button>
    <button class="btn-top" style="background:#ef4444; margin:5px" onclick="closeConfirm()">لا</button>
</div>

<script>
    let isDirty = false; 
    let activeCell = null; 
    let isStickerChanged = false;

    function getDisplayNote(notesJson) {
        try {
            const notes = JSON.parse(notesJson);
            if (notes.length > 0) {
                let lastNote = notes[notes.length - 1].text;
                return lastNote.replace(/<br>/g, " ").replace(/•/g, "").substring(0, 30) + "...";
            }
        } catch(e) {}
        return "إضافة ملاحظة...";
    }

    function openSticker(cell) {
        activeCell = cell; 
        isStickerChanged = false;
        const notes = JSON.parse(cell.getAttribute('data-notes') || "[]");
        let hHtml = "";
        notes.forEach((n, idx) => {
            hHtml += `<div style="margin-bottom:8px;"><strong>${n.date}</strong><br>${n.text}</div>`;
            if(idx < notes.length - 1) hHtml += '<hr style="border:0; border-top:1px solid #decb00">';
        });
        document.getElementById('historyArea').innerHTML = hHtml;
        const now = new Date(); 
        const days = ['الأحد', 'الأثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        document.getElementById('currentDateChip').innerText = `${days[now.getDay()]} ${now.toLocaleDateString('en-GB')}`;
        document.getElementById('stickerInput').value = '';
        document.getElementById('saveStickerBtn').classList.remove('active');
        document.getElementById('notesOverlay').style.display = 'block';
    }

    function updateStickerBtn() {
        isStickerChanged = document.getElementById('stickerInput').value.trim() !== "";
        document.getElementById('saveStickerBtn').classList.toggle('active', isStickerChanged);
    }

    function handleOutsideClick(e) {
        if (isStickerChanged) showConfirm("هل تريد حفظ الملاحظات؟", confirmAndSaveNote);
        else document.getElementById('notesOverlay').style.display = 'none';
    }

    function showConfirm(msg, action) {
        document.getElementById('confirmMsg').innerText = msg;
        document.getElementById('confirmBox').style.display = 'block';
        document.getElementById('confirmBtn').onclick = () => { action(); closeConfirm(); };
    }

    function closeConfirm() { document.getElementById('confirmBox').style.display = 'none'; }
    
    function markAsChanged() { 
        isDirty = true; 
        const btn = document.getElementById('saveAllBtn');
        btn.style.backgroundColor = "#22c55e";
        btn.style.color = "white";
        btn.style.opacity = "1";
        btn.style.pointerEvents = "auto";
    }

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_customers_data');
        if (saved) {
            let data = JSON.parse(saved);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(item => renderRow(item));
        }
    }

    function renderRow(v, isNew = false) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(isNew ? 0 : -1);
        row.innerHTML = `
            <td><input type="text" class="excel-input" value="${v.comp || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.address || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.mgr || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.mob || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.cr || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.salesman || ''}" oninput="markAsChanged()"></td>
            <td class="notes-cell" data-notes='${v.notes || "[]"}' onclick="openSticker(this)">${getDisplayNote(v.notes || "[]")}</td>
            <td><button style="border:none; background:#fee2e2; color:red; cursor:pointer; font-size:10px; border-radius:4px; padding:4px;" onclick="deleteRow(this)">حذف</button></td>
        `;
    }

    function confirmAndSaveNote() {
        const text = document.getElementById('stickerInput').value.trim();
        if (text) {
            let notes = JSON.parse(activeCell.getAttribute('data-notes') || "[]");
            const todayStr = document.getElementById('currentDateChip').innerText;
            if (notes.length > 0 && notes[notes.length - 1].date === todayStr) {
                notes[notes.length - 1].text += `<br>• ${text}`;
            } else { notes.push({ date: todayStr, text: text }); }
            activeCell.setAttribute('data-notes', JSON.stringify(notes));
            activeCell.innerText = getDisplayNote(JSON.stringify(notes));
            markAsChanged();
        }
        isStickerChanged = false; 
        document.getElementById('notesOverlay').style.display = 'none'; 
        closeConfirm();
    }

    function saveAllData() {
        const allData = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            const ins = row.querySelectorAll('.excel-input');
            allData.push({ 
                comp: ins[0].value, 
                address: ins[1].value, 
                mgr: ins[2].value, 
                mob: ins[3].value, 
                cr: ins[4].value, 
                salesman: ins[5].value, 
                notes: row.querySelector('.notes-cell').getAttribute('data-notes') 
            });
        });
        localStorage.setItem('asgate_customers_data', JSON.stringify(allData)); 
        location.reload();
    }

    function insertNewRow() { renderRow({}, true); markAsChanged(); }
    function deleteRow(btn) { if(confirm("حذف العميل؟")) { btn.closest('tr').remove(); saveAllData(); } }
</script>
</body>
</html>
