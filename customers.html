<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-navy: #001f3f;
            --bg-color: #f4f7f9;
            --accent-green: #22c55e;
            --border-color: #cbd5e1;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; line-height: 1; }

        /* شريط التنقل الموحد - الارتفاع المحسوب برمجياً 44px */
        .navbar { 
            background-color: var(--nav-navy); 
            display: flex; 
            align-items: center;
            padding: 8px 20px; /* الحشوة الداخلية 8px علوي وسفلي */
            margin: 10px;      /* الهامش عن السقف 10px */
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 10px;
            z-index: 1000;
            height: auto; 
        }

        .navbar a { 
            color: white; 
            text-decoration: none; 
            padding: 6px 15px; /* حشوة الروابط 6px علوي وسفلي */
            margin-left: 5px; 
            font-weight: 700; 
            font-size: 11px;   /* حجم الخط 11px */
            border-radius: 10px; 
            transition: 0.3s; 
            line-height: 1;    /* لضمان دقة الحساب الإجمالي */
        }

        .navbar a.active { background-color: rgba(255,255,255,0.1); }
        .navbar a:hover { background-color: rgba(255,255,255,0.05); }

        .container { padding: 20px; text-align: center; }
        .placeholder-msg { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            border: 1px solid var(--border-color);
            color: var(--nav-navy);
            margin-top: 50px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html" class="active">العملاء</a>
</nav>

<div class="container">
    <div class="placeholder-msg">
        <h2>قاعدة بيانات العملاء</h2>
        <p>هذه الصفحة قيد التطوير لتشمل قائمة العملاء النهائيين والتعاقدات.</p>
    </div>
</div>

</body>
</html>
