<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASGate - العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-bg: #2e1065;
            --nav-active: #a78bfa;
            --bg-color: #f4f7f9;
            --border-color: #cbd5e1;
            --sticker-yellow: #fff9c4;
            --accent-green-active: #22c55e;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; }

        /* شريط التنقل الموحد - 37px */
        .navbar { 
            background-color: var(--nav-bg); display: flex; align-items: center; 
            padding: 0 20px; margin: 10px; border-radius: 15px; height: 37px; 
            position: sticky; top: 10px; z-index: 1000; box-sizing: border-box;
        }

        .navbar a { 
            color: white; text-decoration: none; padding: 0 15px; margin-left: 5px; 
            font-weight: 700; font-size: 12px; border-radius: 8px; transition: 0.3s; 
            line-height: 26px; height: 26px; display: inline-block;
        }

        .navbar a.active { background-color: var(--nav-active); }

        .container { padding: 5px 10px; }
        .action-bar { display: flex; align-items: center; margin-top: 15px; margin-bottom: 20px; gap: 10px; }
        
        .btn-top { border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; font-size: 13px; color: white; }
        .btn-save-all { background-color: #d1fae5; color: #065f46; opacity: 0.6; pointer-events: none; }
        .btn-save-all.active { background-color: var(--accent-green-active); color: white; opacity: 1; pointer-events: auto; }

        table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border-color); }
        th { background-color: #f5f3ff; padding: 8px; color: var(--nav-bg); font-size: 11px; font-weight: 800; border: 1px solid var(--border-color); }
        td { border: 1px solid var(--border-color); text-align: center; height: 38px; font-size: 11px; position: relative; }

        .excel-input { width: 100%; height: 100%; border: none; padding: 0 5px; font-family: 'Cairo'; font-size: 11px; text-align: center; outline: none; background: transparent; }
        
        /* تنسيق رابط ملف العميل */
        .profile-link {
            position: absolute; left: 5px; top: 50%; transform: translateY(-50%);
            text-decoration: none; font-size: 14px; color: var(--nav-bg); opacity: 0.5;
        }
        .profile-link:hover { opacity: 1; }

        .notes-cell { cursor: pointer; color: #475569; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 5px; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2000; }
        .sticker-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 7cm; background: var(--sticker-yellow); border-radius: 2px; box-shadow: 5px 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body onload="loadSavedData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html" class="active">العملاء</a>
</nav>

<div class="container">
    <div class="action-bar">
        <button class="btn-top" style="background:#3b82f6" onclick="insertNewRow()">+ إضافة عميل جديد</button>
        <button id="saveAllBtn" class="btn-top btn-save-all" onclick="saveAllData()">حفظ التغييرات</button>
    </div>
    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 20%;">الشركة (تعديل/ملف)</th>
                <th style="width: 15%;">العنوان</th>
                <th style="width: 10%;">المسؤول</th>
                <th style="width: 10%;">الموبايل</th>
                <th style="width: 10%;">السجل</th>
                <th style="width: 25%;">ملاحظات</th>
                <th style="width: 10%;">إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="notesOverlay" class="modal-overlay" onclick="closeSticker()">
    <div class="sticker-container" onclick="event.stopPropagation()">
        <div id="historyArea" style="padding:15px; max-height:300px; overflow-y:auto; font-size:11px;"></div>
        <div style="padding:15px; background:#fff59d">
            <textarea id="stickerInput" style="width:100%; height:60px; border:none; background:transparent; font-family:'Cairo'; outline:none;" placeholder="تحديث جديد..."></textarea>
            <button onclick="confirmAndSaveNote()" style="width:100%; border:none; padding:8px; background:#22c55e; color:white; font-family:'Cairo'; font-weight:bold; cursor:pointer;">حفظ التحديث</button>
        </div>
    </div>
</div>

<script>
    let isDirty = false;
    let activeCell = null;

    function loadSavedData() {
        const saved = localStorage.getItem('asgate_customers_data');
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (saved) {
            JSON.parse(saved).forEach(item => renderRow(item));
        }
        toggleSaveBtn(false);
    }

    function renderRow(v, isNew = false) {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(isNew ? 0 : -1);
        row.innerHTML = `
            <td style="display:flex; align-items:center;">
                <input type="text" class="excel-input" value="${v.comp || ''}" oninput="markAsChanged()">
                <a href="customer-profile.html?name=${encodeURIComponent(v.comp || '')}" class="profile-link" title="فتح الملف الشخصي">📂</a>
            </td>
            <td><input type="text" class="excel-input" value="${v.address || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.mgr || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.mob || ''}" oninput="markAsChanged()"></td>
            <td><input type="text" class="excel-input" value="${v.cr || ''}" oninput="markAsChanged()"></td>
            <td class="notes-cell" data-notes='${v.notes || "[]"}' onclick="openSticker(this)">${getDisplayNote(v.notes || "[]")}</td>
            <td><button style="border:none; background:#fee2e2; color:red; cursor:pointer; padding:4px 8px; border-radius:4px;" onclick="deleteRow(this)">حذف</button></td>
        `;
    }

    function getDisplayNote(json) {
        try {
            const arr = JSON.parse(json);
            return arr.length > 0 ? arr[arr.length-1].text.substring(0,30) + '...' : 'إضافة ملاحظة...';
        } catch(e) { return 'إضافة ملاحظة...'; }
    }

    function markAsChanged() { toggleSaveBtn(true); }
    function toggleSaveBtn(active) { isDirty = active; document.getElementById('saveAllBtn').classList.toggle('active', active); }

    function openSticker(cell) {
        activeCell = cell;
        const notes = JSON.parse(cell.getAttribute('data-notes') || "[]");
        document.getElementById('historyArea').innerHTML = notes.map(n => `<b>${n.date}</b>: ${n.text}<hr>`).join('');
        document.getElementById('notesOverlay').style.display = 'block';
    }

    function closeSticker() { document.getElementById('notesOverlay').style.display = 'none'; }

    function confirmAndSaveNote() {
        const text = document.getElementById('stickerInput').value.trim();
        if(text) {
            let notes = JSON.parse(activeCell.getAttribute('data-notes') || "[]");
            notes.push({ date: new Date().toLocaleDateString('en-GB'), text: text });
            activeCell.setAttribute('data-notes', JSON.stringify(notes));
            activeCell.innerText = getDisplayNote(JSON.stringify(notes));
            markAsChanged();
        }
        closeSticker();
    }

    function saveAllData() {
        const allData = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            const ins = row.querySelectorAll('.excel-input');
            allData.push({
                comp: ins[0].value, address: ins[1].value, mgr: ins[2].value,
                mob: ins[3].value, cr: ins[4].value,
                notes: row.querySelector('.notes-cell').getAttribute('data-notes')
            });
        });
        localStorage.setItem('asgate_customers_data', JSON.stringify(allData));
        loadSavedData();
    }

    function insertNewRow() { renderRow({}, true); markAsChanged(); }
    function deleteRow(btn) { if(confirm("حذف العميل؟")) { btn.closest('tr').remove(); saveAllData(); } }
</script>
</body>
</html>
