<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل الطلب | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --nav-bg: #2e1065; --header-green: #15803d; --bg-color: #f4f7f9; --white: #ffffff; --border-color: #cbd5e1; }
        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        .navbar { background-color: var(--nav-bg); display: flex; align-items: center; padding: 0 20px; height: 37px; }
        .navbar a { color: white; text-decoration: none; padding: 0 15px; font-size: 12px; font-weight: 700; }
        .container { padding: 20px; }
        .header-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; margin-bottom: 20px; }
        .info-box { text-align: center; }
        .info-label { font-size: 11px; color: #64748b; display: block; }
        .info-val { font-weight: 800; font-size: 15px; color: var(--nav-bg); }
        .table-wrapper { background: white; border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        thead th { background: var(--header-green); color: white; padding: 10px; font-size: 12px; }
        td { border: 1px solid #f1f5f9; padding: 10px; font-size: 13px; }
        .status-select { font-family: 'Cairo'; padding: 5px; border-radius: 5px; width: 100%; }
        .btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal-content { background:white; padding:20px; border-radius:12px; width:300px; }
        .modal-content input { width:100%; padding:8px; margin-bottom:10px; box-sizing:border-box; }
    </style>
</head>
<body onload="loadOrderDetails()">

<nav class="navbar">
    <a href="sales.html">➡️ العودة للمبيعات</a>
</nav>

<div class="container">
    <div class="header-card">
        <div class="info-box"><span class="info-label">رقم الطلب</span><span class="info-val" id="orderId">-</span></div>
        <div class="info-box"><span class="info-label">الشركة</span><span class="info-val" id="orderComp">-</span></div>
        <div class="info-box" style="border: 2px solid var(--header-green); padding: 5px 15px; border-radius: 8px;">
            <span class="info-label">إجمالي الطلب</span><span class="info-val" id="orderTotalSum">0.00 ر.س</span>
        </div>
    </div>

    <div style="margin-bottom: 10px; display: flex; gap: 10px;">
        <button class="btn" style="background: #3b82f6; color:white;" onclick="openModal()">+ إضافة منتج</button>
        <button class="btn" style="background: #dc2626; color:white;" onclick="deleteSelected()">حذف المحدد</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                    <th>النوع</th>
                    <th>التفاصيل</th>
                    <th>العدد</th>
                    <th>الاشتراك</th>
                    <th>الإجمالي</th>
                    <th>الحالة</th>
                    <th>ملاحظة</th>
                </tr>
            </thead>
            <tbody id="productsBody"></tbody>
        </table>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <h3>إضافة منتج</h3>
        <input type="text" id="p_name" placeholder="اسم المنتج/الخدمة">
        <input type="number" id="p_qty" value="1" placeholder="العدد">
        <input type="text" id="p_sub" placeholder="سعر الاشتراك">
        <button class="btn" style="background:var(--header-green); color:white; width:100%;" onclick="saveProduct()">حفظ</button>
        <button class="btn" style="width:100%; margin-top:5px;" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script>
    let currentOrderId = new URLSearchParams(window.location.search).get('id');

    function loadOrderDetails() {
        const salesDb = JSON.parse(localStorage.getItem('asgate_sales_db') || '[]');
        const order = salesDb.find(o => String(o.id) === String(currentOrderId));
        if (order) {
            document.getElementById('orderId').innerText = '#' + order.id;
            document.getElementById('orderComp').innerText = order.comp;
            renderProducts();
        }
    }

    function renderProducts() {
        const productsDb = JSON.parse(localStorage.getItem('asgate_products_db') || '{}');
        const products = productsDb[currentOrderId] || [];
        const tbody = document.getElementById('productsBody');
        tbody.innerHTML = products.map((p, index) => {
            const subVal = parseFloat(p.sub) || 0;
            const lineTotal = (p.qty * subVal).toFixed(2);
            return `
                <tr>
                    <td><input type="checkbox" class="row-checkbox" data-index="${index}"></td>
                    <td>${p.type || 'خدمة'}</td>
                    <td>${p.name}</td>
                    <td>${p.qty}</td>
                    <td>${subVal}</td>
                    <td style="font-weight:800; color:green;">${lineTotal}</td>
                    <td>
                        <select class="status-select" onchange="updateStatus(${index}, this.value)">
                            <option value="جديد" ${p.status==='جديد'?'selected':''}>جديد</option>
                            <option value="مكتمل" ${p.status==='مكتمل'?'selected':''}>مكتمل</option>
                            <option value="معلق" ${p.status==='معلق'?'selected':''}>معلق</option>
                        </select>
                    </td>
                    <td contenteditable="true" onblur="updateNote(${index}, this.innerText)">${p.note || ''}</td>
                </tr>
            `;
        }).join('');
        syncSumsToSales();
    }

    function syncSumsToSales() {
        const productsDb = JSON.parse(localStorage.getItem('asgate_products_db') || '{}');
        const products = productsDb[currentOrderId] || [];
        let completed = 0, pending = 0, total = 0;

        products.forEach(p => {
            const lineTotal = (p.qty * (parseFloat(p.sub) || 0));
            total += lineTotal;
            if (p.status === "مكتمل") completed += lineTotal;
            if (p.status === "معلق") pending += lineTotal;
        });

        document.getElementById('orderTotalSum').innerText = total.toFixed(2) + " ر.س";

        // تحديث صفحة المبيعات في الـ LocalStorage
        let salesDb = JSON.parse(localStorage.getItem('asgate_sales_db') || '[]');
        let idx = salesDb.findIndex(o => String(o.id) === String(currentOrderId));
        if (idx !== -1) {
            salesDb[idx].completedSum = completed;
            salesDb[idx].pendingSum = pending;
            localStorage.setItem('asgate_sales_db', JSON.stringify(salesDb));
        }
    }

    function updateStatus(index, newStatus) {
        let db = JSON.parse(localStorage.getItem('asgate_products_db') || '{}');
        db[currentOrderId][index].status = newStatus;
        localStorage.setItem('asgate_products_db', JSON.stringify(db));
        syncSumsToSales();
        renderProducts(); // لإعادة التلوين أو التحديث البصري
    }

    function saveProduct() {
        const name = document.getElementById('p_name').value;
        const qty = parseInt(document.getElementById('p_qty').value) || 1;
        const sub = document.getElementById('p_sub').value;
        
        let db = JSON.parse(localStorage.getItem('asgate_products_db') || '{}');
        if (!db[currentOrderId]) db[currentOrderId] = [];
        
        db[currentOrderId].push({ name, qty, sub, status: 'جديد', note: '' });
        localStorage.setItem('asgate_products_db', JSON.stringify(db));
        
        renderProducts();
        closeModal();
    }

    function deleteSelected() {
        const checked = document.querySelectorAll('.row-checkbox:checked');
        if (checked.length === 0) return;
        let db = JSON.parse(localStorage.getItem('asgate_products_db') || '{}');
        const indexes = Array.from(checked).map(c => parseInt(c.dataset.index));
        db[currentOrderId] = db[currentOrderId].filter((_, i) => !indexes.includes(i));
        localStorage.setItem('asgate_products_db', JSON.stringify(db));
        renderProducts();
    }

    function toggleAll(source) {
        document.querySelectorAll('.row-checkbox').forEach(c => c.checked = source.checked);
    }
    function openModal() { document.getElementById('productModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('productModal').style.display = 'none'; }
</script>
</body>
</html>
