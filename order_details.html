<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل الطلب | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-bg: #2e1065;
            --header-green: #15803d;
            --nav-active: #a78bfa;
            --bg-color: #f4f7f9;
            --white: #ffffff;
            --border-color: #cbd5e1;
            --accent-blue: #3b82f6;
            --text-dark: #1e293b;
            --danger-red: #dc2626;
            --soft-green: #dcfce7;
            --light-border: #e2e8f0;
            --warning-yellow: #fef08a;
            --soft-red: #fee2e2;
            --dark-yellow: #c29103;
            --chat-yellow: #b45309;
        }

        body { background-color: var(--bg-color); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; line-height: 1.2; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .navbar { 
            background-color: var(--nav-bg); display: flex; align-items: center; padding: 0 20px; 
            height: 45px; flex-shrink: 0;
        }
        .navbar a { color: white; text-decoration: none; padding: 0 15px; font-weight: 700; font-size: 13px; }

        .main-container { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }

        .header-section {
            background: var(--white); padding: 10px 20px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--light-border); margin-bottom: 10px; flex-shrink: 0;
        }
        .order-info h2 { margin: 0; color: var(--nav-bg); font-size: 18px; }
        
        .stats-summary { display: flex; gap: 20px; }
        .stat-card { text-align: center; }
        .stat-label { display: block; font-size: 11px; font-weight: 800; color: #64748b; }
        .stat-value { font-size: 15px; font-weight: 800; }

        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-shrink: 0; }
        .btn { 
            border: none; padding: 8px 16px; border-radius: 6px; font-family: 'Cairo'; 
            font-weight: 800; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .btn-add { background: var(--accent-blue); color: white; }
        .btn-export { background: #0f172a; color: white; }

        .search-box {
            padding: 7px 12px; border: 1px solid var(--border-color);
            border-radius: 6px; width: 200px; font-family: 'Cairo'; font-size: 12px;
        }

        .table-wrapper { 
            background: white; border-radius: 10px; border: 1px solid var(--border-color);
            overflow-y: auto; flex: 1; min-height: 0;
        }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { 
            background: var(--header-green); color: white; position: sticky; top: 0; 
            z-index: 10; padding: 10px 5px; font-size: 12px;
        }
        td { 
            padding: 6px 4px; border-bottom: 1px solid var(--light-border); 
            text-align: center; font-size: 12px; font-weight: 700;
        }

        /* سجل نشاط المبيعات - نسخة طبق الأصل */
        .activity-log-section { 
            margin: 15px 0 0 0; padding: 12px 18px; background: #ffffff; border-radius: 10px; 
            border: 1px solid var(--border-color); box-shadow: 0 -3px 10px rgba(0,0,0,0.03);
            flex-shrink: 0; height: 140px; display: flex; flex-direction: column; box-sizing: border-box;
        }
        .activity-log-title { color: var(--dark-yellow); font-size: 13.5px; font-weight: 800; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; flex-shrink: 0; }
        .activity-list { flex: 1; overflow-y: auto; font-size: 11.5px; line-height: 1.6; }
        .activity-item { margin-bottom: 4px; border-bottom: 1px dashed #f8fafc; padding-bottom: 4px; color: #475569; display: flex; align-items: center; gap: 4px; justify-content: flex-start; flex-wrap: wrap; text-align: right; }
        .activity-header-part { font-size: 11.5px; color: var(--chat-yellow); font-weight: 800; display: inline-block; white-space: nowrap; }
        .activity-time-part { font-size: 10.5px; font-weight: 700; }
        .activity-text-part { font-size: 11.5px; color: #475569; display: inline-block; }

        .status-pill {
            padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: 800;
            border: 1px solid transparent; cursor: pointer; width: 80px; outline: none; font-family: 'Cairo';
        }
        .status-pill[data-status="مكتمل"] { background: var(--soft-green); color: #166534; border-color: #bbf7d0; }
        .status-pill[data-status="معلق"] { background: var(--warning-yellow); color: #854d0e; border-color: #fef08a; }
        .status-pill[data-status="مرتجع"] { background: var(--soft-red); color: #991b1b; border-color: #fecaca; }

        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal-content { 
            background: white; padding: 25px; border-radius: 12px; width: 350px; 
            display: flex; flex-direction: column; gap: 12px; 
        }
        .modal-content input, .modal-content select { 
            padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-family: 'Cairo';
        }

        .delete-btn { color: var(--danger-red); cursor: pointer; font-size: 16px; }
    </style>
</head>
<body onload="initPage()">

    <nav class="navbar">
        <a href="sales.html">← العودة للمبيعات</a>
        <a href="index.html">الرئيسية</a>
    </nav>

    <div class="main-container">
        <div class="header-section">
            <div class="order-info">
                <h2 id="display-order-id">تفاصيل الطلب #----</h2>
                <span id="display-customer" style="font-weight: 800; color: #64748b; font-size: 13px;">العميل: ---</span>
            </div>
            <div class="stats-summary">
                <div class="stat-card">
                    <span class="stat-label">إجمالي الطلب</span>
                    <span class="stat-value" id="total-amount">0.00</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label" style="color: #16a34a;">المكتمل</span>
                    <span class="stat-value" id="total-completed" style="color: #16a34a;">0.00</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label" style="color: #dc2626;">المعلق</span>
                    <span class="stat-value" id="total-pending" style="color: #dc2626;">0.00</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-add" onclick="openModal()">+ إضافة منتج/خدمة</button>
            <button class="btn btn-export" onclick="exportToExcel()">تصدير Excel</button>
            <input type="text" id="tableSearch" class="search-box" placeholder="بحث في المنتجات..." onkeyup="filterTable()">
            
            <select id="columnStatusFilter" class="search-box" style="width: 120px;" onchange="filterTable()">
                <option value="all">كل الحالات</option>
                <option value="مكتمل">مكتمل</option>
                <option value="معلق">معلق</option>
                <option value="مرتجع">مرتجع</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" onclick="toggleAll(this)"></th>
                        <th style="width: 15%;">النوع</th>
                        <th>اسم المنتج / الخدمة</th>
                        <th style="width: 15%;">الرقم التسلسلي/المستخدم</th>
                        <th style="width: 8%;">الكمية</th>
                        <th style="width: 12%;">سعر الوحدة</th>
                        <th style="width: 12%;">الإجمالي</th>
                        <th style="width: 12%;">الحالة</th>
                        <th style="width: 5%;"></th>
                    </tr>
                </thead>
                <tbody id="productBody"></tbody>
            </table>
        </div>

        <div class="activity-log-section">
            <div class="activity-log-title">📋 سجل نشاط الطلب</div>
            <div id="activityLogs" class="activity-list"></div>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; text-align:center;">إضافة بند جديد</h3>
            <select id="p_type" onchange="handleTypeChange()">
                <option value="جوال">جوال</option>
                <option value="بيانات">بيانات</option>
                <option value="إكسسوار">إكسسوار</option>
                <option value="خدمة">خدمة</option>
            </select>
            <input type="text" id="p_name" placeholder="اسم المنتج/الخدمة">
            <input type="text" id="p_serial" placeholder="الرقم التسلسلي / رقم الشريحة">
            <input type="text" id="p_user" placeholder="اسم المستخدم">
            <input type="number" id="p_qty" placeholder="الكمية" value="1">
            <input type="number" id="p_price" placeholder="سعر الوحدة">
            <select id="p_status">
                <option value="معلق">معلق</option>
                <option value="مكتمل">مكتمل</option>
                <option value="مرتجع">مرتجع</option>
            </select>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn" onclick="closeModal()" style="flex:1; background:#94a3b8; color:white;">إلغاء</button>
                <button class="btn btn-add" onclick="addProduct()" style="flex:1;">حفظ</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script>
        let currentOrderId = new URLSearchParams(window.location.search).get('id');
        const LOGS_KEY = 'asgate_general_sales_logs';

        function initPage() {
            if (!currentOrderId) {
                alert("خطأ: لم يتم تحديد رقم الطلب");
                window.location.href = 'sales.html';
                return;
            }
            loadOrderInfo();
            renderProducts();
            renderGeneralLogs();
        }

        function loadOrderInfo() {
            const sales = JSON.parse(localStorage.getItem('asgate_sales_db') || '[]');
            const order = sales.find(o => o.id == currentOrderId);
            if (order) {
                document.getElementById('display-order-id').innerText = `تفاصيل الطلب #${order.id}`;
                document.getElementById('display-customer').innerText = `العميل: ${order.comp}`;
            }
        }

        function getProducts() {
            const db = JSON.parse(localStorage.getItem('asgate_products_db') || '{}');
            return db[currentOrderId] || [];
        }

        function saveProducts(arr) {
            const db = JSON.parse(localStorage.getItem('asgate_products_db') || '{}');
            db[currentOrderId] = arr;
            localStorage.setItem('asgate_products_db', JSON.stringify(db));
            renderProducts();
        }

        function renderProducts(filteredData = null) {
            const data = filteredData || getProducts();
            const tbody = document.getElementById('productBody');
            tbody.innerHTML = "";

            let total = 0, completed = 0, pending = 0;

            data.forEach((p, index) => {
                const lineTotal = p.qty * p.price;
                total += lineTotal;
                if (p.status === "مكتمل") completed += lineTotal;
                if (p.status === "معلق") pending += lineTotal;

                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><input type="checkbox" class="row-checkbox"></td>
                    <td>${p.type}</td>
                    <td style="text-align:right;">${p.name}</td>
                    <td style="font-size:10px; color:#64748b;">${p.serial || ''} ${p.user ? '/ ' + p.user : ''}</td>
                    <td>${p.qty}</td>
                    <td>${parseFloat(p.price).toFixed(2)}</td>
                    <td style="color:var(--accent-blue);">${lineTotal.toFixed(2)}</td>
                    <td>
                        <select class="status-pill" data-status="${p.status}" onchange="updateLineStatus(${index}, this.value)">
                            <option value="معلق" ${p.status === 'معلق' ? 'selected' : ''}>معلق</option>
                            <option value="مكتمل" ${p.status === 'مكتمل' ? 'selected' : ''}>مكتمل</option>
                            <option value="مرتجع" ${p.status === 'مرتجع' ? 'selected' : ''}>مرتجع</option>
                        </select>
                    </td>
                    <td><span class="delete-btn" onclick="deleteProduct(${index})">🗑</span></td>
                `;
            });

            document.getElementById('total-amount').innerText = total.toFixed(2);
            document.getElementById('total-completed').innerText = completed.toFixed(2);
            document.getElementById('total-pending').innerText = pending.toFixed(2);
        }

        function addProduct() {
            const name = document.getElementById('p_name').value;
            const price = document.getElementById('p_price').value;
            if (!name || !price) return alert("يرجى ملء الاسم والسعر");

            const newProd = {
                type: document.getElementById('p_type').value,
                name: name,
                serial: document.getElementById('p_serial').value,
                user: document.getElementById('p_user').value,
                qty: parseInt(document.getElementById('p_qty').value) || 1,
                price: parseFloat(price),
                status: document.getElementById('p_status').value
            };

            const current = getProducts();
            current.push(newProd);
            saveProducts(current);
            
            // إضافة سجل نشاط
            addGeneralLog("بند جديد", "", newProd.name, "طلب #" + currentOrderId, `إضافة ${newProd.type}: ${newProd.name}`);
            
            closeModal();
            // تصفير الحقول
            document.getElementById('p_name').value = "";
            document.getElementById('p_serial').value = "";
            document.getElementById('p_user').value = "";
            document.getElementById('p_price').value = "";
        }

        function updateLineStatus(index, newStatus) {
            const current = getProducts();
            const oldStatus = current[index].status;
            current[index].status = newStatus;
            saveProducts(current);
            
            addGeneralLog("الحالة", oldStatus, newStatus, "طلب #" + currentOrderId, `تحديث حالة البند: ${current[index].name}`);
        }

        function deleteProduct(index) {
            if (!confirm("هل أنت متأكد من الحذف؟")) return;
            const current = getProducts();
            const deletedName = current[index].name;
            current.splice(index, 1);
            saveProducts(current);
            
            addGeneralLog("حذف بند", deletedName, "محذوف", "طلب #" + currentOrderId, `حذف البند: ${deletedName}`);
        }

        // دالة إنشاء الهيدر للسجل (نفس المبيعات)
        function generateStyledHeader() {
            const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const d = new Date();
            const dateStr = d.toISOString().split('T')[0];
            const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            return `<span class="activity-header-part">👤 (أحمد) 🗓️ ${days[d.getDay()]} ${dateStr} <span class="activity-time-part">${timeStr}</span> </span>`;
        }

        function addGeneralLog(fieldName, oldVal, newVal, companyName, actionTextBase) {
            const logs = JSON.parse(localStorage.getItem(LOGS_KEY) || '[]');
            const headerHTML = generateStyledHeader();
            const logHTML = `${headerHTML}<span class="activity-text-part">${actionTextBase} - [${newVal}] (${companyName})</span>`;
            logs.unshift(logHTML);
            localStorage.setItem(LOGS_KEY, JSON.stringify(logs.slice(0, 100)));
            renderGeneralLogs();
        }

        function renderGeneralLogs() {
            const logs = JSON.parse(localStorage.getItem(LOGS_KEY) || '[]');
            document.getElementById('activityLogs').innerHTML = logs.map(l => `<div class="activity-item">${l}</div>`).join('');
        }

        function filterTable() {
            const q = document.getElementById('tableSearch').value.toLowerCase();
            const currentStatusFilterValue = document.getElementById('columnStatusFilter').value;
            const db = getProducts();
            
            const searchFiltered = db.filter(p => {
                const matchesSearch = (p.name||'').toLowerCase().includes(q) || (p.serial||'').toLowerCase().includes(q) || (p.user||'').toLowerCase().includes(q);
                const matchesColumnStatus = (currentStatusFilterValue === "all" || p.status === currentStatusFilterValue);
                return matchesSearch && matchesColumnStatus;
            });
            
            renderProducts(searchFiltered);
        }

        function toggleAll(s) { 
            document.querySelectorAll('.row-checkbox').forEach(c => c.checked = s.checked); 
        }
        
        function openModal() { document.getElementById('productModal').style.display = 'flex'; handleTypeChange(); }
        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        
        function handleTypeChange() {
            const type = document.getElementById('p_type').value;
            const isMobile = (type === "جوال" || type === "بيانات");
            document.getElementById('p_serial').disabled = !isMobile;
        }

        function exportToExcel() {
            const db = getProducts();
            if(db.length === 0) return alert("لا توجد بيانات للتصدير");
            const ws = XLSX.utils.json_to_sheet(db);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Details");
            XLSX.writeFile(wb, `Order_${currentOrderId}_Details.xlsx`);
        }
    </script>
</body>
</html>
